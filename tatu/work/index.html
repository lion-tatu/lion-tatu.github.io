<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LION t.A.T.u. — Рабочий терминал</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.3);
            border: 1px solid rgba(5, 217, 232, 0.3);
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 35px;
            padding: 40px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #252540;
            border: 1px solid #05d9e8;
            border-radius: 25px;
            color: white;
            font-size: 16px;
        }
        button {
            background: #05d9e8;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
        }
        h1, h2, h3 { color: #ff2a6d; margin-bottom: 15px; text-align: center; }
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 280px; }
        .card {
            background: #1a1a2e;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(5, 217, 232, 0.2);
        }
        .ticket-number { font-size: 2em; color: #ff2a6d; font-weight: bold; text-align: center; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .total { font-size: 1.5em; color: #00ff66; text-align: right; padding: 10px; }
        .task-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            border-left: 4px solid #05d9e8;
        }
        .task-card:hover { background: #252540; }
        .btn-icon {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-success { background: #00ff66; color: #0a0a0f; }
        .btn-danger { background: #ff2a6d; color: white; }
        .btn-warning { background: #ff6600; color: white; }
        .btn-info { background: #05d9e8; color: #0a0a0f; }
        .clock-time { font-size: 2em; font-family: monospace; color: #05d9e8; text-align: right; }
        @media (max-width: 768px) {
            .flex-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ============ FIREBASE КОНФИГ (твои данные) ============
        const FIREBASE_CONFIG = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "https://pvz-database-default-rtdb.firebaseio.com/",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(FIREBASE_CONFIG);
        const database = firebase.database();
        
        // ============ ДАННЫЕ ============
        let currentUser = null;
        let currentRole = null;
        let currentWindow = null;
        let cart = [];
        let currentCount = 1;
        let ttsEnabled = true;
        let selectedVoice = null;
        let currentTicket = 1;
        let currentTask = null;
        
        const prices = { "ручка": 4, "маркер": 6 };
        
        // ============ TTS (ЛЮБОЙ РУССКИЙ ГОЛОС) ============
        function loadRussianVoice() {
            return new Promise((resolve) => {
                const voices = window.speechSynthesis.getVoices();
                if(voices.length) {
                    selectedVoice = voices.find(v => v.lang.includes('ru')) || voices[0];
                    resolve(selectedVoice);
                } else {
                    window.speechSynthesis.onvoiceschanged = () => {
                        const voices2 = window.speechSynthesis.getVoices();
                        selectedVoice = voices2.find(v => v.lang.includes('ru')) || voices2[0];
                        resolve(selectedVoice);
                    };
                }
            });
        }
        
        function speakText(text) {
            if(!ttsEnabled) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            if(selectedVoice) utterance.voice = selectedVoice;
            window.speechSynthesis.speak(utterance);
        }
        
        function announceNewOrder(ticketId, code, masterName) {
            speakText(`Новый заказ! Билет номер ${ticketId}. Код на чеке: ${code}. Пройдите к мастеру ${masterName}.`);
        }
        
        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        // ============ ЗАГРУЗКА ДАННЫХ ИЗ FIREBASE ============
        async function loadUsers() {
            const snapshot = await database.ref('users').once('value');
            return snapshot.val() || {};
        }
        
        async function loadCounter() {
            const snapshot = await database.ref('counter').once('value');
            return snapshot.val() || 1;
        }
        
        async function saveCounter(value) {
            await database.ref('counter').set(value);
        }
        
        async function loadTasks() {
            const snapshot = await database.ref('tasks').once('value');
            return snapshot.val() || {};
        }
        
        async function saveTask(task) {
            await database.ref(`tasks/${task.id}`).set(task);
        }
        
        async function deleteTask(taskId) {
            await database.ref(`tasks/${taskId}`).remove();
        }
        
        async function updateUserStatus(userId, status) {
            await database.ref(`users/${userId}/workStatus`).set(status);
        }
        
        async function updateUserOrders(userId, orders) {
            await database.ref(`users/${userId}/todayOrders`).set(orders);
        }
        
        // ============ ИНИЦИАЛИЗАЦИЯ ПОЛЬЗОВАТЕЛЕЙ (ПРИ ПЕРВОМ ЗАПУСКЕ) ============
        async function initDefaultUsers() {
            const snapshot = await database.ref('users').once('value');
            if(snapshot.exists()) return;
            
            const defaultUsers = {
                "0": { password: "admin123321", role: "CASHBOX", name: "Касса", workStatus: "free", online: false, todayOrders: 0 },
                "1": { password: "okno1", role: "WORKER", name: "Александр", workStatus: "free", online: false, todayOrders: 0 },
                "2": { password: "okno2", role: "WORKER", name: "Мария", workStatus: "free", online: false, todayOrders: 0 },
                "3": { password: "okno3", role: "WORKER", name: "Иван", workStatus: "free", online: false, todayOrders: 0 },
                "4": { password: "okno4", role: "WORKER", name: "Екатерина", workStatus: "free", online: false, todayOrders: 0 }
            };
            
            for(const [key, value] of Object.entries(defaultUsers)) {
                await database.ref(`users/${key}`).set(value);
            }
            await database.ref('counter').set(1);
        }
        
        // ============ ЭКРАН ВХОДА ============
        function renderLoginScreen() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <input type="number" id="userNum" placeholder="Номер окна (0-4)" value="0">
                    <input type="password" id="userPass" placeholder="Пароль">
                    <button onclick="doLogin()">🔓 ВОЙТИ</button>
                </div>
            `;
        }
        
        async function doLogin() {
            const num = document.getElementById('userNum').value;
            const pass = document.getElementById('userPass').value;
            
            const users = await loadUsers();
            const user = users[num];
            
            if(!user || user.password !== pass) {
                alert("Неверный номер или пароль!");
                return;
            }
            
            currentUser = num;
            currentRole = user.role;
            currentWindow = user.name;
            await database.ref(`users/${num}`).update({ online: true, lastSeen: Date.now() });
            
            currentTicket = await loadCounter();
            
            if(currentRole === "CASHBOX") renderCashierScreen();
            else renderWorkerScreen();
        }
        
        // ============ КАССА ============
        function renderCashierScreen() {
            let cartHtml = '';
            let total = 0;
            for(let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const itemTotal = item.count * item.price;
                total += itemTotal;
                cartHtml += `<div class="cart-item"><span>${item.service.toUpperCase()} x${item.count}</span><span>${itemTotal} коп</span><button onclick="removeFromCart(${i})" class="btn-icon btn-danger">🗑</button></div>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h1>💰 КАССА</h1>
                        <button class="btn-icon btn-danger" onclick="logout()">🚪 ВЫХОД</button>
                    </div>
                    <div class="flex-row">
                        <div class="flex-col">
                            <div class="card"><div class="ticket-number">БИЛЕТ №${currentTicket}</div></div>
                            <div style="display:flex; gap:10px; margin:15px 0;">
                                <button onclick="addToCart('ручка')" class="btn-info">✍️ РУЧКА (4 коп)</button>
                                <button onclick="addToCart('маркер')" class="btn-warning">🖍️ МАРКЕР (6 коп)</button>
                            </div>
                            <div class="card">
                                <h3>КОЛИЧЕСТВО</h3>
                                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                    <button onclick="setCount(1)" class="btn-icon btn-info">x1</button>
                                    <button onclick="setCount(2)" class="btn-icon btn-info">x2</button>
                                    <button onclick="setCount(3)" class="btn-icon btn-info">x3</button>
                                    <button onclick="setCount(4)" class="btn-icon btn-info">x4</button>
                                    <button onclick="setCount(5)" class="btn-icon btn-info">x5</button>
                                </div>
                            </div>
                        </div>
                        <div class="flex-col">
                            <h3>🛒 КОРЗИНА</h3>
                            <div class="card" id="cartContainer">${cartHtml || '<div style="text-align:center;color:#555;">Корзина пуста</div>'}</div>
                            <div class="total">💰 ИТОГО: ${total} коп</div>
                            <button class="btn-success" onclick="confirmOrder()">✅ ПОДТВЕРДИТЬ ЗАКАЗ</button>
                            <button class="btn-danger" onclick="clearCart()">🗑 ОЧИСТИТЬ</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function setCount(c) { currentCount = c; }
        function addToCart(service) { cart.push({ service, count: currentCount, price: prices[service] }); renderCashierScreen(); }
        function removeFromCart(idx) { cart.splice(idx, 1); renderCashierScreen(); }
        function clearCart() { cart = []; renderCashierScreen(); }
        
        async function confirmOrder() {
            if(cart.length === 0) { alert("Корзина пуста!"); return; }
            const total = cart.reduce((s,i) => s + i.count * i.price, 0);
            const ticketId = currentTicket;
            const code = generateCode();
            
            const users = await loadUsers();
            const freeMaster = Object.entries(users).find(([id, u]) => u.role === "WORKER" && u.workStatus === "free");
            
            if(!freeMaster) {
                alert("Нет свободных мастеров!");
                return;
            }
            
            const masterId = freeMaster[0];
            const masterName = freeMaster[1].name;
            
            await updateUserStatus(masterId, "busy");
            
            const task = {
                id: ticketId,
                items: [...cart],
                total: total,
                code: code,
                time: new Date().toLocaleTimeString(),
                master: masterName,
                status: "active"
            };
            await saveTask(task);
            
            announceNewOrder(ticketId, code, masterName);
            alert(`✅ БИЛЕТ №${ticketId}\n🔑 КОД: ${code}\n💰 ${total} коп\n🎨 Мастер: ${masterName}`);
            
            currentTicket++;
            await saveCounter(currentTicket);
            cart = [];
            renderCashierScreen();
        }
        
        // ============ МАСТЕР ============
        async function renderWorkerScreen() {
            const tasks = await loadTasks();
            const myTasks = Object.values(tasks).filter(t => t.master === currentWindow && t.status === "active");
            
            let tasksHtml = '';
            for(const task of myTasks) {
                const itemsText = task.items.map(i => `${i.service} x${i.count}`).join(', ');
                tasksHtml += `
                    <div class="task-card" onclick="selectTask(${task.id})">
                        <strong>🎫 БИЛЕТ №${task.id}</strong><br>
                        📦 ${itemsText}<br>
                        💰 ${task.total} коп<br>
                        🔑 ${task.code}
                    </div>
                `;
            }
            if(!tasksHtml) tasksHtml = '<div style="text-align:center;color:#555;">✨ НЕТ ЗАКАЗОВ ✨</div>';
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h1>🎨 ${currentWindow}</h1>
                        <button class="btn-icon btn-danger" onclick="logout()">🚪 ВЫХОД</button>
                    </div>
                    <div class="flex-row">
                        <div class="flex-col">
                            <h3>📋 МОИ ЗАДАНИЯ</h3>
                            <div id="tasksContainer">${tasksHtml}</div>
                        </div>
                        <div class="flex-col">
                            <h3>🔍 ПОИСК ПО КОДУ</h3>
                            <input type="text" id="searchCode" placeholder="6-значный код">
                            <button onclick="searchByCode()" class="btn-info">🔍 НАЙТИ</button>
                            <div class="card" id="currentTaskCard" style="margin-top:15px;">
                                <div style="text-align:center;color:#555;">Нет активного заказа</div>
                            </div>
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <button onclick="clientArrived()" class="btn-warning">👋 КЛИЕНТ ПРИШЁЛ</button>
                                <button onclick="sendProblem()" class="btn-danger">🔴 ПРОБЛЕМА</button>
                                <button onclick="completeTask()" class="btn-success">✅ ЗАВЕРШИТЬ</button>
                            </div>
                        </div>
                    </div>
                    <div class="clock-time" id="liveClock"></div>
                </div>
            `;
            
            setInterval(() => {
                const clock = document.getElementById('liveClock');
                if(clock) clock.innerText = new Date().toLocaleTimeString('ru-RU');
            }, 1000);
        }
        
        async function selectTask(taskId) {
            const tasks = await loadTasks();
            currentTask = tasks[taskId];
            if(currentTask) {
                const itemsText = currentTask.items.map(i => `• ${i.service} x${i.count} = ${i.count * i.price} коп`).join('<br>');
                document.getElementById('currentTaskCard').innerHTML = `
                    <div class="ticket-number">🎫 БИЛЕТ №${currentTask.id}</div>
                    <div style="margin:10px 0;">${itemsText}</div>
                    <div><strong>💰 ИТОГО: ${currentTask.total} коп</strong></div>
                    <div>🔑 Код: ${currentTask.code}</div>
                `;
            }
        }
        
        async function searchByCode() {
            const code = document.getElementById('searchCode').value;
            const tasks = await loadTasks();
            const task = Object.values(tasks).find(t => t.code === code);
            if(task) {
                await selectTask(task.id);
                alert(`Заказ найден! Билет №${task.id}`);
            } else {
                alert("Заказ не найден!");
            }
        }
        
        function clientArrived() {
            if(!currentTask) { alert("Нет активного заказа!"); return; }
            speakText("Здравствуйте, присаживайтесь! Выберите татуировку");
            alert(`👋 Клиент пришёл на билет №${currentTask.id}`);
        }
        
        function sendProblem() {
            alert("🔴 Сигнал о проблеме отправлен кассиру");
        }
        
        async function completeTask() {
            if(!currentTask) { alert("Нет активного заказа!"); return; }
            await deleteTask(currentTask.id);
            await updateUserStatus(currentUser, "free");
            
            const users = await loadUsers();
            const newOrders = (users[currentUser].todayOrders || 0) + 1;
            await updateUserOrders(currentUser, newOrders);
            
            speakText("Хорошего дня, будем ждать вас снова");
            alert(`✅ Заказ №${currentTask.id} завершён!`);
            currentTask = null;
            renderWorkerScreen();
        }
        
        async function logout() {
            if(currentUser) {
                await database.ref(`users/${currentUser}`).update({ online: false });
            }
            currentUser = null;
            renderLoginScreen();
        }
        
        // ============ ЗАПУСК ============
        loadRussianVoice();
        initDefaultUsers().then(() => {
            renderLoginScreen();
        });
    </script>
</body>
</html>
