<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LION t.A.T.u. — Админ панель</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.3);
            border: 1px solid rgba(5, 217, 232, 0.3);
        }
        /* Табы */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(5, 217, 232, 0.3);
            padding-bottom: 15px;
        }
        .tab-btn {
            padding: 12px 24px;
            background: #1a1a2e;
            border: 1px solid rgba(5, 217, 232, 0.3);
            border-radius: 30px;
            color: #05d9e8;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .tab-btn:hover {
            background: #252540;
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: #05d9e8;
            color: #0a0a0f;
            border-color: #05d9e8;
        }
        /* Карточки статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(5, 217, 232, 0.2);
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff66;
        }
        .stat-label {
            color: #888;
            margin-top: 5px;
        }
        /* Пользователи */
        .user-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-left: 4px solid #05d9e8;
        }
        .user-online { border-left-color: #00ff66; }
        .user-offline { border-left-color: #ff2a6d; }
        .user-name { font-size: 1.2em; font-weight: bold; }
        .user-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-online { background: #00ff66; color: #0a0a0f; }
        .status-offline { background: #555; color: white; }
        .status-busy { background: #ff2a6d; color: white; }
        .status-break { background: #ffcc00; color: #0a0a0f; }
        /* Кнопки */
        .btn-icon {
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-icon:hover { transform: scale(1.05); }
        .btn-success { background: #00ff66; color: #0a0a0f; }
        .btn-danger { background: #ff2a6d; color: white; }
        .btn-warning { background: #ff6600; color: white; }
        .btn-info { background: #05d9e8; color: #0a0a0f; }
        .btn-purple { background: #b300ff; color: white; }
        /* Лог ошибок */
        .error-log {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .error-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .error-item:hover { background: #252540; }
        .error-time { color: #888; font-size: 11px; }
        .error-text { color: #ff2a6d; }
        /* Системные логи */
        .log-container {
            background: #0a0a0f;
            border-radius: 20px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #222;
            color: #0f0;
        }
        .log-time { color: #888; }
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 30px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #ff2a6d;
        }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .user-card { flex-direction: column; align-items: stretch; }
            .admin-tabs { gap: 5px; }
            .tab-btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ============ FIREBASE КОНФИГ ============
        const MAIN_FIREBASE_CONFIG = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "https://pvz-database-default-rtdb.firebaseio.com/",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        const CHEKI_FIREBASE_CONFIG = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "https://cheki-tatu-save-default-rtdb.firebaseio.com/",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(MAIN_FIREBASE_CONFIG, 'main');
        firebase.initializeApp(CHEKI_FIREBASE_CONFIG, 'cheki');
        
        const database = firebase.app('main').database();
        const chekiDatabase = firebase.app('cheki').database();
        
        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let currentUser = null;
        let currentRole = null;
        let currentWindow = null;
        let errorLog = [];
        let systemLogs = [];
        
        // ============ ЛОГИРОВАНИЕ ОШИБОК ============
        function logError(error, source = "unknown") {
            const errorEntry = {
                id: Date.now(),
                time: new Date().toLocaleString('ru-RU'),
                message: error.message || String(error),
                stack: error.stack || "",
                source: source,
                resolved: false
            };
            errorLog.unshift(errorEntry);
            systemLogs.unshift({
                time: new Date().toLocaleString('ru-RU'),
                type: "ERROR",
                message: error.message || String(error)
            });
            saveErrorsToStorage();
            updateErrorDisplay();
        }
        
        function logSystem(message, type = "INFO") {
            systemLogs.unshift({
                time: new Date().toLocaleString('ru-RU'),
                type: type,
                message: message
            });
            saveSystemLogsToStorage();
            updateSystemLogsDisplay();
        }
        
        function saveErrorsToStorage() {
            localStorage.setItem('lion_errors', JSON.stringify(errorLog.slice(0, 100)));
        }
        
        function loadErrorsFromStorage() {
            try {
                const saved = localStorage.getItem('lion_errors');
                if (saved) errorLog = JSON.parse(saved);
            } catch(e) {}
        }
        
        function saveSystemLogsToStorage() {
            localStorage.setItem('lion_system_logs', JSON.stringify(systemLogs.slice(0, 500)));
        }
        
        function loadSystemLogsFromStorage() {
            try {
                const saved = localStorage.getItem('lion_system_logs');
                if (saved) systemLogs = JSON.parse(saved);
            } catch(e) {}
        }
        
        // ============ АДМИН-ПАНЕЛЬ ============
        function renderAdminPanel() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h1>👑 АДМИН-ПАНЕЛЬ</h1>
                        <button class="btn-icon btn-info" onclick="renderCashierScreen()">◀ НАЗАД</button>
                    </div>
                    
                    <div class="admin-tabs">
                        <button class="tab-btn active" onclick="showAdminTab('dashboard')">📊 ДАШБОРД</button>
                        <button class="tab-btn" onclick="showAdminTab('users')">👥 ПОЛЬЗОВАТЕЛИ</button>
                        <button class="tab-btn" onclick="showAdminTab('errors')">⚠️ ОШИБКИ</button>
                        <button class="tab-btn" onclick="showAdminTab('logs')">📋 ЛОГИ</button>
                        <button class="tab-btn" onclick="showAdminTab('settings')">⚙️ НАСТРОЙКИ</button>
                        <button class="tab-btn" onclick="showAdminTab('backup')">💾 БЭКАП</button>
                        <button class="tab-btn" onclick="showAdminTab('commands')">📡 КОМАНДЫ</button>
                    </div>
                    
                    <div id="adminContent"></div>
                </div>
            `;
            showAdminTab('dashboard');
        }
        
        async function showAdminTab(tabName) {
            // Обновляем активные кнопки
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const content = document.getElementById('adminContent');
            
            switch(tabName) {
                case 'dashboard':
                    content.innerHTML = await renderDashboard();
                    break;
                case 'users':
                    content.innerHTML = await renderUsersPanel();
                    break;
                case 'errors':
                    content.innerHTML = renderErrorsPanel();
                    break;
                case 'logs':
                    content.innerHTML = renderSystemLogsPanel();
                    break;
                case 'settings':
                    content.innerHTML = renderSettingsPanel();
                    break;
                case 'backup':
                    content.innerHTML = renderBackupPanel();
                    break;
                case 'commands':
                    content.innerHTML = renderCommandsPanel();
                    break;
            }
        }
        
        async function renderDashboard() {
            const users = await loadUsers();
            const tasks = await loadTasks();
            const queue = await getAllQueueItems();
            const logs = await chekiDatabase.ref('checkLogs').once('value');
            const logsCount = logs.val() ? Object.keys(logs.val()).length : 0;
            
            const onlineCount = Object.values(users).filter(u => u.online === true).length;
            const busyCount = Object.values(users).filter(u => u.workStatus === 'busy').length;
            const activeTasksCount = Object.values(tasks).filter(t => t.status === 'active').length;
            const waitingTasksCount = Object.values(tasks).filter(t => t.status === 'waiting').length;
            
            return `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${Object.keys(users).length}</div><div class="stat-label">Всего пользователей</div></div>
                    <div class="stat-card"><div class="stat-value">${onlineCount}</div><div class="stat-label">Онлайн</div></div>
                    <div class="stat-card"><div class="stat-value">${busyCount}</div><div class="stat-label">Заняты</div></div>
                    <div class="stat-card"><div class="stat-value">${activeTasksCount}</div><div class="stat-label">Активных заказов</div></div>
                    <div class="stat-card"><div class="stat-value">${waitingTasksCount}</div><div class="stat-label">В очереди</div></div>
                    <div class="stat-card"><div class="stat-value">${queue.length}</div><div class="stat-label">Ожидают мастера</div></div>
                    <div class="stat-card"><div class="stat-value">${logsCount}</div><div class="stat-label">Всего чеков</div></div>
                    <div class="stat-card"><div class="stat-value">${errorLog.length}</div><div class="stat-label">Ошибок</div></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><button class="btn-icon btn-success" onclick="refreshAllData()">🔄 ОБНОВИТЬ ВСЁ</button></div>
                    <div class="stat-card"><button class="btn-icon btn-warning" onclick="clearAllCache()">🗑 ОЧИСТИТЬ КЭШ</button></div>
                    <div class="stat-card"><button class="btn-icon btn-info" onclick="exportReport()">📄 ЭКСПОРТ ОТЧЁТА</button></div>
                    <div class="stat-card"><button class="btn-icon btn-purple" onclick="showSystemInfo()">🖥️ ИНФО О СИСТЕМЕ</button></div>
                </div>
            `;
        }
        
        async function renderUsersPanel() {
            const users = await loadUsers();
            let html = '<div style="margin-bottom: 20px;"><button class="btn-icon btn-success" onclick="addNewUser()">➕ ДОБАВИТЬ ПОЛЬЗОВАТЕЛЯ</button></div>';
            
            for (const [id, user] of Object.entries(users)) {
                const statusClass = user.online ? 'user-online' : 'user-offline';
                const statusText = user.online ? 'Онлайн' : 'Оффлайн';
                const workStatusClass = user.workStatus === 'free' ? 'status-online' : (user.workStatus === 'busy' ? 'status-busy' : 'status-break');
                const workStatusText = user.workStatus === 'free' ? 'Свободен' : (user.workStatus === 'busy' ? 'Занят' : 'Перерыв');
                
                html += `
                    <div class="user-card ${statusClass}">
                        <div>
                            <span class="user-name">${user.name}</span>
                            <span class="user-status ${statusClass === 'user-online' ? 'status-online' : 'status-offline'}">${statusText}</span>
                            <span class="user-status ${workStatusClass}">${workStatusText}</span>
                        </div>
                        <div><strong>ID:</strong> ${id}</div>
                        <div><strong>Заказов сегодня:</strong> ${user.todayOrders || 0}</div>
                        <div><strong>Устройство:</strong> ${user.deviceModel || 'Unknown'}</div>
                        <div>
                            <button class="btn-icon btn-info" onclick="showUserDetails('${id}')">📱 Детали</button>
                            <button class="btn-icon btn-warning" onclick="toggleUserBreak('${id}', '${user.workStatus}')">🟡 Перерыв</button>
                            <button class="btn-icon btn-success" onclick="forceFreeWindow('${id}')">🔓 Освободить</button>
                            <button class="btn-icon btn-danger" onclick="kickUser('${id}')">🚪 Выгнать</button>
                            <button class="btn-icon btn-purple" onclick="resetUserPassword('${id}')">🔑 Сброс пароля</button>
                            <button class="btn-icon btn-danger" onclick="deleteUser('${id}')">🗑 Удалить</button>
                        </div>
                    </div>
                `;
            }
            return html;
        }
        
        function renderErrorsPanel() {
            let html = `
                <div style="margin-bottom: 15px;">
                    <button class="btn-icon btn-success" onclick="clearAllErrors()">✅ ОЧИСТИТЬ ВСЕ ОШИБКИ</button>
                    <button class="btn-icon btn-info" onclick="exportErrorsToFile()">📄 ЭКСПОРТ ОШИБОК</button>
                </div>
                <div class="error-log" id="errorLogContainer">
            `;
            
            if (errorLog.length === 0) {
                html += '<div style="text-align:center; color:#555; padding:20px;">✅ НЕТ ОШИБОК</div>';
            } else {
                for (const err of errorLog) {
                    html += `
                        <div class="error-item" onclick="copyErrorText('${err.message.replace(/'/g, "\\'")}')">
                            <div class="error-time">[${err.time}]</div>
                            <div class="error-text">❌ ${err.message}</div>
                            <div style="font-size: 11px; color:#555;">Источник: ${err.source}</div>
                        </div>
                    `;
                }
            }
            html += '</div>';
            return html;
        }
        
        function renderSystemLogsPanel() {
            let html = `
                <div style="margin-bottom: 15px;">
                    <button class="btn-icon btn-warning" onclick="clearAllLogs()">🗑 ОЧИСТИТЬ ЛОГИ</button>
                    <button class="btn-icon btn-info" onclick="exportLogsToFile()">📄 ЭКСПОРТ ЛОГОВ</button>
                </div>
                <div class="log-container" id="systemLogsContainer">
            `;
            
            if (systemLogs.length === 0) {
                html += '<div style="text-align:center; color:#555; padding:20px;">📭 ЛОГИ ОТСУТСТВУЮТ</div>';
            } else {
                for (const log of systemLogs.slice(0, 200)) {
                    const color = log.type === 'ERROR' ? '#ff2a6d' : (log.type === 'WARNING' ? '#ffcc00' : '#00ff66');
                    html += `<div class="log-entry"><span class="log-time">[${log.time}]</span> <span style="color:${color}">${log.type}</span> - ${log.message}</div>`;
                }
            }
            html += '</div>';
            return html;
        }
        
        function renderSettingsPanel() {
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>⚙️ ОБЩИЕ НАСТРОЙКИ</h3>
                        <button class="btn-icon btn-info" onclick="changeTheme()">🎨 СМЕНИТЬ ТЕМУ</button>
                        <button class="btn-icon btn-warning" onclick="toggleTTS()">🔊 ВКЛ/ВЫКЛ ОЗВУЧКУ</button>
                        <button class="btn-icon btn-purple" onclick="setAdminPassword()">🔐 СМЕНИТЬ ПАРОЛЬ АДМИНА</button>
                    </div>
                    <div class="stat-card">
                        <h3>🔄 СИНХРОНИЗАЦИЯ</h3>
                        <button class="btn-icon btn-success" onclick="syncAllDevices()">🔄 СИНХРОНИЗИРОВАТЬ ВСЁ</button>
                        <button class="btn-icon btn-info" onclick="syncSettingsToAll()">⚙️ СИНХР. НАСТРОЙКИ</button>
                    </div>
                    <div class="stat-card">
                        <h3>🗑 СБРОС</h3>
                        <button class="btn-icon btn-warning" onclick="resetAllData()">⚠️ СБРОС ВСЕХ ДАННЫХ</button>
                        <button class="btn-icon btn-danger" onclick="clearAllTasks()">❌ ОЧИСТИТЬ ВСЕ ЗАКАЗЫ</button>
                        <button class="btn-icon btn-danger" onclick="resetAllUsers()">👥 СБРОС ПОЛЬЗОВАТЕЛЕЙ</button>
                    </div>
                </div>
            `;
        }
        
        function renderBackupPanel() {
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>💾 СОЗДАТЬ БЭКАП</h3>
                        <button class="btn-icon btn-success" onclick="createBackup()">📦 СОЗДАТЬ БЭКАП</button>
                        <button class="btn-icon btn-info" onclick="exportBackupToFile()">💾 СКАЧАТЬ БЭКАП</button>
                    </div>
                    <div class="stat-card">
                        <h3>🔄 ВОССТАНОВЛЕНИЕ</h3>
                        <input type="file" id="restoreFile" accept=".json" style="margin-bottom:10px;">
                        <button class="btn-icon btn-warning" onclick="restoreFromBackup()">📂 ВОССТАНОВИТЬ</button>
                    </div>
                    <div class="stat-card">
                        <h3>📊 СТАТИСТИКА БД</h3>
                        <button class="btn-icon btn-purple" onclick="showDBStats()">📊 ПОКАЗАТЬ СТАТИСТИКУ</button>
                    </div>
                </div>
            `;
        }
        
        function renderCommandsPanel() {
            return `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>📡 ГЛОБАЛЬНЫЕ КОМАНДЫ</h3>
                        <button class="btn-icon btn-warning" onclick="sendCommandToAll('refresh')">🔄 ОБНОВИТЬ ВСЕМ</button>
                        <button class="btn-icon btn-danger" onclick="sendCommandToAll('logout')">🚪 ВЫГНАТЬ ВСЕХ</button>
                        <button class="btn-icon btn-info" onclick="sendCommandToAll('clear_screen')">🗑 ОЧИСТИТЬ ЭКРАНЫ</button>
                        <button class="btn-icon btn-success" onclick="sendCommandToAll('sync')">🔄 СИНХР. ВСЕМ</button>
                    </div>
                    <div class="stat-card">
                        <h3>🎨 КОМАНДЫ МАСТЕРАМ</h3>
                        <button class="btn-icon btn-purple" onclick="showClockToAllMasters()">🕐 ВКЛЮЧИТЬ ЧАСЫ ВСЕМ</button>
                        <button class="btn-icon btn-warning" onclick="sendBreakToAll()">🟡 ПЕРЕРЫВ ВСЕМ</button>
                        <button class="btn-icon btn-success" onclick="sendResumeToAll()">✅ ВЕРНУТЬ К РАБОТЕ ВСЕХ</button>
                    </div>
                </div>
            `;
        }
        
        // ============ АДМИН-ФУНКЦИИ ============
        async function loadUsers() {
            const snapshot = await database.ref('users').once('value');
            return snapshot.val() || {};
        }
        
        async function loadTasks() {
            const snapshot = await database.ref('tasks').once('value');
            return snapshot.val() || {};
        }
        
        async function getAllQueueItems() {
            const snapshot = await database.ref('queue').once('value');
            const queue = snapshot.val() || {};
            return Object.values(queue);
        }
        
        async function showUserDetails(userId) {
            const user = (await database.ref(`users/${userId}`).once('value')).val();
            if (!user) return;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>📱 ${user.name}</h2>
                        <span class="close-modal" onclick="this.parentElement.parentElement.parentElement.remove()">✕</span>
                    </div>
                    <div><strong>ID:</strong> ${userId}</div>
                    <div><strong>Роль:</strong> ${user.role}</div>
                    <div><strong>Статус:</strong> ${user.workStatus}</div>
                    <div><strong>Заказов сегодня:</strong> ${user.todayOrders || 0}</div>
                    <div><strong>Онлайн:</strong> ${user.online ? 'Да' : 'Нет'}</div>
                    <div><strong>Устройство:</strong> ${user.deviceModel || 'Unknown'}</div>
                    <div><strong>Экран:</strong> ${user.deviceScreen || 'Unknown'}</div>
                    <div><strong>Язык:</strong> ${user.deviceLanguage || 'ru-RU'}</div>
                    <div><strong>Таймзона:</strong> ${user.deviceTimezone || 'Europe/Moscow'}</div>
                    <div><strong>Последний вход:</strong> ${new Date(user.lastSeen).toLocaleString()}</div>
                    <div><strong>Приоритет:</strong> ${user.priority || 1}</div>

        function updateErrorDisplay() {
            const container = document.getElementById('errorLogContainer');
            if(container) {
                if(errorLog.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">✅ НЕТ ОШИБОК</div>';
                } else {
                    container.innerHTML = errorLog.map(err => `
                        <div class="error-item" onclick="copyErrorText('${err.message.replace(/'/g, "\\'")}')">
                            <div class="error-time">[${err.time}]</div>
                            <div class="error-text">❌ ${err.message}</div>
                            <div style="font-size: 11px; color:#555;">Источник: ${err.source}</div>
                        </div>
                    `).join('');
                }
            }
        }
        
        function updateSystemLogsDisplay() {
            const container = document.getElementById('systemLogsContainer');
            if(container) {
                if(systemLogs.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">📭 ЛОГИ ОТСУТСТВУЮТ</div>';
                } else {
                    container.innerHTML = systemLogs.slice(0, 200).map(log => {
                        const color = log.type === 'ERROR' ? '#ff2a6d' : (log.type === 'WARNING' ? '#ffcc00' : '#00ff66');
                        return `<div class="log-entry"><span class="log-time">[${log.time}]</span> <span style="color:${color}">${log.type}</span> - ${log.message}</div>`;
                    }).join('');
                }
            }
        }

        async function restoreFromBackup() {
            const fileInput = document.getElementById('restoreFile');
            if(!fileInput.files[0]) { alert("Выберите файл!"); return; }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    if(backup.users) {
                        for(const [key, value] of Object.entries(backup.users)) {
                            await database.ref(`users/${key}`).set(value);
                        }
                    }
                    if(backup.counter) await database.ref('counter').set(backup.counter);
                    alert("Восстановление завершено!");
                    logSystem("Восстановление из бэкапа выполнено", "INFO");
                } catch(err) {
                    alert("Ошибка восстановления!");
                    logError(err, "restore");
                }
            };
            reader.readAsText(file);
        }

        async function initDefaultUsers() {
            const snapshot = await database.ref('users').once('value');
            if(snapshot.exists()) return;
            const defaultUsers = {
                "0": { password: "admin123321", role: "CASHBOX", name: "Касса", workStatus: "free", online: false, priority: 0, todayOrders: 0 },
                "1": { password: "okno1", role: "WORKER", name: "Александр", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                "2": { password: "okno2", role: "WORKER", name: "Мария", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                "3": { password: "okno3", role: "WORKER", name: "Иван", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                "4": { password: "okno4", role: "WORKER", name: "Екатерина", workStatus: "free", online: false, priority: 1, todayOrders: 0 }
            };
            for(const [key, value] of Object.entries(defaultUsers)) {
                await database.ref(`users/${key}`).set(value);
            }
            await database.ref('settings/distributionMode').set("auto");
            await database.ref('settings/windowPriorities').set({ "1": 1, "2": 1, "3": 1, "4": 1 });
            await database.ref('counter').set(1);
        }
        
        async function loadCounter() {
            const s = await database.ref('counter').once('value');
            return s.val() || 1;
        }
        
        function renderLoginScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container" style="max-width:450px;margin:0 auto;">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <input type="number" id="windowNumber" placeholder="Номер окна" value="0">
                    <input type="password" id="password" placeholder="Пароль">
                    <button onclick="doLogin()">🔓 ВОЙТИ</button>
                </div>
            `;
        }
        
        async function doLogin() {
            const windowNumber = document.getElementById('windowNumber').value;
            const password = document.getElementById('password').value;
            const snapshot = await database.ref(`users/${windowNumber}`).once('value');
            const userData = snapshot.val();
            if(!userData || userData.password !== password) {
                alert("Неверный номер или пароль!");
                logError(new Error("Неверный вход"), "login");
                return;
            }
            currentUser = windowNumber;
            currentRole = userData.role;
            currentWindow = userData.name;
            await database.ref(`users/${windowNumber}`).update({ online: true, lastSeen: Date.now() });
            localStorage.setItem('user', JSON.stringify({ windowNumber, role: userData.role, name: userData.name }));
            logSystem(`Вход: ${currentWindow} (${currentRole})`, "INFO");
            renderAdminPanel();
        }
        
        function renderCashierScreen() {
            renderAdminPanel();
        }
        
        // Перехват ошибок
        window.onerror = function(msg, url, line, col, error) {
            logError(error || new Error(msg), "global");
            return false;
        };
        
        window.onunhandledrejection = function(e) {
            logError(e.reason || new Error("Unhandled Promise Rejection"), "promise");
        };
        
        loadErrorsFromStorage();
        loadSystemLogsFromStorage();
        logSystem("Админ-панель загружена", "INFO");
        
        initDefaultUsers().then(() => {

            if(savedUser) {
                const user = JSON.parse(savedUser);
                currentUser = user.windowNumber;
                currentRole = user.role;
                currentWindow = user.name;
                renderAdminPanel();
            } else {
                renderLoginScreen();
            }
        });
