<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LION t.A.T.u. — Полная система</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        /* Общие контейнеры */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.3);
            border: 1px solid rgba(5, 217, 232, 0.3);
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 35px;
            padding: 40px;
            text-align: center;
        }
        /* Формы */
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #252540;
            border: 1px solid #05d9e8;
            border-radius: 25px;
            color: white;
            font-size: 14px;
        }
        button {
            background: #05d9e8;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        h1, h2, h3 { color: #ff2a6d; margin-bottom: 15px; }
        /* Табы админки */
        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(5, 217, 232, 0.3);
            padding-bottom: 15px;
        }
        .tab-btn {
            padding: 10px 18px;
            background: #1a1a2e;
            border: 1px solid rgba(5, 217, 232, 0.3);
            border-radius: 30px;
            color: #05d9e8;
            cursor: pointer;
            font-size: 13px;
        }
        .tab-btn.active {
            background: #05d9e8;
            color: #0a0a0f;
        }
        /* Карточки статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ff66;
        }
        /* Пользователи */
        .user-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-left: 4px solid #05d9e8;
        }
        /* Кнопки */
        .btn-icon {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-success { background: #00ff66; color: #0a0a0f; }
        .btn-danger { background: #ff2a6d; color: white; }
        .btn-warning { background: #ff6600; color: white; }
        .btn-info { background: #05d9e8; color: #0a0a0f; }
        .btn-purple { background: #b300ff; color: white; }
        /* Логи и ошибки */
        .error-log, .log-container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .error-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .error-text { color: #ff2a6d; }
        .log-entry { padding: 5px; border-bottom: 1px solid #222; color: #0f0; }
        /* Часы на весь экран */
        .fullscreen-clock {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .clock-time {
            font-size: 12vw;
            font-family: monospace;
            color: #05d9e8;
            text-shadow: 0 0 30px #05d9e8;
            letter-spacing: 10px;
        }
        .clock-date {
            font-size: 2vw;
            color: #ffcc00;
            margin-top: 20px;
        }
        /* Касса */
        .cashier-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .cashier-left, .cashier-right { flex: 1; min-width: 280px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .total { font-size: 1.5em; color: #00ff66; text-align: right; padding: 10px; }
        /* Мастер */
        .worker-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .worker-tasks { flex: 1; min-width: 280px; }
        .task-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .cashier-layout, .worker-layout { flex-direction: column; }
            .user-card { flex-direction: column; align-items: stretch; }
            .clock-time { font-size: 15vw; letter-spacing: 5px; }
            .clock-date { font-size: 5vw; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============ ДЕМО-ДАННЫЕ ============
        let currentUser = null;
        let currentRole = null;
        let currentWindow = null;
        let cart = [];
        let currentCount = 1;
        let ttsEnabled = true;
        let selectedVoice = null;
        let currentTicket = 1;
        let currentTask = null;
        let errorLog = [];
        let systemLogs = [];
        let fullscreenClockActive = false;
        
        const prices = { "ручка": 4, "маркер": 6 };
        
        // Демо-пользователи
        let users = {
            "0": { password: "admin123", role: "CASHBOX", name: "Касса", workStatus: "free", online: true, todayOrders: 0, deviceModel: "Admin PC" },
            "1": { password: "master1", role: "WORKER", name: "Александр", workStatus: "free", online: true, todayOrders: 0, deviceModel: "iPhone" },
            "2": { password: "master2", role: "WORKER", name: "Мария", workStatus: "free", online: false, todayOrders: 0, deviceModel: "Android" },
            "3": { password: "master3", role: "WORKER", name: "Иван", workStatus: "break", online: true, todayOrders: 0, deviceModel: "Windows" },
            "4": { password: "master4", role: "WORKER", name: "Екатерина", workStatus: "free", online: true, todayOrders: 0, deviceModel: "Mac" }
        };
        
        let tasks = [];
        let queue = [];
        let counter = 5;
        
        // ============ ЛОГИРОВАНИЕ ============
        function logSystem(msg, type = "INFO") {
            systemLogs.unshift({ time: new Date().toLocaleString(), type, message: msg });
            if(systemLogs.length > 500) systemLogs.pop();
            updateSystemLogsDisplay();
        }
        
        function logError(err, src = "system") {
            errorLog.unshift({ time: new Date().toLocaleString(), message: err.message || String(err), source: src });
            if(errorLog.length > 200) errorLog.pop();
            updateErrorDisplay();
            logSystem(`Ошибка: ${err.message}`, "ERROR");
        }
        
        function updateErrorDisplay() {
            const container = document.getElementById('errorLogContainer');
            if(!container) return;
            if(errorLog.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#555;">✅ НЕТ ОШИБОК</div>';
            } else {
                container.innerHTML = errorLog.map(err => `
                    <div class="error-item" onclick="navigator.clipboard.writeText('${err.message.replace(/'/g, "\\'")}')">
                        <div>[${err.time}]</div>
                        <div class="error-text">❌ ${err.message}</div>
                    </div>
                `).join('');
            }
        }
        
        function updateSystemLogsDisplay() {
            const container = document.getElementById('systemLogsContainer');
            if(!container) return;
            if(systemLogs.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#555;">📭 НЕТ ЛОГОВ</div>';
            } else {
                container.innerHTML = systemLogs.slice(0, 150).map(log => {
                    const color = log.type === 'ERROR' ? '#ff2a6d' : (log.type === 'WARNING' ? '#ffcc00' : '#00ff66');
                    return `<div class="log-entry">[${log.time}] <span style="color:${color}">${log.type}</span> - ${log.message}</div>`;
                }).join('');
            }
        }
        
        // ============ TTS ============
        function loadRussianVoice() {
            return new Promise((resolve) => {
                const voices = window.speechSynthesis.getVoices();
                if(voices.length) {
                    selectedVoice = voices.find(v => v.lang.includes('ru')) || voices[0];
                    resolve(selectedVoice);
                } else {
                    window.speechSynthesis.onvoiceschanged = () => {
                        const voices2 = window.speechSynthesis.getVoices();
                        selectedVoice = voices2.find(v => v.lang.includes('ru')) || voices2[0];
                        resolve(selectedVoice);
                    };
                }
            });
        }
        
        function speakText(text) {
            if(!ttsEnabled) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            if(selectedVoice) utterance.voice = selectedVoice;
            window.speechSynthesis.speak(utterance);
        }
        
        function announceNewOrder(ticketId, code) {
            speakText(`Новый заказ! Билет номер ${ticketId}. Код на чеке: ${code}. Сообщите клиенту код.`);
        }
        
        // ============ ОСНОВНЫЕ ФУНКЦИИ ============
        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        function renderLoginScreen() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <input type="number" id="userNum" placeholder="Номер окна (0-4)" value="0">
                    <input type="password" id="userPass" placeholder="Пароль">
                    <button onclick="doLogin()">🔓 ВОЙТИ</button>
                    <div style="margin-top:15px; font-size:11px; color:#555;">Пароли: 0/admin123 | 1/master1 | 2/master2 | 3/master3 | 4/master4</div>
                </div>
            `;
        }
        
        async function doLogin() {
            const num = document.getElementById('userNum').value;
            const pass = document.getElementById('userPass').value;
            const user = users[num];
            if(!user || user.password !== pass) {
                alert("Неверный номер или пароль!");
                logError(new Error("Неверный вход"), "login");
                return;
            }
            currentUser = num;
            currentRole = user.role;
            currentWindow = user.name;
            users[num].online = true;
            logSystem(`Вход: ${currentWindow} (${currentRole})`, "INFO");
            
            if(currentRole === "CASHBOX") renderCashierScreen();
            else renderWorkerScreen();
        }
        
        // ============ ЭКРАН КАССЫ ============
        function renderCashierScreen() {
            let cartHtml = '';
            let total = 0;
            for(let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const itemTotal = item.count * item.price;
                total += itemTotal;
                cartHtml += `<div class="cart-item"><span>${item.service.toUpperCase()} x${item.count}</span><span>${itemTotal} коп</span><button onclick="removeFromCart(${i})" class="btn-icon btn-danger">🗑</button></div>`;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h1>💰 КАССА</h1>
                        <div><button class="btn-icon btn-purple" onclick="showAdminPanel()">👑 АДМИН</button>
                        <button class="btn-icon btn-danger" onclick="logout()">🚪 ВЫХОД</button></div>
                    </div>
                    <div class="cashier-layout">
                        <div class="cashier-left">
                            <div class="stat-card"><div class="stat-value">БИЛЕТ №${counter}</div></div>
                            <div style="display:flex; gap:10px; margin:15px 0;">
                                <button onclick="addToCart('ручка')" class="btn-info">✍️ РУЧКА (4 коп)</button>
                                <button onclick="addToCart('маркер')" class="btn-warning">🖍️ МАРКЕР (6 коп)</button>
                            </div>
                            <div>
                                <h3>КОЛИЧЕСТВО</h3>
                                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                    <button onclick="setCount(1)" class="btn-icon btn-info">x1</button>
                                    <button onclick="setCount(2)" class="btn-icon btn-info">x2</button>
                                    <button onclick="setCount(3)" class="btn-icon btn-info">x3</button>
                                    <button onclick="setCount(4)" class="btn-icon btn-info">x4</button>
                                    <button onclick="setCount(5)" class="btn-icon btn-info">x5</button>
                                </div>
                            </div>
                        </div>
                        <div class="cashier-right">
                            <h3>🛒 КОРЗИНА</h3>
                            <div id="cartContainer" style="background:#1a1a2e; border-radius:20px; padding:15px;">${cartHtml || '<div style="text-align:center;color:#555;">Корзина пуста</div>'}</div>
                            <div class="total">💰 ИТОГО: ${total} коп</div>
                            <button class="btn-success" onclick="confirmOrder()">✅ ПОДТВЕРДИТЬ ЗАКАЗ</button>
                            <button class="btn-danger" onclick="clearCart()">🗑 ОЧИСТИТЬ</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function setCount(c) { currentCount = c; }
        function addToCart(service) { cart.push({ service, count: currentCount, price: prices[service] }); renderCashierScreen(); }
        function removeFromCart(idx) { cart.splice(idx, 1); renderCashierScreen(); }
        function clearCart() { cart = []; renderCashierScreen(); }
        
        function confirmOrder() {
            if(cart.length === 0) { alert("Корзина пуста!"); return; }
            const total = cart.reduce((s,i) => s + i.count * i.price, 0);
            const ticketId = counter;
            const code = generateCode();
            
            // Ищем свободного мастера
            const freeMaster = Object.entries(users).find(([id, u]) => u.role === "WORKER" && u.workStatus === "free");
            if(!freeMaster) {
                alert("Нет свободных мастеров! Заказ в очередь.");
                queue.push({ id: ticketId, items: [...cart], total, code, time: new Date().toLocaleTimeString() });
                logSystem(`Заказ №${ticketId} в очередь`, "INFO");
            } else {
                const masterId = freeMaster[0];
                const masterName = freeMaster[1].name;
                users[masterId].workStatus = "busy";
                tasks.push({ id: ticketId, items: [...cart], total, code, time: new Date().toLocaleTimeString(), master: masterName, status: "active" });
                announceNewOrder(ticketId, code);
                logSystem(`Заказ №${ticketId} создан, мастер: ${masterName}`, "INFO");
            }
            
            counter++;
            cart = [];
            renderCashierScreen();
        }
        
        // ============ ЭКРАН МАСТЕРА ============
        function renderWorkerScreen() {
            const myTasks = tasks.filter(t => t.master === currentWindow && t.status === "active");
            let tasksHtml = '';
            for(const task of myTasks) {
                const itemsText = task.items.map(i => `${i.service} x${i.count}`).join(', ');
                tasksHtml += `
                    <div class="task-card" onclick="selectTask(${task.id})">
                        <strong>🎫 БИЛЕТ №${task.id}</strong><br>
                        📦 ${itemsText}<br>
                        💰 ${task.total} коп<br>
                        🔑 ${task.code}
                    </div>
                `;
            }
            if(!tasksHtml) tasksHtml = '<div style="text-align:center;color:#555;">✨ НЕТ ЗАКАЗОВ ✨</div>';
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h1>🎨 ${currentWindow}</h1>
                        <div>
                            <button class="btn-icon btn-info" onclick="toggleFullscreenClock()">🕐 ЧАСЫ</button>
                            <button class="btn-icon btn-danger" onclick="logout()">🚪 ВЫХОД</button>
                        </div>
                    </div>
                    <div class="worker-layout">
                        <div class="worker-tasks">
                            <h3>📋 МОИ ЗАДАНИЯ</h3>
                            <div id="tasksContainer">${tasksHtml}</div>
                        </div>
                        <div class="worker-tasks">
                            <h3>🔍 ПОИСК ПО КОДУ</h3>
                            <input type="text" id="searchCode" placeholder="6-значный код">
                            <button onclick="searchByCode()" class="btn-info">🔍 НАЙТИ</button>
                            <div id="currentTaskCard" class="stat-card" style="margin-top:15px;">
                                <div style="text-align:center;color:#555;">Нет активного заказа</div>
                            </div>
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <button onclick="clientArrived()" class="btn-warning">👋 КЛИЕНТ ПРИШЁЛ</button>
                                <button onclick="sendProblem()" class="btn-danger">🔴 ПРОБЛЕМА</button>
                                <button onclick="completeTask()" class="btn-success">✅ ЗАВЕРШИТЬ</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function selectTask(taskId) {
            currentTask = tasks.find(t => t.id === taskId);
            if(currentTask) {
                const itemsText = currentTask.items.map(i => `• ${i.service} x${i.count} = ${i.count * i.price} коп`).join('<br>');
                document.getElementById('currentTaskCard').innerHTML = `
                    <div class="stat-value">🎫 БИЛЕТ №${currentTask.id}</div>
                    <div style="margin:10px 0;">${itemsText}</div>
                    <div><strong>💰 ИТОГО: ${currentTask.total} коп</strong></div>
                    <div>🔑 Код: ${currentTask.code}</div>
                `;
            }
        }
        
        function searchByCode() {
            const code = document.getElementById('searchCode').value;
            const task = tasks.find(t => t.code === code);
            if(task) {
                selectTask(task.id);
                alert(`Заказ найден! Билет №${task.id}`);
            } else {
                alert("Заказ не найден!");
            }
        }
        
        function clientArrived() {
            if(!currentTask) { alert("Нет активного заказа!"); return; }
            speakText("Здравствуйте, присаживайтесь! Выберите татуировку");
            alert(`👋 Клиент пришёл на билет №${currentTask.id}`);
        }
        
        function sendProblem() {
            alert("🔴 Сигнал о проблеме отправлен кассиру");
            logSystem(`Проблема от ${currentWindow}`, "WARNING");
        }
        
        function completeTask() {
            if(!currentTask) { alert("Нет активного заказа!"); return; }
            const index = tasks.findIndex(t => t.id === currentTask.id);
            if(index !== -1) tasks.splice(index, 1);
            const masterId = Object.keys(users).find(id => users[id].name === currentWindow);
            if(masterId) users[masterId].workStatus = "free";
            users[currentUser].todayOrders++;
            speakText("Хорошего дня, будем ждать вас снова");
            alert(`✅ Заказ №${currentTask.id} завершён!`);
            currentTask = null;
            renderWorkerScreen();
        }
        
        // ============ АДМИН-ПАНЕЛЬ ============
        function showAdminPanel() {
            const onlineCount = Object.values(users).filter(u => u.online).length;
            const busyCount = Object.values(users).filter(u => u.workStatus === 'busy').length;
            const activeTasks = tasks.length;
            const queueCount = queue.length;
            
            let usersHtml = '';
            for(const [id, user] of Object.entries(users)) {
                usersHtml += `
                    <div class="user-card" style="border-left-color: ${user.online ? '#00ff66' : '#ff2a6d'}">
                        <div><strong>${user.name}</strong> (ID: ${id})</div>
                        <div>${user.online ? '🟢 Онлайн' : '⚫ Оффлайн'} | ${user.workStatus === 'free' ? '🟢 Свободен' : (user.workStatus === 'busy' ? '🔴 Занят' : '🟡 Перерыв')}</div>
                        <div>📊 ${user.todayOrders} заказов</div>
                        <div>📱 ${user.deviceModel}</div>
                        <div>
                            <button class="btn-icon btn-warning" onclick="toggleWorkerBreak('${id}')">🟡 Перерыв</button>
                            <button class="btn-icon btn-success" onclick="freeWorker('${id}')">🔓 Освободить</button>
                            <button class="btn-icon btn-danger" onclick="kickWorker('${id}')">🚪 Выгнать</button>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <h1>👑 АДМИН-ПАНЕЛЬ</h1>
                        <button class="btn-icon btn-info" onclick="renderCashierScreen()">◀ НАЗАД</button>
                    </div>
                    <div class="admin-tabs">
                        <button class="tab-btn active" onclick="showAdminTab('dashboard')">📊 ДАШБОРД</button>
                        <button class="tab-btn" onclick="showAdminTab('users')">👥 ПОЛЬЗОВАТЕЛИ</button>
                        <button class="tab-btn" onclick="showAdminTab('tasks')">📋 ЗАКАЗЫ</button>
                        <button class="tab-btn" onclick="showAdminTab('errors')">⚠️ ОШИБКИ</button>
                        <button class="tab-btn" onclick="showAdminTab('logs')">📋 ЛОГИ</button>
                        <button class="tab-btn" onclick="showAdminTab('commands')">📡 КОМАНДЫ</button>
                    </div>
                    <div id="adminContent">
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-value">${Object.keys(users).length}</div><div>Пользователей</div></div>
                            <div class="stat-card"><div class="stat-value">${onlineCount}</div><div>Онлайн</div></div>
                            <div class="stat-card"><div class="stat-value">${busyCount}</div><div>Заняты</div></div>
                            <div class="stat-card"><div class="stat-value">${activeTasks}</div><div>Активных заказов</div></div>
                            <div class="stat-card"><div class="stat-value">${queueCount}</div><div>В очереди</div></div>
                            <div class="stat-card"><div class="stat-value">${errorLog.length}</div><div>Ошибок</div></div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card"><button class="btn-icon btn-success" onclick="refreshAdmin()">🔄 ОБНОВИТЬ</button></div>
                            <div class="stat-card"><button class="btn-icon btn-warning" onclick="clearAllLogs()">🗑 ОЧИСТИТЬ ЛОГИ</button></div>
                            <div class="stat-card"><button class="btn-icon btn-info" onclick="exportFullReport()">📄 ЭКСПОРТ</button></div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function showAdminTab(tabName) {
            const content = document.getElementById('adminContent');
            if(tabName === 'dashboard') {
                const onlineCount = Object.values(users).filter(u => u.online).length;
                const busyCount = Object.values(users).filter(u => u.workStatus === 'busy').length;
                content.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${Object.keys(users).length}</div><div>Пользователей</div></div>
                        <div class="stat-card"><div class="stat-value">${onlineCount}</div><div>Онлайн</div></div>
                        <div class="stat-card"><div class="stat-value">${busyCount}</div><div>Заняты</div></div>
                        <div class="stat-card"><div class="stat-value">${tasks.length}</div><div>Активных</div></div>
                        <div class="stat-card"><div class="stat-value">${queue.length}</div><div>В очереди</div></div>
                        <div class="stat-card"><div class="stat-value">${errorLog.length}</div><div>Ошибок</div></div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><button class="btn-icon btn-success" onclick="refreshAdmin()">🔄 ОБНОВИТЬ</button></div>
                        <div class="stat-card"><button class="btn-icon btn-warning" onclick="clearAllData()">⚠️ СБРОС ВСЕХ ДАННЫХ</button></div>
                        <div class="stat-card"><button class="btn-icon btn-danger" onclick="clearAllOrders()">❌ ОЧИСТИТЬ ЗАКАЗЫ</button></div>
                    </div>
                `;
            }
            else if(tabName === 'users') {
                let usersHtml = '';
                for(const [id, user] of Object.entries(users)) {
                    usersHtml += `
                        <div class="user-card" style="border-left-color: ${user.online ? '#00ff66' : '#ff2a6d'}">
                            <div><strong>${user.name}</strong> (ID: ${id})</div>
                            <div>${user.online ? '🟢 Онлайн' : '⚫ Оффлайн'} | ${user.workStatus === 'free' ? '🟢 Свободен' : (user.workStatus === 'busy' ? '🔴 Занят' : '🟡 Перерыв')}</div>
                            <div>📊 ${user.todayOrders} заказов</div>
                            <div>📱 ${user.deviceModel}</div>
                            <div>
                                <button class="btn-icon btn-warning" onclick="toggleWorkerBreak('${id}')">🟡 Перерыв</button>
                                <button class="btn-icon btn-success" onclick="freeWorker('${id}')">🔓 Освободить</button>
                                <button class="btn-icon btn-danger" onclick="kickWorker('${id}')">🚪 Выгнать</button>
                                <button class="btn-icon btn-purple" onclick="showWorkerDetails('${id}')">📱 Детали</button>
                            </div>
                        </div>
                    `;
                }
                content.innerHTML = `
                    <div style="margin-bottom:15px;"><button class="btn-icon btn-success" onclick="addNewUser()">➕ ДОБАВИТЬ ПОЛЬЗОВАТЕЛЯ</button></div>
                    ${usersHtml}
                `;
            }
            else if(tabName === 'tasks') {
                let tasksHtml = '';
                for(const task of tasks) {
                    const itemsText = task.items.map(i => `${i.service} x${i.count}`).join(', ');
                    tasksHtml += `
                        <div class="user-card">
                            <div><strong>🎫 БИЛЕТ №${task.id}</strong></div>
                            <div>📦 ${itemsText}</div>
                            <div>💰 ${task.total} коп</div>
                            <div>🎨 ${task.master}</div>
                            <div><button class="btn-icon btn-danger" onclick="cancelTask(${task.id})">🗑 ОТМЕНИТЬ</button></div>
                        </div>
                    `;
                }
                if(!tasksHtml) tasksHtml = '<div style="text-align:center;color:#555;">✨ НЕТ АКТИВНЫХ ЗАКАЗОВ ✨</div>';
                content.innerHTML = tasksHtml;
            }
            else if(tabName === 'errors') {
                content.innerHTML = `
                    <div style="margin-bottom:15px;">
                        <button class="btn-icon btn-success" onclick="clearAllErrors()">✅ ОЧИСТИТЬ ОШИБКИ</button>
                        <button class="btn-icon btn-info" onclick="exportErrors()">📄 ЭКСПОРТ</button>
                    </div>
                    <div class="error-log" id="errorLogContainer"></div>
                `;
                updateErrorDisplay();
            }
            else if(tabName === 'logs') {
                content.innerHTML = `
                    <div style="margin-bottom:15px;">
                        <button class="btn-icon btn-warning" onclick="clearAllLogs()">🗑 ОЧИСТИТЬ ЛОГИ</button>
                        <button class="btn-icon btn-info" onclick="exportLogs()">📄 ЭКСПОРТ</button>
                    </div>
                    <div class="log-container" id="systemLogsContainer"></div>
                `;
                updateSystemLogsDisplay();
            }
            else if(tabName === 'commands') {
                content.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card"><button class="btn-icon btn-info" onclick="sendCommandToAll('refresh')">🔄 ОБНОВИТЬ ВСЕМ</button></div>
                        <div class="stat-card"><button class="btn-icon btn-danger" onclick="sendCommandToAll('logout')">🚪 ВЫГНАТЬ ВСЕХ</button></div>
                        <div class="stat-card"><button class="btn-icon btn-warning" onclick="sendCommandToAll('break')">🟡 ПЕРЕРЫВ ВСЕМ</button></div>
                        <div class="stat-card"><button class="btn-icon btn-success" onclick="sendCommandToAll('resume')">✅ ВЕРНУТЬ ВСЕХ</button></div>
                        <div class="stat-card"><button class="btn-icon btn-purple" onclick="showClockToAll()">🕐 ЧАСЫ ВСЕМ</button></div>
                    </div>
                `;
            }
        }
        
        // ============ АДМИН-ФУНКЦИИ ============
        function toggleWorkerBreak(userId) {
            const newStatus = users[userId].workStatus === 'break' ? 'free' : 'break';
            users[userId].workStatus = newStatus;
            logSystem(`Пользователь ${userId} ${newStatus === 'break' ? 'на перерыве' : 'вернулся'}`, "INFO");
            showAdminPanel();
        }
        
        function freeWorker(userId) {
            users[userId].workStatus = 'free';
            logSystem(`Пользователь ${userId} освобождён`, "INFO");
            showAdminPanel();
        }
        
        function kickWorker(userId) {
            users[userId].online = false;
            users[userId].workStatus = 'free';
            logSystem(`Пользователь ${userId} выгнан`, "WARNING");
            showAdminPanel();
        }
        
        function showWorkerDetails(userId) {
            const user = users[userId];
            alert(`📱 ДЕТАЛИ УСТРОЙСТВА\nИмя: ${user.name}\nID: ${userId}\nУстройство: ${user.deviceModel}\nСтатус: ${user.online ? 'Онлайн' : 'Оффлайн'}\nРабота: ${user.workStatus}\nЗаказов: ${user.todayOrders}`);
        }
        
        function addNewUser() {
            const newId = prompt("Введите ID (1-99):");
            if(!newId) return;
            const newName = prompt("Введите имя:");
            if(!newName) return;
            const newPass = prompt("Введите пароль:");
            if(!newPass) return;
            users[newId] = {
                password: newPass,
                role: "WORKER",
                name: newName,
                workStatus: "free",
                online: false,
                todayOrders: 0,
                deviceModel: "New Device"
            };
            logSystem(`Добавлен пользователь ${newName} (ID: ${newId})`, "INFO");
            showAdminPanel();
        }
        
        function cancelTask(taskId) {
            const index = tasks.findIndex(t => t.id === taskId);
            if(index !== -1) {
                tasks.splice(index, 1);
                logSystem(`Заказ №${taskId} отменён`, "WARNING");
                showAdminPanel();
            }
        }
        
        function refreshAdmin() {
            logSystem("Статистика обновлена", "INFO");
            showAdminPanel();
        }
        
        function clearAllErrors() {
            errorLog = [];
            updateErrorDisplay();
            logSystem("Лог ошибок очищен", "INFO");
            showAdminPanel();
        }
        
        function clearAllLogs() {
            systemLogs = [];
            updateSystemLogsDisplay();
            logSystem("Лог системы очищен", "INFO");
            showAdminPanel();
        }
        
        function clearAllData() {
            if(confirm("⚠️ ВНИМАНИЕ! Это удалит ВСЕ ДАННЫЕ (пользователи, заказы, очередь)!")) {
                tasks = [];
                queue = [];
                counter = 1;
                errorLog = [];
                systemLogs = [];
                logSystem("ВСЕ ДАННЫЕ СБРОШЕНЫ", "ERROR");
                alert("Данные сброшены");
                showAdminPanel();
            }
        }
        
        function clearAllOrders() {
            if(confirm("Удалить ВСЕ активные заказы?")) {
                tasks = [];
                queue = [];
                logSystem("Все заказы удалены", "WARNING");
                alert("Заказы удалены");
                showAdminPanel();
            }
        }
        
        function exportFullReport() {
            const report = {
                timestamp: new Date().toISOString(),
                users: users,
                tasks: tasks,
                queue: queue,
                errors: errorLog.slice(0, 100),
                logs: systemLogs.slice(0, 200)
            };
            downloadJSON(report, `lion_full_report_${Date.now()}.json`);
            logSystem("Полный отчёт экспортирован", "INFO");
        }
        
        function exportErrors() {
            downloadJSON(errorLog, `lion_errors_${Date.now()}.json`);
        }
        
        function exportLogs() {
            downloadJSON(systemLogs, `lion_logs_${Date.now()}.json`);
        }
        
        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function sendCommandToAll(cmd) {
            logSystem(`Команда "${cmd}" отправлена всем`, "INFO");
            alert(`Команда "${cmd}" отправлена`);
            if(cmd === 'break') {
                for(const id in users) {
                    if(users[id].role === "WORKER") users[id].workStatus = 'break';
                }
            }
            if(cmd === 'resume') {
                for(const id in users) {
                    if(users[id].role === "WORKER") users[id].workStatus = 'free';
                }
            }
        }
        
        function showClockToAll() {
            for(const id in users) {
                if(users[id].role === "WORKER" && users[id].online) {
                    // Симулируем отправку команды
                }
            }
            alert("🕐 Команда 'Показать часы' отправлена всем мастерам");
            logSystem("Команда 'Показать часы' отправлена всем", "INFO");
        }
        
        // ============ ЧАСЫ ============
        function toggleFullscreenClock() {
            if(fullscreenClockActive) {
                closeFullscreenClock();
            } else {
                showFullscreenClock();
            }
        }
        
        function showFullscreenClock() {
            fullscreenClockActive = true;
            const overlay = document.createElement('div');
            overlay.className = 'fullscreen-clock';
            overlay.id = 'fullscreenClock';
            overlay.innerHTML = `
                <div class="clock-time" id="clockTime">--:--:--</div>
                <div class="clock-date" id="clockDate">--</div>
                <button onclick="closeFullscreenClock()" style="position:absolute; top:20px; right:20px; width:auto; padding:10px 20px;">✕ ЗАКРЫТЬ</button>
            `;
            document.body.appendChild(overlay);
            
            function updateClock() {
                const now = new Date();
                document.getElementById('clockTime').innerHTML = now.toLocaleTimeString('ru-RU');
                document.getElementById('clockDate').innerHTML = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            }
            updateClock();
            window.clockInterval = setInterval(updateClock, 1000);
        }
        
        function closeFullscreenClock() {
            const el = document.getElementById('fullscreenClock');
            if(el) el.remove();
            if(window.clockInterval) clearInterval(window.clockInterval);
            fullscreenClockActive = false;
        }
        
        function logout() {
            if(currentUser) users[currentUser].online = false;
            currentUser = null;
            renderLoginScreen();
        }
        
        // ============ ЗАПУСК ============
        loadRussianVoice();
        logSystem("Система загружена", "INFO");
        renderLoginScreen();
    </script>
</body>
</html>
