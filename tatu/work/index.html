
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LION t.A.T.u. — Рабочий терминал</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.3);
            border: 1px solid rgba(5, 217, 232, 0.3);
        }
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 280px; }
        .card {
            background: #1a1a2e;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(5, 217, 232, 0.2);
        }
        .ticket-card { cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .ticket-card:hover { border-color: #05d9e8; transform: translateX(5px); }
        .ticket-number { font-size: 2em; color: #ff2a6d; font-weight: bold; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-free { background: #00ff66; color: #0a0a0f; }
        .status-busy { background: #ff0000; color: white; }
        .status-break { background: #ffcc00; color: #0a0a0f; }
        .status-waiting { background: #ffcc00; color: #0a0a0f; }
        .status-session { background: #b300ff; color: white; }
        .window-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
            gap: 10px;
            flex-wrap: wrap;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .total { font-size: 1.5em; font-weight: bold; color: #00ff66; text-align: right; padding: 10px; }
        .clock { font-size: 2em; font-family: monospace; color: #05d9e8; text-align: right; }
        button {
            padding: 12px 20px;
            font-size: 1em;
            background: #05d9e8;
            border: none;
            border-radius: 35px;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .btn-danger { background: #ff0000; color: white; }
        .btn-success { background: #00ff66; color: #0a0a0f; }
        .btn-warning { background: #ff6600; color: white; }
        .btn-purple { background: #b300ff; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #252540;
            border: 1px solid #05d9e8;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
        }
        h1 { text-align: center; color: #ff2a6d; font-size: 1.8em; margin-bottom: 15px; }
        h2 { color: #05d9e8; font-size: 1.2em; margin-bottom: 10px; }
        h3 { color: #ffcc00; font-size: 1em; margin-bottom: 8px; }
        .error { color: #ff0000; text-align: center; padding: 10px; }
        .success { color: #00ff66; text-align: center; padding: 10px; }
        .tts-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #252540;
            padding: 10px;
            border-radius: 25px;
            margin-bottom: 15px;
        }
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode-btn { flex: 1; text-align: center; }
        .mode-btn.active { background: #00ff66; color: #0a0a0f; }
        .floating-code {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e, #0a0a0f);
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 0 20px rgba(0,255,102,0.3);
            z-index: 1000;
            text-align: center;
            animation: fadeInOut 10s ease;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(50px); }
            10% { opacity: 1; transform: translateX(0); }
            80% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(50px); visibility: hidden; }
        }
        .problem-notify {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: linear-gradient(135deg, #ff0000, #990000);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
            z-index: 1000;
        }
        .queue-container-scroll {
            max-height: 300px;
            overflow-y: auto;
        }
        .queue-item {
            border-bottom: 1px solid #333;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .queue-item:hover {
            background: #252540;
        }
        .queue-wait {
            color: #ffcc00;
            font-size: 11px;
            margin-top: 5px;
        }
        .queue-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
        }
        .queue-nav button {
            flex: 1;
            padding: 8px;
            font-size: 14px;
        }
        .current-page {
            color: #00ff66;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .flex-row { flex-direction: column; }
            .window-row { flex-direction: column; align-items: stretch; }
            button { width: 100%; }
            .problem-notify { left: 10px; right: 10px; }
            .floating-code { left: 10px; right: 10px; bottom: 10px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ============ FIREBASE КОНФИГ (ОСНОВНАЯ БАЗА) ============
        const MAIN_FIREBASE_CONFIG = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "https://pvz-database-default-rtdb.firebaseio.com/",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // ============ FIREBASE КОНФИГ (БАЗА ЧЕКОВ) ============
        const CHEKI_FIREBASE_CONFIG = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "https://cheki-tatu-save-default-rtdb.firebaseio.com/",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Инициализация ДВУХ баз
        firebase.initializeApp(MAIN_FIREBASE_CONFIG, 'main');
        firebase.initializeApp(CHEKI_FIREBASE_CONFIG, 'cheki');
        
        const database = firebase.app('main').database();
        const chekiDatabase = firebase.app('cheki').database();
        
        // ============ ПЕРЕМЕННЫЕ ============
        let currentUser = null;
        let currentRole = null;
        let currentWindow = null;
        let cart = [];
        let currentCount = 1;
        let ttsEnabled = true;
        let voices = [];
        let selectedVoice = null;
        let currentTicketNumber = 1;
        let distributionMode = "auto";
        let windowPriorities = {};
        let currentActiveTask = null;
        let problemListenerStarted = false;
        let queueCurrentPage = 1;
        let queueItemsPerPage = 5;
        
        const prices = { "ручка": 4, "маркер": 6 };
        
        // ============ TTS ============
        function initTTS() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.onvoiceschanged = () => {
                    voices = window.speechSynthesis.getVoices();
                    selectedVoice = voices.find(v => v.lang.includes('ru')) || voices[0];
                };
                voices = window.speechSynthesis.getVoices();
                selectedVoice = voices.find(v => v.lang.includes('ru')) || voices[0];
            }
        }
        
        function speak(text) {
            if (!ttsEnabled) return;
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                if (selectedVoice) utterance.voice = selectedVoice;
                utterance.rate = 0.85;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        }
        
        // ============ ГЕНЕРАЦИЯ ============
        function generate6DigitCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            if (ua.includes("iPhone")) return "iPhone";
            if (ua.includes("iPad")) return "iPad";
            if (ua.includes("Android")) return "Android";
            if (ua.includes("Windows")) return "Windows PC";
            if (ua.includes("Mac")) return "Mac";
            return "Unknown";
        }
        
        // ============ ИНИЦИАЛИЗАЦИЯ ПОЛЬЗОВАТЕЛЕЙ ============
        async function initDefaultUsers() {
            const snapshot = await database.ref('users').once('value');
            if (snapshot.exists()) return;
            
            const defaultUsers = {
                "0": { password: "admin123321", role: "CASHBOX", name: "Касса", workStatus: "free", online: false, priority: 0, todayOrders: 0 },
                "1": { password: "okno1", role: "WORKER", name: "Александр", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                "2": { password: "okno2", role: "WORKER", name: "Мария", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                "3": { password: "okno3", role: "WORKER", name: "Иван", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                "4": { password: "okno4", role: "WORKER", name: "Екатерина", workStatus: "free", online: false, priority: 1, todayOrders: 0 }
            };
            
            for (const [key, value] of Object.entries(defaultUsers)) {
                await database.ref(`users/${key}`).set(value);
            }
            
            await database.ref('settings/distributionMode').set("auto");
            await database.ref('settings/windowPriorities').set({ "1": 1, "2": 1, "3": 1, "4": 1 });
            await database.ref('counter').set(1);
            await initDefaultSchedule();
        }
        
        async function initDefaultSchedule() {
            const snapshot = await database.ref('schedule').once('value');
            if (snapshot.exists()) return;
            
            const defaultSchedule = {};
            for (let hour = 12; hour <= 20; hour++) {
                for (const minute of ['00', '15', '30', '45']) {
                    const time = `${hour}:${minute}`;
                    defaultSchedule[time] = { available: true, bookedBy: null };
                }
            }
            await database.ref('schedule').set(defaultSchedule);
        }
        
        // ============ АВТОРИЗАЦИЯ ============
        async function login(windowNumber, password) {
            const snapshot = await database.ref(`users/${windowNumber}`).once('value');
            const userData = snapshot.val();
            
            if (!userData) { showError("Неверный номер окна!"); return false; }
            if (userData.password !== password) { showError("Неверный пароль!"); return false; }
            
            await database.ref(`users/${windowNumber}`).update({
                online: true,
                lastSeen: Date.now(),
                deviceModel: getDeviceInfo()
            });
            
            currentUser = windowNumber;
            currentRole = userData.role;
            currentWindow = userData.name;
            
            localStorage.setItem('user', JSON.stringify({
                windowNumber: windowNumber,
                role: userData.role,
                name: userData.name
            }));
            
            initTTS();
            return true;
        }
        
        async function logout() {
            if (currentUser) await database.ref(`users/${currentUser}`).update({ online: false });
            if (problemListenerStarted) {
                database.ref('problems').off();
                problemListenerStarted = false;
            }
            currentUser = null; currentRole = null; currentWindow = null;
            localStorage.removeItem('user');
            renderLoginScreen();
        }
        
        // ============ ЗАГРУЗКА ДАННЫХ ============
        async function loadCounter() {
            const snapshot = await database.ref('counter').once('value');
            return snapshot.val() || 1;
        }
        
        async function updateCounter(value) {
            await database.ref('counter').set(value);
        }
        
        async function loadTasks() {
            const snapshot = await database.ref('tasks').once('value');
            return snapshot.val() || {};
        }
        
        async function saveTask(task) {
            await database.ref(`tasks/${task.id}`).set(task);
        }
        
        async function deleteTask(taskId) {
            await database.ref(`tasks/${taskId}`).remove();
        }
        
        async function updateTaskStatus(taskId, status, master = null) {
            const taskRef = database.ref(`tasks/${taskId}`);
            const snapshot = await taskRef.once('value');
            const task = snapshot.val();
            if (task) {
                task.status = status;
                if (master) task.master = master;
                await taskRef.set(task);
            }
        }
        
        async function loadUsers() {
            const snapshot = await database.ref('users').once('value');
            return snapshot.val() || {};
        }
        
        async function updateUserStatus(windowNumber, status) {
            await database.ref(`users/${windowNumber}/workStatus`).set(status);
        }
        
        async function updateUserTodayOrders(windowNumber, increment = true) {
            const userRef = database.ref(`users/${windowNumber}`);
            const snapshot = await userRef.once('value');
            const user = snapshot.val();
            if (user) {
                const newCount = (user.todayOrders || 0) + (increment ? 1 : 0);
                await userRef.update({ todayOrders: newCount });
            }
        }
        
        // ============ РАСПРЕДЕЛЕНИЕ ЗАКАЗОВ ============
        async function loadDistributionSettings() {
            const modeSnap = await database.ref('settings/distributionMode').once('value');
            distributionMode = modeSnap.val() || "auto";
            const prioritiesSnap = await database.ref('settings/windowPriorities').once('value');
            windowPriorities = prioritiesSnap.val() || { "1": 1, "2": 1, "3": 1, "4": 1 };
        }
        
        async function saveDistributionMode(mode) {
            distributionMode = mode;
            await database.ref('settings/distributionMode').set(mode);
            showSuccess(`Режим распределения: ${mode === 'auto' ? 'Автоматический' : mode === 'manual' ? 'Ручной' : 'Приоритетный'}`);
            if (currentRole === 'CASHBOX') renderCashierScreen();
        }
        
        async function saveWindowPriority(windowNum, priority) {
            windowPriorities[windowNum] = priority;
            await database.ref('settings/windowPriorities').set(windowPriorities);
            await database.ref(`users/${windowNum}/priority`).set(priority);
            showSuccess(`Приоритет окна ${windowNum} установлен на ${priority}`);
        }
        
        async function getAvailableSlots() {
            const schedule = await database.ref('schedule').once('value');
            const scheduleData = schedule.val() || {};
            const tasks = await loadTasks();
            const bookedTimes = Object.values(tasks).map(t => t.appointmentTime).filter(t => t);
            
            const slots = [];
            for (const [time, data] of Object.entries(scheduleData)) {
                if (data.available && !bookedTimes.includes(time)) {
                    slots.push(time);
                }
            }
            return slots.sort();
        }
        
        // ============ ОЧЕРЕДЬ ============
        async function addToQueue(orderData) {
            const queueId = Date.now();
            await database.ref(`queue/${queueId}`).set({
                ...orderData,
                queueId: queueId,
                queuedAt: Date.now(),
                status: "waiting"
            });
        }
        
        async function getNextFromQueue() {
            const snapshot = await database.ref('queue').orderByChild('queuedAt').once('value');
            const queue = snapshot.val() || {};
            const sorted = Object.values(queue).sort((a, b) => a.queuedAt - b.queuedAt);
            return sorted[0] || null;
        }
        
        async function getAllQueueItems() {
            const snapshot = await database.ref('queue').orderByChild('queuedAt').once('value');
            const queue = snapshot.val() || {};
            return Object.values(queue).sort((a, b) => a.queuedAt - b.queuedAt);
        }
        
        async function removeFromQueue(queueId) {
            await database.ref(`queue/${queueId}`).remove();
        }
        
        async function assignOrderToMaster(order, masterNum) {
            const users = await loadUsers();
            const masterName = users[masterNum]?.name || `Окно ${masterNum}`;
            
            await updateUserStatus(masterNum, "busy");
            
            const task = {
                id: order.id,
                code6: order.code6,
                items: order.items,
                total: order.total,
                time: order.time,
                appointmentTime: order.appointmentTime,
                status: "waiting",
                master: masterName,
                clientStatus: "waiting",
                createdAt: order.createdAt,
                windowNum: masterNum
            };
            
            await saveTask(task);
            
            showSuccess(`✅ ЗАКАЗ №${order.id} автоматически назначен ${masterName}`);
            speak(`Заказ номер ${order.id} назначен ${masterName}`, false);
            
            if (currentRole === 'CASHBOX') {
                await loadWindowsStatus();
                await updateTimeSelect();
                await loadQueueDisplay();
            }
        }
        
        async function loadQueueDisplay() {
            const container = document.getElementById('queueContainer');
            if (!container) return;
            
            const allItems = await getAllQueueItems();
            const totalPages = Math.ceil(allItems.length / queueItemsPerPage);
            const startIndex = (queueCurrentPage - 1) * queueItemsPerPage;
            const pageItems = allItems.slice(startIndex, startIndex + queueItemsPerPage);
            
            if (allItems.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #555; padding: 15px;">✨ ОЧЕРЕДЬ ПУСТА ✨</div>';
                return;
            }
            
            let html = `<div class="queue-container-scroll">`;
            for (const order of pageItems) {
                const itemsText = order.items.map(item => `${item.service} x${item.count}`).join(', ');
                const waitMinutes = Math.ceil((order.queuedAt + 5 * 60000 - Date.now()) / 60000);
                html += `
                    <div class="queue-item" onclick="showQueueItemDetails('${order.queueId}')">
                        <div><strong>🎫 БИЛЕТ №${order.id}</strong> | ⏰ ${order.appointmentTime} | 💰 ${order.total} коп</div>
                        <div style="font-size: 13px; color: #aaa;">📦 ${itemsText}</div>
                        <div style="font-size: 12px; color: #05d9e8;">🔑 Код: ${order.code6}</div>
                        <div class="queue-wait">⏳ В очереди: ${waitMinutes > 0 ? waitMinutes : 0} мин</div>
                        <button onclick="event.stopPropagation(); removeQueueItem('${order.queueId}')" class="btn-sm btn-danger" style="margin-top: 5px;">🗑 Удалить из очереди</button>
                    </div>
                `;
            }
            html += `</div>`;
            
            if (totalPages > 1) {
                html += `
                    <div class="queue-nav">
                        <button onclick="changeQueuePage(-1)" class="btn-sm" ${queueCurrentPage === 1 ? 'disabled' : ''}>◀ Назад</button>
                        <span class="current-page">Страница ${queueCurrentPage} из ${totalPages}</span>
                        <button onclick="changeQueuePage(1)" class="btn-sm" ${queueCurrentPage === totalPages ? 'disabled' : ''}>Вперед ▶</button>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function changeQueuePage(delta) {
            queueCurrentPage += delta;
            if (queueCurrentPage < 1) queueCurrentPage = 1;
            loadQueueDisplay();
        }
        
        async function showQueueItemDetails(queueId) {
            const snapshot = await database.ref(`queue/${queueId}`).once('value');
            const order = snapshot.val();
            if (order) {
                const itemsText = order.items.map(item => `${item.service.toUpperCase()} x${item.count} = ${item.count * item.price} коп`).join('\n');
                alert(`🎫 БИЛЕТ №${order.id}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📦 СОСТАВ:\n${itemsText}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n💰 ИТОГО: ${order.total} коп\n🔑 КОД: ${order.code6}\n⏰ ВРЕМЯ: ${order.appointmentTime}`);
            }
        }
        
        async function removeQueueItem(queueId) {
            if (confirm("Удалить заказ из очереди?")) {
                await removeFromQueue(queueId);
                await loadQueueDisplay();
                showSuccess("✅ Заказ удалён из очереди");
            }
        }
        
        function startQueueListener() {
            database.ref('users').on('child_changed', async (snapshot) => {
                const user = snapshot.val();
                if (user && user.role === "WORKER" && user.workStatus === "free") {
                    const nextOrder = await getNextFromQueue();
                    if (nextOrder) {
                        await removeFromQueue(nextOrder.queueId);
                        await assignOrderToMaster(nextOrder, snapshot.key);
                        await loadQueueDisplay();
                    }
                }
            });
            
            database.ref('queue').on('value', () => {
                if (currentRole === 'CASHBOX') loadQueueDisplay();
            });
        }
        
        // ============ СОХРАНЕНИЕ В БАЗУ ЧЕКОВ (ВТОРАЯ БАЗА) ============
        async function saveToCheckLog(checkData) {
            const logId = `${Date.now()}_${checkData.id}`;
            // Сохраняем во ВТОРУЮ базу (cheki-tatu-save)
            await chekiDatabase.ref(`checkLogs/${logId}`).set({
                ...checkData,
                logId: logId,
                timestamp: Date.now(),
                date: new Date().toLocaleDateString('ru-RU'),
                fullDateTime: new Date().toLocaleString('ru-RU')
            });
            console.log("✅ Чек сохранён во вторую базу:", logId);
        }
        
        async function getBestWindow() {
            const users = await loadUsers();
            let freeWindows = Object.entries(users)
                .filter(([_, u]) => u.role === "WORKER" && u.workStatus === "free")
                .map(([num, data]) => ({ 
                    num: parseInt(num), 
                    name: data.name, 
                    todayOrders: data.todayOrders || 0,
                    priority: windowPriorities[num] || 1
                }));
            
            if (freeWindows.length === 0) return null;
            
            if (distributionMode === "auto") {
                freeWindows.sort((a, b) => a.todayOrders - b.todayOrders);
                const minOrders = freeWindows[0].todayOrders;
                const leastBusy = freeWindows.filter(w => w.todayOrders === minOrders);
                if (leastBusy.length > 1) {
                    const lastWindow = parseInt(localStorage.getItem('lastWindow') || "0");
                    const sorted = leastBusy.sort((a, b) => a.num - b.num);
                    let nextIndex = sorted.findIndex(w => w.num === lastWindow) + 1;
                    if (nextIndex >= sorted.length) nextIndex = 0;
                    const selected = sorted[nextIndex];
                    localStorage.setItem('lastWindow', selected.num);
                    return selected.num;
                }
                return leastBusy[0].num;
            } else if (distributionMode === "priority") {

        async function confirmOrder() {
            if (cart.length === 0) { showError("Корзина пуста!"); return; }
            
            const total = cart.reduce((sum, item) => sum + item.count * item.price, 0);
            const ticketId = currentTicketNumber;
            const code6 = generate6DigitCode();
            const currentTime = new Date();
            
            let targetWindow = null;
            let appointmentTime = null;
            
            // Пытаемся найти свободного мастера
            if (distributionMode === "manual") {
                const users = await loadUsers();
                const freeWindows = Object.entries(users)
                    .filter(([_, u]) => u.role === "WORKER" && u.workStatus === "free");
                
                if (freeWindows.length > 0) {
                    const windowList = freeWindows.map(([num, u]) => `${num}: ${u.name}`).join('\n');
                    const selected = prompt(`Выберите окно:\n${windowList}\n\nВведите номер окна:`);
                    if (!selected || !freeWindows.find(([num]) => num === selected)) {
                        showError("Неверный выбор окна!");
                        return;
                    }
                    targetWindow = selected;
                }
            } else {
                targetWindow = await getBestWindow();
            }
            
            if (targetWindow) {
                // Есть свободный мастер — отправляем сразу
                const users = await loadUsers();
                const masterName = users[targetWindow]?.name || `Окно ${targetWindow}`;
                const timeSelect = document.getElementById('timeSelect');
                appointmentTime = timeSelect ? timeSelect.value : currentTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                
                await updateUserStatus(targetWindow, "busy");
                
                const task = {
                    id: ticketId,
                    code6: code6,
                    items: [...cart],
                    total: total,
                    time: currentTime.toLocaleTimeString('ru-RU'),
                    appointmentTime: appointmentTime,
                    status: "waiting",
                    master: masterName,
                    clientStatus: "waiting",
                    createdAt: Date.now(),
                    windowNum: targetWindow
                };
                
                await saveTask(task);
                
                // ============ СОХРАНЯЕМ ЧЕК ВО ВТОРУЮ БАЗУ ============
                await saveToCheckLog({
                    id: ticketId,
                    code6: code6,
                    items: [...cart],
                    total: total,
                    time: task.time,
                    appointmentTime: appointmentTime,
                    master: masterName,
                    windowNum: targetWindow,
                    status: "created"
                });
                
                showFloatingCode(code6, ticketId);
                showSuccess(`✅ БИЛЕТ №${ticketId}\n🔑 КОД: ${code6}\n💰 ${total} коп\n🎯 ${masterName}\n⏰ ${appointmentTime}`);
                await navigator.clipboard.writeText(code6);
                
            } else {
                // Нет свободных мастеров — ставим в очередь (+5 минут)
                const futureTime = new Date(currentTime.getTime() + 5 * 60000);
                const hours = futureTime.getHours().toString().padStart(2, '0');
                const minutes = futureTime.getMinutes().toString().padStart(2, '0');
                appointmentTime = `${hours}:${minutes}`;
                
                const orderData = {
                    id: ticketId,
                    code6: code6,
                    items: [...cart],
                    total: total,
                    time: currentTime.toLocaleTimeString('ru-RU'),
                    appointmentTime: appointmentTime,
                    status: "waiting",
                    createdAt: Date.now()
                };
                
                await addToQueue(orderData);
                
                // ============ СОХРАНЯЕМ ЧЕК ВО ВТОРУЮ БАЗУ ============
                await saveToCheckLog({
                    id: ticketId,
                    code6: code6,
                    items: [...cart],
                    total: total,
                    time: orderData.time,
                    appointmentTime: appointmentTime,
                    master: "В очереди",
                    windowNum: null,
                    status: "queued"
                });
                
                showFloatingCode(code6, ticketId);
                showSuccess(`⏰ БИЛЕТ №${ticketId} поставлен в ОЧЕРЕДЬ\n🔑 КОД: ${code6}\n💰 ${total} коп\n⏰ Примерное время: ${appointmentTime}\n\nМастер подойдёт автоматически!`);
                await navigator.clipboard.writeText(code6);

            await updateCounter(ticketId + 1);

            cart = [];

        async function takeOrder(taskId) {

            const task = tasks[taskId];
            if (!task || task.status !== "waiting") { 
                showError("Заказ уже взят!"); 
                return; 
            }
            
            await updateTaskStatus(taskId, "active", currentWindow);
            await updateUserStatus(currentUser, "busy");
            
            currentActiveTask = task;
            displayCurrentOrder(task);
            await loadWorkerTasks();
            showSuccess(`✅ Заказ №${task.id} взят в работу`);

        async function searchByCode() {
            const code = document.getElementById('codeInput').value.trim();
            if (code.length !== 6) { showError("Введите 6-значный код!"); return; }
            
            const tasks = await loadTasks();
            const task = Object.values(tasks).find(t => t.code6 === code);
            
            if (!task) { 
                showError("Заказ не найден!"); 
                return; 
            }
            
            if (task.status === "active" && task.master === currentWindow) {
                currentActiveTask = task;
                displayCurrentOrder(task);
                showSuccess(`Заказ найден! Билет №${task.id}`);
            } else if (task.status === "waiting") {
                await takeOrder(task.id);
            } else {
                showError(`Этот заказ уже ${task.status === "completed" ? "завершён" : "выполняет другой мастер"}`);
            }
        }

            const itemsText = task.items.map(i => `• ${i.service.toUpperCase()} x${i.count} = ${i.count * i.price} коп`).join('<br>');
            container.innerHTML = `
                <div class="ticket-number">🎫 БИЛЕТ №${task.id}</div>
                <div style="margin: 10px 0;">${itemsText}</div>
                <div><strong>💰 ИТОГО: ${task.total} коп</strong></div>
                <div>🔑 Код: ${task.code6}</div>
                <div>⏰ Заказано: ${task.time}</div>
                <div>⏰ Запись на: <strong style="color: #00ff66;">${task.appointmentTime || 'Сейчас'}</strong></div>
                <div style="margin-top: 10px;"><span class="status-badge status-session">🟣 СТАТУС: ${task.clientStatus === 'session' ? 'НА СЕАНСЕ' : 'ОЖИДАЕТ'}</span></div>
            `;
        }
        
        async function clientArrived() {
            if (!currentActiveTask) { showError("Нет активного заказа!"); return; }
            await updateTaskStatus(currentActiveTask.id, "active", currentWindow);
            await database.ref(`tasks/${currentActiveTask.id}`).update({ clientStatus: "session" });
            speak("Здравствуйте, присаживайтесь! Выберите татуировку");
            showSuccess(`👋 Клиент пришёл на сеанс (билет №${currentActiveTask.id})`);
            displayCurrentOrder(currentActiveTask);
        }
        
        async function completeOrder() {
            if (!currentActiveTask) { showError("Нет активного заказа!"); return; }
            
            await updateTaskStatus(currentActiveTask.id, "completed");
            await updateUserStatus(currentUser, "free");
            await deleteTask(currentActiveTask.id);
            
            speak("Хорошего дня, будем ждать вас снова");
            showSuccess(`✅ Заказ №${currentActiveTask.id} завершён!`);
            
            currentActiveTask = null;
            document.getElementById('currentOrderCard').innerHTML = '<div style="text-align: center; color: #555;">Нет активного заказа</div>';
            document.getElementById('codeInput').value = '';
            await loadWorkerTasks();
        }
        
        // ============ АДМИН-ПАНЕЛЬ ============
        async function showAdminPanel() {
            const users = await loadUsers();
            let windowsHtml = '';
            
            for (const [num, user] of Object.entries(users)) {
                if (user.role === "WORKER") {
                    windowsHtml += `
                        <div class="window-row">
                            <span><strong>${user.name}</strong></span>
                            <span>${user.online ? '🟢 Онлайн' : '⚫ Оффлайн'}</span>
                            <span>${user.deviceModel || 'Unknown'}</span>
                            <span>📊 заказов: <strong style="color: #00ff66;">${user.todayOrders || 0}</strong></span>
                            <span>${user.workStatus === 'free' ? '🟢 Свободен' : user.workStatus === 'busy' ? '🔴 Занят' : '🟡 Перерыв'}</span>
                            <div style="display: flex; gap: 5px;">
                                <button onclick="kickWorker(${num})" class="btn-danger btn-sm">🚪 ВЫГНАТЬ</button>
                                <button onclick="forceFreeWindow(${num})" class="btn-success btn-sm">🔓 Освободить</button>
                                <button onclick="setBreakByCashier(${num})" class="btn-warning btn-sm">🟡 Перерыв</button>
                            </div>
                        </div>
                    `;
                }
            }
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="container" style="max-width: 1000px; margin: 0 auto;">
                    <h1>👑 АДМИН-ПАНЕЛЬ</h1>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                        <button onclick="addNewWindow()" class="btn-success">➕ ДОБАВИТЬ ОКНО</button>
                        <button onclick="renderCashierScreen()" class="btn-purple">◀ НАЗАД</button>
                        <button onclick="forceLogoutAll()" class="btn-danger">🚪 ВЫГНАТЬ ВСЕХ</button>
                        <button onclick="clearAllTasks()" class="btn-warning">🗑 ОЧИСТИТЬ ВСЕ</button>
                        <button onclick="showSchedulePanel()" class="btn-warning">⏰ РАСПИСАНИЕ</button>
                        <button onclick="showCheckLogs()" class="btn-success">📊 ЛОГ ЧЕКОВ</button>
                    </div>
                    
                    <h2>🪟 УПРАВЛЕНИЕ ОКНАМИ</h2>
                    <div class="card">
                        <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; font-weight: bold; padding: 10px; border-bottom: 1px solid #333;">
                            <div>Окно</div><div>Статус</div><div>Устройство</div><div>Заказов</div><div>Работа</div><div>Действия</div>
                        </div>
                        ${windowsHtml}
                    </div>
                    
                    <h2>⚙️ НАСТРОЙКИ РАСПРЕДЕЛЕНИЯ</h2>
                    <div class="card">
                        <div class="mode-selector">
                            <button class="mode-btn ${distributionMode === 'auto' ? 'active' : ''}" onclick="saveDistributionMode('auto')">🔄 АВТО</button>
                            <button class="mode-btn ${distributionMode === 'manual' ? 'active' : ''}" onclick="saveDistributionMode('manual')">✋ РУЧНОЙ</button>
                            <button class="mode-btn ${distributionMode === 'priority' ? 'active' : ''}" onclick="saveDistributionMode('priority')">⭐ ПРИОРИТЕТ</button>
                        </div>
                        <div id="prioritySettings"></div>
                    </div>
                </div>
            `;
            
            if (distributionMode === 'priority') {
                const priorityDiv = document.getElementById('prioritySettings');
                priorityDiv.innerHTML = '<h3>Приоритет окон (меньше = выше)</h3><div style="display: flex; gap: 10px; flex-wrap: wrap;">';
                for (const [num, user] of Object.entries(users)) {
                    if (user.role === "WORKER") {
                        priorityDiv.innerHTML += `
                            <div style="background: #252540; border-radius: 20px; padding: 10px; text-align: center;">
                                <div>${user.name}</div>
                                <input type="number" id="priority_${num}" value="${windowPriorities[num] || 1}" min="1" max="10" style="width: 60px; text-align: center;">
                                <button onclick="setPriority(${num})" class="btn-sm btn-success">💾</button>
                            </div>
                        `;
                    }
                }
                priorityDiv.innerHTML += '</div>';
            }
        }
        
        async function setPriority(windowNum) {
            const input = document.getElementById(`priority_${windowNum}`);
            const priority = parseInt(input.value);
            await saveWindowPriority(windowNum, priority);
            showAdminPanel();
        }
        
        async function kickWorker(windowNum) {
            await database.ref(`users/${windowNum}`).update({ online: false, workStatus: "free" });
            await database.ref(`commands/${windowNum}`).set({ action: "logout", timestamp: Date.now() });
            showSuccess(`✅ Мастер окна ${windowNum} выгнан`);
            showAdminPanel();
        }
        
        async function forceFreeWindow(windowNum) {
            await updateUserStatus(windowNum, "free");
            showSuccess(`🔓 Окно ${windowNum} освобождено`);
            showAdminPanel();
        }
        
        async function forceLogoutAll() {
            const users = await loadUsers();
            for (const [num, user] of Object.entries(users)) {
                if (user.role === "WORKER") {
                    await database.ref(`users/${num}`).update({ online: false, workStatus: "free" });
                    await database.ref(`commands/${num}`).set({ action: "logout", timestamp: Date.now() });
                }
            }
            showSuccess(`✅ Все мастера выгнаны`);
            showAdminPanel();
        }
        
        async function clearAllTasks() {
            if (confirm("⚠️ Удалить ВСЕ заказы?")) {
                await database.ref('tasks').remove();
                showSuccess("✅ Все заказы удалены");
                showAdminPanel();
            }
        }
        
        async function showSchedulePanel() {
            const schedule = await database.ref('schedule').once('value');
            const scheduleData = schedule.val() || {};
            const tasks = await loadTasks();
            const bookedTimes = Object.values(tasks).map(t => t.appointmentTime).filter(t => t);
            
            let html = `<div class="card"><h3>📅 РАСПИСАНИЕ</h3><div style="display: flex; flex-wrap: wrap; gap: 10px;">`;
            for (const [time, data] of Object.entries(scheduleData).sort()) {
                const isBooked = bookedTimes.includes(time);
                html += `
                    <div style="background: #252540; border-radius: 20px; padding: 10px; text-align: center; min-width: 100px;">
                        <div style="font-size: 1.2em; font-weight: bold; color: #05d9e8;">${time}</div>
                        <div style="color: ${isBooked ? '#ff0000' : (data.available ? '#00ff66' : '#ff6600')};">${isBooked ? 'ЗАНЯТ' : (data.available ? 'СВОБОДЕН' : 'БЛОК')}</div>
                        <button onclick="toggleSlot('${time}')" class="btn-sm">${data.available ? '🔒' : '🔓'}</button>
                        <button onclick="removeSlot('${time}')" class="btn-sm btn-danger">🗑</button>
                    </div>
                `;
            }
            html += `</div></div>
            <div class="card"><h3>➕ ДОБАВИТЬ СЛОТ</h3>
            <select id="newHour"><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option><option>17</option><option>18</option><option>19</option><option>20</option></select>
            <select id="newMinute"><option>00</option><option>15</option><option>30</option><option>45</option></select>
            <button onclick="addTimeSlot()" class="btn-success">➕ ДОБАВИТЬ</button></div>`;
            
            const app = document.getElementById('app');
            app.innerHTML += `<div id="schedulePanel" style="margin-top: 20px;">${html}</div>`;
        }
        
        async function toggleSlot(time) {
            const schedule = await database.ref('schedule').once('value');
            const scheduleData = schedule.val() || {};
            if (scheduleData[time]) {
                scheduleData[time].available = !scheduleData[time].available;
                await database.ref('schedule').set(scheduleData);
                showSuccess(`Слот ${time} ${scheduleData[time].available ? 'доступен' : 'заблокирован'}`);
                showSchedulePanel();
            }
        }
        
        async function removeSlot(time) {
            const schedule = await database.ref('schedule').once('value');
            const scheduleData = schedule.val() || {};
            delete scheduleData[time];
            await database.ref('schedule').set(scheduleData);
            showSuccess(`Слот ${time} удалён`);
            showSchedulePanel();
        }
        
        async function addTimeSlot() {
            const hour = document.getElementById('newHour').value;
            const minute = document.getElementById('newMinute').value;
            const time = `${hour}:${minute}`;
            const schedule = await database.ref('schedule').once('value');
            const scheduleData = schedule.val() || {};
            if (!scheduleData[time]) {
                scheduleData[time] = { available: true, bookedBy: null };
                await database.ref('schedule').set(scheduleData);
                showSuccess(`Слот ${time} добавлен`);
                showSchedulePanel();
            } else {
                showError(`Слот ${time} уже существует`);
            }
        }
        
        async function showCheckLogs() {
            const snapshot = await chekiDatabase.ref('checkLogs').once('value');
            const logs = snapshot.val() || {};
            let logsHtml = '<div class="card"><h3>📊 ЛОГ ЧЕКОВ (ВТОРАЯ БАЗА)</h3><div style="max-height: 400px; overflow-y: auto;">';
            
            const sorted = Object.values(logs).sort((a, b) => b.timestamp - a.timestamp);
            let totalSum = 0;
            let totalOrders = 0;
            
            for (const log of sorted.slice(0, 100)) {
                totalSum += log.total;
                totalOrders++;
                const itemsText = log.items.map(i => `${i.service} x${i.count}`).join(', ');
                logsHtml += `
                    <div style="border-bottom: 1px solid #333; padding: 10px;">
                        <div><strong>🎫 БИЛЕТ №${log.id}</strong> | ${log.date} | ${log.time}</div>
                        <div>📦 ${itemsText} = <span style="color: #00ff66;">${log.total} коп</span></div>
                        <div>🎨 ${log.master} | ⏰ ${log.appointmentTime}</div>
                        <div>🔑 Код: ${log.code6}</div>
                    </div>
                `;
            }
            
            logsHtml += `
                </div></div>
                <div class="card" style="text-align: center;">
                    <div>📊 ВСЕГО ЗАКАЗОВ: <strong style="color: #00ff66;">${totalOrders}</strong></div>
                    <div>💰 ОБЩАЯ ВЫРУЧКА: <strong style="color: #ffcc00;">${totalSum} коп (${(totalSum/100).toFixed(2)} руб)</strong></div>
                </div>
                <button onclick="renderCashierScreen()" class="btn-purple">◀ НАЗАД</button>
            `;
            
            const app = document.getElementById('app');
            app.innerHTML = `<div class="container">${logsHtml}</div>`;
        }
        
        function addNewWindow() {
            const newNum = prompt("Номер окна (1-10):");
            if (!newNum) return;
            const newPass = prompt("Пароль:");
            if (!newPass) return;
            const newName = prompt("Название окна:");
            if (!newName) return;
            
            database.ref(`users/${newNum}`).set({
                password: newPass, role: "WORKER", name: newName,
                workStatus: "free", online: false, priority: 5, todayOrders: 0
            }).then(() => { showSuccess(`Окно ${newName} добавлено`); showAdminPanel(); });
        }
        
        // ============ РЕАЛЬНОЕ ВРЕМЯ ============
        function startRealtimeUpdates() {
            database.ref('tasks').on('value', () => {
                if (currentRole === 'CASHBOX') {
                    loadWindowsStatus();
                } else {
                    loadWorkerTasks();
                }
            });
            database.ref('users').on('value', () => {
                if (currentRole === 'CASHBOX') loadWindowsStatus();
            });
            if (currentRole === 'WORKER') {
                database.ref(`commands/${currentUser}`).on('value', (snapshot) => {
                    const command = snapshot.val();
                    if (command && command.action === 'logout') {
                        showError("🔒 Администратор вышел из вашего аккаунта!");
                        setTimeout(() => logout(), 2000);
                    }
                });
            }
        }
        
        // ============ ЗАПУСК ============
        initTTS();
        initDefaultUsers().then(() => {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                currentUser = user.windowNumber;
                currentRole = user.role;
                currentWindow = user.name;
                if (currentRole === 'CASHBOX') {
                    startProblemListener();
                    startQueueListener();
                    renderCashierScreen();
                } else {
                    renderWorkerScreen();
                }
            } else {
                renderLoginScreen();
            }
        });
    </script>
</body>
</html>
