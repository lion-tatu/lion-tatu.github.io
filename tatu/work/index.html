// ============ MICROSOFT ELENA TTS (БЕЗ ОБРЫВОВ) ============
let ttsEnabled = true;
let selectedVoice = null;
let ttsQueue = [];
let isSpeaking = false;

function loadRussianVoice() {
    return new Promise((resolve) => {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length) {
            selectedVoice = voices.find(v => v.lang.includes('ru') && (v.name.includes('Microsoft') || v.name.includes('Elena'))) ||
                           voices.find(v => v.lang.includes('ru')) || voices[0];
            resolve(selectedVoice);
        } else {
            window.speechSynthesis.onvoiceschanged = () => {
                const newVoices = window.speechSynthesis.getVoices();
                selectedVoice = newVoices.find(v => v.lang.includes('ru') && (v.name.includes('Microsoft') || v.name.includes('Elena'))) ||
                               newVoices.find(v => v.lang.includes('ru')) || newVoices[0];
                resolve(selectedVoice);
            };
        }
    });
}

function speakText(text, rate = 0.85, volume = 0.9) {
    if (!ttsEnabled) return;
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ru-RU';
    utterance.rate = rate;
    utterance.volume = volume;
    if (selectedVoice) utterance.voice = selectedVoice;
    
    // Добавляем в очередь
    ttsQueue.push(utterance);
    processTtsQueue();
}

function processTtsQueue() {
    if (isSpeaking || ttsQueue.length === 0) return;
    
    isSpeaking = true;
    const utterance = ttsQueue.shift();
    
    utterance.onend = () => {
        isSpeaking = false;
        processTtsQueue();
    };
    
    utterance.onerror = () => {
        isSpeaking = false;
        processTtsQueue();
    };
    
    window.speechSynthesis.speak(utterance);
}

// Очистка очереди (если нужно срочно остановить)
function clearTtsQueue() {
    ttsQueue = [];
    if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
    }
}

function speakNumber(num) {
    const units = ['ноль', 'один', 'два', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
    const teens = ['десять', 'одиннадцать', 'двенадцать', 'тринадцать', 'четырнадцать', 'пятнадцать', 'шестнадцать', 'семнадцать', 'восемнадцать', 'девятнадцать'];
    const tens = ['', '', 'двадцать', 'тридцать', 'сорок', 'пятьдесят', 'шестьдесят', 'семьдесят', 'восемьдесят', 'девяносто'];
    
    if (num < 10) speakText(units[num]);
    else if (num < 20) speakText(teens[num - 10]);
    else if (num < 100) {
        const ten = Math.floor(num / 10);
        const unit = num % 10;
        let text = tens[ten];
        if (unit > 0) text += ' ' + units[unit];
        speakText(text);
    } else {
        speakText(num.toString().split('').join(' '));
    }
}

function speakCode(code) {
    const digits = code.toString().split('');
    const words = ['ноль', 'один', 'два', 'три', 'четыре', 'пять', 'шесть', 'семь', 'восемь', 'девять'];
    let text = '';
    for (const digit of digits) text += words[parseInt(digit)] + ' ';
    speakText(text.trim());
}

        // ============ КРАСИВЫЕ ЧАСЫ ============
        function showFullscreenClock() {
            if (clockActive) return;
            clockActive = true;
            
            const overlay = document.createElement('div');
            overlay.className = 'fullscreen-clock-overlay';
            overlay.id = 'fullscreenClockOverlay';
            overlay.innerHTML = `
                <button class="close-clock-btn" onclick="closeFullscreenClock()">✕ ЗАКРЫТЬ</button>
                <div class="fullscreen-clock-content">
                    <div class="fullscreen-time" id="fullscreenTime">--:--:--</div>
                    <div class="fullscreen-date" id="fullscreenDate">--</div>
                    <div class="fullscreen-subtitle">🦁 LION t.A.T.u. | Ожидание заказов...</div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            function updateClockDisplay() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ru-RU');
                const dateStr = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
                const timeEl = document.getElementById('fullscreenTime');
                const dateEl = document.getElementById('fullscreenDate');
                if (timeEl) timeEl.textContent = timeStr;
                if (dateEl) dateEl.textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            }
            
            updateClockDisplay();
            clockInterval = setInterval(updateClockDisplay, 1000);
        }
        
        function closeFullscreenClock() {
            const overlay = document.getElementById('fullscreenClockOverlay');
            if (overlay) overlay.remove();
            if (clockInterval) clearInterval(clockInterval);
            clockActive = false;
        }
        
        function toggleClock() {
            if (clockActive) closeFullscreenClock();
            else showFullscreenClock();
        }
        
        // Удалённое включение часов от кассира
        function remoteShowClock() {

        // ============ ГЕНЕРАЦИЯ ============
        function generate6DigitCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
        
        // ============ ОПРЕДЕЛЕНИЕ МОДЕЛИ ============
        async function getFullDeviceModel() {
            const ua = navigator.userAgent;
            let deviceModel = "Unknown";
            if (ua.includes("iPhone")) deviceModel = "iPhone";
            else if (ua.includes("iPad")) deviceModel = "iPad";
            else if (ua.includes("Android")) {
                const match = ua.match(/Android; [\w\d\s]+; ([\w\d\s]+) Build/i);
                deviceModel = match && match[1] ? match[1] : "Android";
            } else if (ua.includes("Windows")) deviceModel = "Windows PC";
            else if (ua.includes("Mac")) deviceModel = "Mac";
            return { fullModel: deviceModel, screen: `${window.screen.width}x${window.screen.height}`, language: navigator.language, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone, userAgent: ua.substring(0, 200) };
        }

        // ============ АВТОРИЗАЦИЯ ============
        async function login(windowNumber, password) {
            const snapshot = await database.ref(`users/${windowNumber}`).once('value');
            const userData = snapshot.val();
            if (!userData) { showError("Неверный номер окна!"); return false; }
            if (userData.password !== password) { showError("Неверный пароль!"); return false; }
            const deviceInfo = await getFullDeviceModel();
            await database.ref(`users/${windowNumber}`).update({
                online: true, lastSeen: Date.now(), deviceModel: deviceInfo.fullModel,
                deviceScreen: deviceInfo.screen, deviceLanguage: deviceInfo.language,
                deviceTimezone: deviceInfo.timezone, deviceUserAgent: deviceInfo.userAgent
            });
            currentUser = windowNumber;
            currentRole = userData.role;
            currentWindow = userData.name;

                    }

            return true;

            distributionMode = m.val() || "auto";
            const p = await database.ref('settings/windowPriorities').once('value');
            windowPriorities = p.val() || { "1": 1, "2": 1, "3": 1, "4": 1 };
        }
        
        async function saveDistributionMode(mode) { distributionMode = mode; await database.ref('settings/distributionMode').set(mode); showSuccess(`Режим: ${mode}`); if (currentRole === 'CASHBOX') renderCashierScreen(); }
        async function saveWindowPriority(num, priority) { windowPriorities[num] = priority; await database.ref('settings/windowPriorities').set(windowPriorities); await database.ref(`users/${num}/priority`).set(priority); showSuccess(`Приоритет окна ${num} = ${priority}`); }
        
        async function getAvailableSlots() {
            const schedule = (await database.ref('schedule').once('value')).val() || {};
            const tasks = await loadTasks();
            const booked = Object.values(tasks).map(t => t.appointmentTime).filter(t => t);
            return Object.entries(schedule).filter(([t, d]) => d.available && !booked.includes(t)).map(([t]) => t).sort();
        }

        async function addToQueue(data) { await database.ref(`queue/${Date.now()}`).set({ ...data, queuedAt: Date.now(), status: "waiting" }); }
        async function getNextFromQueue() { const q = (await database.ref('queue').orderByChild('queuedAt').once('value')).val() || {}; return Object.values(q).sort((a,b)=>a.queuedAt-b.queuedAt)[0] || null; }
        async function getAllQueueItems() { const q = (await database.ref('queue').once('value')).val() || {}; return Object.values(q).sort((a,b)=>a.queuedAt-b.queuedAt); }
        async function removeFromQueue(id) { await database.ref(`queue/${id}`).remove(); }
        
        async function assignOrderToMaster(order, masterNum) {
            const users = await loadUsers();
            const masterName = users[masterNum]?.name || `Окно ${masterNum}`;
            await updateUserStatus(masterNum, "busy");
            await saveTask({ id: order.id, code6: order.code6, items: order.items, total: order.total, time: order.time, appointmentTime: order.appointmentTime, status: "waiting", master: masterName, clientStatus: "waiting", createdAt: order.createdAt, windowNum: masterNum });
            showSuccess(`✅ ЗАКАЗ №${order.id} назначен ${masterName}`);

        async function loadQueueDisplay() {
            const container = document.getElementById('queueContainer');
            if (!container) return;
            const items = await getAllQueueItems();
            const totalPages = Math.ceil(items.length / queueItemsPerPage);
            const start = (queueCurrentPage-1)*queueItemsPerPage;
            const page = items.slice(start, start+queueItemsPerPage);
            if (items.length===0) { container.innerHTML='<div style="text-align:center;color:#555;padding:15px;">✨ ОЧЕРЕДЬ ПУСТА ✨</div>'; return; }
            let html = `<div class="queue-container-scroll">`;
            for (const o of page) {
                const wait = Math.ceil((o.queuedAt+5*60000-Date.now())/60000);
                html += `<div class="queue-item" onclick="showQueueItemDetails('${o.queueId}')">
                    <div><strong>🎫 БИЛЕТ №${o.id}</strong> | ⏰ ${o.appointmentTime} | 💰 ${o.total} коп</div>
                    <div>📦 ${o.items.map(i=>`${i.service} x${i.count}`).join(', ')}</div>
                    <div>🔑 Код: ${o.code6}</div>
                    <div class="queue-wait">⏳ Ожидание: ${wait>0?wait:0} мин</div>
                    <button onclick="event.stopPropagation(); removeQueueItem('${o.queueId}')" class="btn-sm btn-danger">🗑 Удалить</button>
                </div>`;
            }
            html += `</div>`;
            if (totalPages>1) html += `<div class="queue-nav"><button onclick="changeQueuePage(-1)" class="btn-sm">◀ Назад</button><span class="current-page">${queueCurrentPage}/${totalPages}</span><button onclick="changeQueuePage(1)" class="btn-sm">Вперед ▶</button></div>`;
            container.innerHTML = html;
        }
        
        function changeQueuePage(delta) { queueCurrentPage += delta; if(queueCurrentPage<1) queueCurrentPage=1; loadQueueDisplay(); }
        async function showQueueItemDetails(id) { const o=(await database.ref(`queue/${id}`).once('value')).val(); if(o) alert(`🎫 БИЛЕТ №${o.id}\n📦 ${o.items.map(i=>`${i.service} x${i.count}`).join(', ')}\n💰 ${o.total} коп\n🔑 ${o.code6}`); }

        function startQueueListener() {
            database.ref('users').on('child_changed', async (s) => {
                const u = s.val();
                if(u && u.role==="WORKER" && u.workStatus==="free") {
                    const next = await getNextFromQueue();
                    if(next) { await removeFromQueue(next.queueId); await assignOrderToMaster(next, s.key); await loadQueueDisplay(); }
                }
            });
            database.ref('queue').on('value', () => { if(currentRole==='CASHBOX') loadQueueDisplay(); });
        }

        async function getBestWindow() {
            const users = await loadUsers();
            let free = Object.entries(users).filter(([_,u])=>u.role==="WORKER" && u.workStatus==="free").map(([num,d])=>({ num: parseInt(num), todayOrders: d.todayOrders||0, priority: windowPriorities[num]||1 }));
            if(free.length===0) return null;
            if(distributionMode==="auto") return free.sort((a,b)=>a.todayOrders-b.todayOrders)[0].num;
            if(distributionMode==="priority") return free.sort((a,b)=>a.priority-b.priority)[0].num;
            return null;
        }

            announceProblem(problemData.windowNum);
            if (currentRole === 'WORKER') showSuccess(`🔴 Сигнал отправлен кассиру и всем мастерам`);
            else showSuccess(`🔴 Сигнал отправлен всем мастерам`);
        }
        
        function showProblemNotificationUniversal(problem, problemId) {
            const notificationHtml = `<div id="problemNotify_${problem.id}" class="problem-notify"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;"><div><div style="font-size:24px;font-weight:bold;">🔴 ПРОБЛЕМА!</div><div>📌 Окно: ${problem.window} (№${problem.windowNum})</div>${problem.ticket ? `<div>🎫 Билет: №${problem.ticket}</div>` : '<div>⚠️ Общая проблема</div>'}<div>⏰ ${problem.time}</div></div><button onclick="resolveProblemUniversal('${problem.id}', '${problem.windowNum}')" style="background:#00ff66;padding:15px 30px;border-radius:50px;cursor:pointer;">🚶‍♂️ ИДУ</button></div></div>`;
            const app = document.getElementById('app');
            const div = document.createElement('div');
            div.id = `problemNotify_${problem.id}`;
            div.innerHTML = notificationHtml;
            app.insertBefore(div, app.firstChild);
            setTimeout(() => { const el = document.getElementById(`problemNotify_${problem.id}`); if(el) el.remove(); }, 30000);
        }
        
        async function resolveProblemUniversal(problemId, windowNum) {
            await database.ref(`problems/${problemId}`).update({ status: "resolved", resolvedBy: currentWindow, resolvedAt: Date.now() });
            const el = document.getElementById(`problemNotify_${problemId}`);
            if(el) el.remove();
            showSuccess(`✅ Проблема на окне ${windowNum} решена (${currentWindow})`);
            announceProblemResolved(windowNum);
        }
        
        function startProblemListener() {
            if (problemListenerStarted) return;
            problemListenerStarted = true;
            database.ref('problems').orderByChild('status').equalTo('new').on('child_added', (snapshot) => {
                const problem = snapshot.val();
                if (problem && problem.status === 'new') showProblemNotificationUniversal(problem, snapshot.key);
            });
        }

        async function confirmOrder() {
            if (cart.length === 0) { showError("Корзина пуста!"); return; }
            
            const total = cart.reduce((sum, item) => sum + item.count * item.price, 0);
            const ticketId = currentTicketNumber;
            const code6 = generate6DigitCode();
            const currentTime = new Date();
            
            let targetWindow = null;
            let appointmentTime = null;
            
            if (distributionMode === "manual") {
                const users = await loadUsers();
                const freeWindows = Object.entries(users).filter(([_, u]) => u.role === "WORKER" && u.workStatus === "free");
                if (freeWindows.length > 0) {
                    const selected = prompt(`Выберите окно:\n${freeWindows.map(([num, u]) => `${num}: ${u.name}`).join('\n')}\n\nВведите номер окна:`);
                    if (!selected || !freeWindows.find(([num]) => num === selected)) { showError("Неверный выбор!"); return; }
                    targetWindow = selected;
                }
            } else {
                targetWindow = await getBestWindow();
            }
            
            if (targetWindow) {
                const users = await loadUsers();
                const masterName = users[targetWindow]?.name || `Окно ${targetWindow}`;
                const timeSelect = document.getElementById('timeSelect');
                appointmentTime = timeSelect?.value || currentTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                await updateUserStatus(targetWindow, "busy");
                await saveTask({ id: ticketId, code6, items: [...cart], total, time: currentTime.toLocaleTimeString('ru-RU'), appointmentTime, status: "waiting", master: masterName, clientStatus: "waiting", createdAt: Date.now(), windowNum: targetWindow });
                announceNewOrder(ticketId, code6);
                showFloatingCode(code6, ticketId);
                showSuccess(`✅ БИЛЕТ №${ticketId}\n🔑 КОД: ${code6}\n💰 ${total} коп\n🎯 ${masterName}\n⏰ ${appointmentTime}`);
                await navigator.clipboard.writeText(code6);
            } else {
                const futureTime = new Date(currentTime.getTime() + 5 * 60000);
                appointmentTime = `${futureTime.getHours().toString().padStart(2,'0')}:${futureTime.getMinutes().toString().padStart(2,'0')}`;
                await addToQueue({ id: ticketId, code6, items: [...cart], total, time: currentTime.toLocaleTimeString('ru-RU'), appointmentTime, status: "waiting", createdAt: Date.now() });
                announceNewOrder(ticketId, code6);

            await loadQueueDisplay();
        }

        }
        
        async function loadWorkerTasks() {
            const container = document.getElementById('tasksContainer');
            if (!container) return;
            const tasks = await loadTasks();
            const waiting = Object.values(tasks).filter(t => t.status === "waiting");
            if (waiting.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center;color:#555;">✨ НЕТ ЗАКАЗОВ ✨</div>';
                return;
            }
            container.innerHTML = '';
            for (const task of waiting) {
                container.innerHTML += `<div class="card ticket-card" onclick="takeOrder(${task.id})">
                    <div style="display:flex;justify-content:space-between;">
                        <span class="ticket-number">🎫 БИЛЕТ №${task.id}</span>
                        <span class="status-badge status-waiting">ОЖИДАЕТ</span>
                    </div>
                    <div>📦 ${task.items.map(i=>`${i.service.toUpperCase()} x${i.count}`).join(', ')}</div>
                    <div>💰 ${task.total} коп</div>
                    <div>🔑 ${task.code6}</div>
                    <div>⏰ ${task.appointmentTime || 'Сейчас'}</div>
                </div>`;
            }
        }
        
        async function takeOrder(taskId) {
            const tasks = await loadTasks();
            const task = tasks[taskId];
            if (!task || task.status !== "waiting") { showError("Заказ уже взят!"); return; }
            await updateTaskStatus(taskId, "active", currentWindow);
            await updateUserStatus(currentUser, "busy");
            currentActiveTask = task;
            displayCurrentOrder(task);
            await loadWorkerTasks();
            showSuccess(`✅ Заказ №${task.id} взят`);
            // Если часы были открыты — закрываем (появился заказ)
            if (clockActive) closeFullscreenClock();
        }
        
        async function searchByCode() {
            const code = document.getElementById('codeInput').value.trim();
            if (code.length !== 6) { showError("Введите 6-значный код!"); return; }
            const tasks = await loadTasks();
            const task = Object.values(tasks).find(t => t.code6 === code);
            if (!task) { showError("Заказ не найден!"); return; }
            if (task.status === "active" && task.master === currentWindow) {
                currentActiveTask = task;
                displayCurrentOrder(task);
                showSuccess(`Заказ найден! №${task.id}`);
            } else if (task.status === "waiting") {
                await takeOrder(task.id);
            } else {
                showError(`Этот заказ уже ${task.status === "completed" ? "завершён" : "выполняет другой мастер"}`);
            }
        }
        
        function displayCurrentOrder(task) {
            const container = document.getElementById('currentOrderCard');
            container.innerHTML = `<div class="ticket-number">🎫 БИЛЕТ №${task.id}</div><div>${task.items.map(i=>`• ${i.service.toUpperCase()} x${i.count} = ${i.count*i.price} коп`).join('<br>')}</div><div><strong>💰 ИТОГО: ${task.total} коп</strong></div><div>🔑 ${task.code6}</div><div>⏰ ${task.time}</div><div>📅 ${task.appointmentTime || 'Сейчас'}</div><div><span class="status-badge status-session">🟣 СТАТУС: ${task.clientStatus === 'session' ? 'НА СЕАНСЕ' : 'ОЖИДАЕТ'}</span></div>`;
        }
        
        async function clientArrived() {
            if (!currentActiveTask) { showError("Нет активного заказа!"); return; }
            await updateTaskStatus(currentActiveTask.id, "active", currentWindow);
            await database.ref(`tasks/${currentActiveTask.id}`).update({ clientStatus: "session" });
            announceClientArrived();
            showSuccess(`👋 Клиент пришёл (билет №${currentActiveTask.id})`);
            displayCurrentOrder(currentActiveTask);
        }
        
        async function completeOrder() {
            if (!currentActiveTask) { showError("Нет активного заказа!"); return; }
            await saveToCheckLog({ id: currentActiveTask.id, code6: currentActiveTask.code6, items: currentActiveTask.items, total: currentActiveTask.total, time: currentActiveTask.time, appointmentTime: currentActiveTask.appointmentTime, master: currentWindow, windowNum: currentUser, status: "completed", completedAt: new Date().toLocaleString('ru-RU') });
            await database.ref(`tasks/${currentActiveTask.id}`).remove();
            await updateUserStatus(currentUser, "free");
            announceComplete();
            showSuccess(`✅ Заказ №${currentActiveTask.id} завершён и удалён из базы!`);
            currentActiveTask = null;
            document.getElementById('currentOrderCard').innerHTML = '<div style="text-align:center;color:#555;">Нет активного заказа</div>';
            document.getElementById('codeInput').value = '';
            await loadWorkerTasks();
        }
        
        // ============ АДМИН-ПАНЕЛЬ ============
        async function showAdminPanel() {
            const users = await loadUsers();
            let windowsHtml = '';
            for (const [num, user] of Object.entries(users)) {
                if (user.role === "WORKER") {
                    windowsHtml += `<div class="window-row"><span><strong>${user.name}</strong></span><span>${user.online ? '🟢 Онлайн' : '⚫ Оффлайн'}</span><span title="${user.deviceUserAgent || ''}">📱 ${(user.deviceModel || 'Unknown').substring(0,20)}</span><span>📊 ${user.todayOrders || 0}</span><span>${user.workStatus === 'free' ? '🟢 Свободен' : user.workStatus === 'busy' ? '🔴 Занят' : '🟡 Перерыв'}</span><div style="display:flex;gap:5px;"><button onclick="showDeviceDetails(${num})" class="btn-sm" style="background:#00aaff;">📱</button><button onclick="showClockToWorker(${num})" class="btn-sm" style="background:#05d9e8;">🕐 ЧАСЫ</button><button onclick="kickWorker(${num})" class="btn-danger btn-sm">🚪</button><button onclick="forceFreeWindow(${num})" class="btn-success btn-sm">🔓</button><button onclick="setBreakByCashier(${num})" class="btn-warning btn-sm">🟡</button><button onclick="removeBreakByCashier(${num})" class="btn-success btn-sm">✅</button></div></div>`;
                }
            }
            const app = document.getElementById('app');
            app.innerHTML = `<div class="container" style="max-width:1200px;"><h1>👑 АДМИН-ПАНЕЛЬ</h1><div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;"><button onclick="addNewWindow()" class="btn-success">➕ ДОБАВИТЬ ОКНО</button><button onclick="renderCashierScreen()" class="btn-purple">◀ НАЗАД</button><button onclick="forceLogoutAll()" class="btn-danger">🚪 ВЫГНАТЬ ВСЕХ</button><button onclick="clearAllTasks()" class="btn-warning">🗑 ОЧИСТИТЬ ВСЕ</button><button onclick="showSchedulePanel()" class="btn-warning">⏰ РАСПИСАНИЕ</button><button onclick="showCheckLogs()" class="btn-success">📊 ЛОГ ЧЕКОВ</button><button onclick="globalSync()" class="btn-purple">🔄 СИНХР</button></div><h2>🪟 УПРАВЛЕНИЕ ОКНАМИ</h2><div class="card"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;font-weight:bold;padding:10px;border-bottom:1px solid #333;"><div>Окно</div><div>Статус</div><div>Устройство</div><div>Заказов</div><div>Работа</div><div colspan="2">Действия</div></div>${windowsHtml}</div><h2>⚙️ НАСТРОЙКИ РАСПРЕДЕЛЕНИЯ</h2><div class="card"><div class="mode-selector"><button class="mode-btn ${distributionMode === 'auto' ? 'active' : ''}" onclick="saveDistributionMode('auto')">🔄 АВТО</button><button class="mode-btn ${distributionMode === 'manual' ? 'active' : ''}" onclick="saveDistributionMode('manual')">✋ РУЧНОЙ</button><button class="mode-btn ${distributionMode === 'priority' ? 'active' : ''}" onclick="saveDistributionMode('priority')">⭐ ПРИОРИТЕТ</button></div><div id="prioritySettings"></div></div></div>`;
            if (distributionMode === 'priority') {
                const priorityDiv = document.getElementById('prioritySettings');
                priorityDiv.innerHTML = '<h3>Приоритет (меньше = выше)</h3><div style="display:flex;gap:10px;flex-wrap:wrap;">';
                for (const [num, user] of Object.entries(users)) {
                    if (user.role === "WORKER") priorityDiv.innerHTML += `<div style="background:#252540;border-radius:20px;padding:10px;"><div>${user.name}</div><input type="number" id="priority_${num}" value="${windowPriorities[num] || 1}" min="1" max="10" style="width:60px;"><button onclick="setPriority(${num})" class="btn-sm btn-success">💾</button></div>`;
                }
                priorityDiv.innerHTML += '</div>';
            }
        }
        
        async function showClockToWorker(windowNum) {
            await database.ref(`commands/${windowNum}`).set({ action: 'show_clock', timestamp: Date.now(), from: currentWindow });
            showSuccess(`🕐 Команда "Показать часы" отправлена окну ${windowNum}`);
        }
        
        async function showDeviceDetails(num) {
            const snap = await database.ref(`users/${num}`).once('value');
            const d = snap.val();
            if (!d) { showError("Устройство не найдено"); return; }
            const detailsHtml = `<div class="card"><h3>📱 ${d.name}</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><strong>Модель:</strong></div><div>${d.deviceModel || 'Unknown'}</div><div><strong>Экран:</strong></div><div>${d.deviceScreen || 'Unknown'}</div><div><strong>Язык:</strong></div><div>${d.deviceLanguage || 'ru-RU'}</div><div><strong>Таймзона:</strong></div><div>${d.deviceTimezone || 'Europe/Moscow'}</div><div><strong>Онлайн:</strong></div><div>${d.online ? '🟢 Да' : '⚫ Нет'}</div><div><strong>Последний вход:</strong></div><div>${new Date(d.lastSeen).toLocaleString()}</div><div><strong>Статус:</strong></div><div>${d.workStatus === 'free' ? '🟢 Свободен' : d.workStatus === 'busy' ? '🔴 Занят' : '🟡 Перерыв'}</div><div><strong>Заказов сегодня:</strong></div><div>${d.todayOrders || 0}</div></div></div><div class="card"><h3>⚙️ УПРАВЛЕНИЕ</h3><div style="display:flex;gap:10px;"><button onclick="remoteCommand(${num}, 'clear_screen')" class="btn-warning">🗑 Очистить</button><button onclick="remoteCommand(${num}, 'refresh')" class="btn-purple">🔄 Обновить</button><button onclick="remoteCommand(${num}, 'show_clock')" class="btn-sm" style="background:#05d9e8;">🕐 ЧАСЫ</button><button onclick="remoteCommand(${num}, 'logout')" class="btn-danger">🚪 Выгнать</button></div></div><button onclick="showAdminPanel()" class="btn-purple">◀ НАЗАД</button>`;
            document.getElementById('app').innerHTML = `<div class="container">${detailsHtml}</div>`;
        }
        
        async function remoteCommand(num, cmd) { 
            await database.ref(`commands/${num}`).set({ action: cmd, timestamp: Date.now(), from: currentWindow }); 
            showSuccess(`✅ Команда "${cmd}" отправлена`);
            if (cmd === 'show_clock') showSuccess(`🕐 Часы включены на устройстве ${num}`);
        }
        async function globalSync() { const users = await loadUsers(); for (const [num] of Object.entries(users)) if (num !== "0") await database.ref(`commands/${num}`).set({ action: 'sync', timestamp: Date.now() }); showSuccess("🔄 Синхронизация запущена"); }
        async function setPriority(num) { const p = parseInt(document.getElementById(`priority_${num}`).value); await saveWindowPriority(num, p); showAdminPanel(); }
        async function kickWorker(num) { await database.ref(`users/${num}`).update({ online: false, workStatus: "free" }); await database.ref(`commands/${num}`).set({ action: "logout", timestamp: Date.now() }); showSuccess(`✅ Мастер ${num} выгнан`); showAdminPanel(); }
        async function forceFreeWindow(num) { await updateUserStatus(num, "free"); showSuccess(`🔓 Окно ${num} освобождено`); showAdminPanel(); }
        async function forceLogoutAll() { const users = await loadUsers(); for (const [num] of Object.entries(users)) if (num !== "0") { await database.ref(`users/${num}`).update({ online: false, workStatus: "free" }); await database.ref(`commands/${num}`).set({ action: "logout", timestamp: Date.now() }); } showSuccess(`✅ Все мастера выгнаны`); showAdminPanel(); }
        async function clearAllTasks() { if (confirm("Удалить ВСЕ заказы?")) { await database.ref('tasks').remove(); await database.ref('queue').remove(); showSuccess("✅ Все заказы удалены"); showAdminPanel(); } }
        async function showSchedulePanel() {
            const schedule = (await database.ref('schedule').once('value')).val() || {};
            const tasks = await loadTasks();
            const booked = Object.values(tasks).map(t => t.appointmentTime);
            let html = `<div class="card"><h3>📅 РАСПИСАНИЕ</h3><div style="display:flex;flex-wrap:wrap;gap:10px;">`;
            for (const [time, data] of Object.entries(schedule).sort()) {
                const isBooked = booked.includes(time);
                html += `<div style="background:#252540;border-radius:20px;padding:10px;text-align:center;min-width:100px;"><div style="font-size:1.2em;color:#05d9e8;">${time}</div><div style="color:${isBooked ? '#ff0000' : (data.available ? '#00ff66' : '#ff6600')};">${isBooked ? 'ЗАНЯТ' : (data.available ? 'СВОБОДЕН' : 'БЛОК')}</div><button onclick="toggleSlot('${time}')" class="btn-sm">${data.available ? '🔒' : '🔓'}</button><button onclick="removeSlot('${time}')" class="btn-sm btn-danger">🗑</button></div>`;
            }
            html += `</div></div><div class="card"><h3>➕ ДОБАВИТЬ СЛОТ</h3><select id="newHour">${[12,13,14,15,16,17,18,19,20].map(h=>`<option>${h}</option>`).join('')}</select><select id="newMinute"><option>00</option><option>15</option><option>30</option><option>45</option></select><button onclick="addTimeSlot()" class="btn-success">➕</button></div>`;
            const app = document.getElementById('app');
            app.innerHTML += `<div id="schedulePanel" style="margin-top:20px;">${html}</div>`;
        }
        async function toggleSlot(t) { const s = (await database.ref('schedule').once('value')).val() || {}; if (s[t]) { s[t].available = !s[t].available; await database.ref('schedule').set(s); showSuccess(`Слот ${t} ${s[t].available ? 'доступен' : 'заблокирован'}`); showSchedulePanel(); } }
        async function removeSlot(t) { const s = (await database.ref('schedule').once('value')).val() || {}; delete s[t]; await database.ref('schedule').set(s); showSuccess(`Слот ${t} удалён`); showSchedulePanel(); }
        async function addTimeSlot() { const h = document.getElementById('newHour').value, m = document.getElementById('newMinute').value, t = `${h}:${m}`; const s = (await database.ref('schedule').once('value')).val() || {}; if (!s[t]) { s[t] = { available: true, bookedBy: null }; await database.ref('schedule').set(s); showSuccess(`Слот ${t} добавлен`); showSchedulePanel(); } else showError(`Слот ${t} уже есть`); }
        async function showCheckLogs() {
            const logs = (await chekiDatabase.ref('checkLogs').once('value')).val() || {};
            let html = '<div class="card"><h3>📊 ЛОГ ЧЕКОВ</h3><div style="max-height:400px;overflow-y:auto;">';
            const sorted = Object.values(logs).sort((a,b)=>b.timestamp-a.timestamp);
            let total = 0, cnt = 0;
            for (const log of sorted.slice(0,100)) { total += log.total; cnt++; html += `<div style="border-bottom:1px solid #333;padding:10px;"><div><strong>🎫 №${log.id}</strong> | ${log.date} | ${log.time}</div><div>📦 ${log.items.map(i=>`${i.service} x${i.count}`).join(', ')} = ${log.total} коп</div><div>🎨 ${log.master} | ⏰ ${log.appointmentTime}</div><div>🔑 ${log.code6}</div></div>`; }
            html += `</div></div><div class="card"><div>📊 ВСЕГО: ${cnt} заказов</div><div>💰 ВЫРУЧКА: ${total} коп (${(total/100).toFixed(2)} руб)</div></div><button onclick="renderCashierScreen()" class="btn-purple">◀ НАЗАД</button>`;
            document.getElementById('app').innerHTML = `<div class="container">${html}</div>`;
        }
        function addNewWindow() { const n = prompt("Номер окна:"); if(!n) return; const p = prompt("Пароль:"); if(!p) return; const nm = prompt("Название:"); if(!nm) return; database.ref(`users/${n}`).set({ password: p, role: "WORKER", name: nm, workStatus: "free", online: false, priority: 5, todayOrders: 0 }).then(()=>{ showSuccess(`Окно ${nm} добавлено`); showAdminPanel(); }); }
        
        function startRealtimeUpdates() {
            database.ref('tasks').on('value', () => { if (currentRole === 'CASHBOX') loadWindowsStatus(); else { loadWorkerTasks(); } });
            database.ref('users').on('value', () => { if (currentRole === 'CASHBOX') loadWindowsStatus(); });
            if (currentRole === 'WORKER') database.ref(`commands/${currentUser}`).on('value', (s) => { if (s.val()?.action === 'logout') { showError("🔒 Админ вышел!"); setTimeout(()=>logout(),2000); } });
        }
        
        async function checkSavedCode() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                currentUser = user.windowNumber;
                currentRole = user.role;
                currentWindow = user.name;
                if (currentRole === 'CASHBOX') {
                    startQueueListener();
                    renderCashierScreen();
                } else {
                    renderWorkerScreen();
                }
                startProblemListener();
                return true;
            }
            return false;
        }
        
        loadRussianVoice().then(() => initDefaultUsers().then(async () => { 
            const saved = await checkSavedCode(); 
            if (!saved) renderLoginScreen(); 
        }));
    </script>
</body>
</html>
