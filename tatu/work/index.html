<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LION t.A.T.u. — Рабочий терминал (100+ функций)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.3);
            border: 1px solid rgba(5, 217, 232, 0.3);
        }
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 280px; }
        .card {
            background: rgba(26, 26, 46, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(5, 217, 232, 0.2);
        }
        .ticket-card { cursor: pointer; transition: 0.2s; margin-bottom: 10px; position: relative; }
        .ticket-card:hover { border-color: #05d9e8; transform: translateX(5px); }
        .ticket-number { font-size: 2em; color: #ff2a6d; font-weight: bold; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-free { background: #00ff66; color: #0a0a0f; }
        .status-busy { background: #ff0000; color: white; }
        .status-break { background: #ffcc00; color: #0a0a0f; }
        .status-waiting { background: #ffcc00; color: #0a0a0f; }
        .status-session { background: #b300ff; color: white; }
        .window-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #333;
            gap: 10px;
            flex-wrap: wrap;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .total { font-size: 1.5em; font-weight: bold; color: #00ff66; text-align: right; padding: 10px; }
        .clock { font-size: 2em; font-family: monospace; color: #05d9e8; text-align: right; }
        button {
            padding: 12px 20px;
            font-size: 1em;
            background: #05d9e8;
            border: none;
            border-radius: 35px;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }
        button:active { transform: scale(0.97); }
        .btn-danger { background: #ff0000; color: white; }
        .btn-success { background: #00ff66; color: #0a0a0f; }
        .btn-warning { background: #ff6600; color: white; }
        .btn-purple { background: #b300ff; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(37, 37, 64, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #05d9e8;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
        }
        h1 { text-align: center; color: #ff2a6d; font-size: 1.8em; margin-bottom: 15px; }
        h2 { color: #05d9e8; font-size: 1.2em; margin-bottom: 10px; }
        h3 { color: #ffcc00; font-size: 1em; margin-bottom: 8px; }
        .error { color: #ff0000; text-align: center; padding: 10px; animation: fadeInOut 3s; }
        .success { color: #00ff66; text-align: center; padding: 10px; animation: fadeInOut 3s; }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }
        .tts-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(37, 37, 64, 0.5);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 25px;
            margin-bottom: 15px;
        }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; text-align: center; }
        .mode-btn.active { background: #00ff66; color: #0a0a0f; }
        .floating-code {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e, #0a0a0f);
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 0 20px rgba(0,255,102,0.3);
            z-index: 1000;
            text-align: center;
            animation: floatAnim 10s ease forwards;
        }
        @keyframes floatAnim {
            0% { opacity: 0; transform: translateX(50px); }
            10% { opacity: 1; transform: translateX(0); }
            80% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(50px); visibility: hidden; }
        }
        .problem-notify {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: linear-gradient(135deg, #ff0000, #990000);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
            z-index: 1000;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(255,0,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,0,0,0.8); }
            100% { box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        }
        .queue-container-scroll { max-height: 300px; overflow-y: auto; }
        .queue-item { border-bottom: 1px solid #333; padding: 12px; cursor: pointer; transition: 0.2s; }
        .queue-item:hover { background: rgba(37, 37, 64, 0.5); }
        .queue-wait { color: #ffcc00; font-size: 11px; margin-top: 5px; }
        .queue-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 10px; }
        .waiting-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 18px;
            text-align: center;
            min-width: 100px;
            transition: all 0.3s;
        }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .flex-row { flex-direction: column; }
            .window-row { flex-direction: column; align-items: stretch; }
            button { width: 100%; }
            .problem-notify { left: 10px; right: 10px; }
            .floating-code { left: 10px; right: 10px; bottom: 10px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ==================== КОНФИГУРАЦИЯ FIREBASE ====================
        // Замените на данные своего проекта
        const MAIN_CONFIG = {
            apiKey: "AIza...",
            authDomain: "...",
            databaseURL: "https://pvz-database-default-rtdb.firebaseio.com/",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };
        const CHEKI_CONFIG = {
            apiKey: "AIza...",
            authDomain: "...",
            databaseURL: "https://cheki-tatu-save-default-rtdb.firebaseio.com/",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        // Инициализация двух приложений
        firebase.initializeApp(MAIN_CONFIG, 'main');
        firebase.initializeApp(CHEKI_CONFIG, 'cheki');
        const database = firebase.app('main').database();
        const chekiDatabase = firebase.app('cheki').database();

        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentUser = null;          // номер окна
        let currentRole = null;          // 'CASHBOX' или 'WORKER'
        let currentWindow = null;        // имя окна
        let cart = [];                   // текущий чек
        let currentCount = 1;            // выбранное количество
        let ttsEnabled = true;
        let voices = [];
        let selectedVoice = null;
        let currentTicketNumber = 1;     // следующий номер билета
        let distributionMode = "auto";   // auto | manual | priority
        let windowPriorities = {};       // { "1": 1, ... }
        let currentActiveTask = null;    // текущий заказ мастера
        let problemListenerStarted = false;
        let queueCurrentPage = 1;
        const queueItemsPerPage = 5;
        let waitingStartTimes = {};      // для таймеров ожидания мастеров

        const prices = { "ручка": 4, "маркер": 6 };

        // ==================== TTS (ГОЛОСОВЫЕ УВЕДОМЛЕНИЯ) ====================
        function initTTS() {
            if ('speechSynthesis' in window) {
                voices = window.speechSynthesis.getVoices();
                selectedVoice = voices.find(v => v.lang.includes('ru')) || voices[0];
                window.speechSynthesis.onvoiceschanged = () => {
                    voices = window.speechSynthesis.getVoices();
                    selectedVoice = voices.find(v => v.lang.includes('ru')) || voices[0];
                };
            }
        }
        function speak(text, force = false) {
            if (!ttsEnabled && !force) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ru-RU'; u.voice = selectedVoice; u.rate = 0.85;
                window.speechSynthesis.speak(u);
            }
        }

        // ==================== ГЕНЕРАТОРЫ ====================
        function generate6DigitCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            if (ua.includes("iPhone")) return "iPhone";
            if (ua.includes("iPad")) return "iPad";
            if (ua.includes("Android")) return "Android";
            if (ua.includes("Windows")) return "Windows PC";
            if (ua.includes("Mac")) return "Mac";
            return "Unknown";
        }

        // ==================== РАБОТА С ДАННЫМИ (БАЗА) ====================
        async function loadUsers() { return (await database.ref('users').once('value')).val() || {}; }
        async function loadTasks() { return (await database.ref('tasks').once('value')).val() || {}; }
        async function saveTask(task) { await database.ref(`tasks/${task.id}`).set(task); }
        async function deleteTask(taskId) { await database.ref(`tasks/${taskId}`).remove(); }
        async function updateTaskStatus(taskId, status, master = null) {
            const snap = await database.ref(`tasks/${taskId}`).once('value');
            if (snap.exists()) {
                const t = snap.val();
                t.status = status;
                if (master) t.master = master;
                await database.ref(`tasks/${taskId}`).set(t);
            }
        }
        async function updateUserStatus(num, status) { await database.ref(`users/${num}/workStatus`).set(status); }
        async function loadDistributionSettings() {
            const modeSnap = await database.ref('settings/distributionMode').once('value');
            distributionMode = modeSnap.val() || "auto";
            const prioSnap = await database.ref('settings/windowPriorities').once('value');
            windowPriorities = prioSnap.val() || {};
        }
        async function getAvailableSlots() {
            const schedule = (await database.ref('schedule').once('value')).val() || {};
            const tasks = await loadTasks();
            const booked = Object.values(tasks).map(t => t.appointmentTime).filter(Boolean);
            return Object.entries(schedule)
                .filter(([t, d]) => d.available && !booked.includes(t))
                .map(([t]) => t)
                .sort();
        }
        async function updateUserTodayOrders(windowNum, increment = true) {
            const ref = database.ref(`users/${windowNum}`);
            const snap = await ref.once('value');
            if (snap.exists()) {
                const user = snap.val();
                const newCount = (user.todayOrders || 0) + (increment ? 1 : 0);
                await ref.update({ todayOrders: newCount });
            }
        }
        async function getBestWindow() {
            const users = await loadUsers();
            let freeWindows = Object.entries(users)
                .filter(([_, u]) => u.role === "WORKER" && u.workStatus === "free")
                .map(([num, data]) => ({
                    num: parseInt(num),
                    name: data.name,
                    todayOrders: data.todayOrders || 0,
                    priority: windowPriorities[num] || 1
                }));
            if (freeWindows.length === 0) return null;
            if (distributionMode === "auto") {
                freeWindows.sort((a, b) => a.todayOrders - b.todayOrders);
                const minOrders = freeWindows[0].todayOrders;
                const leastBusy = freeWindows.filter(w => w.todayOrders === minOrders);
                if (leastBusy.length > 1) {
                    const lastWindow = parseInt(localStorage.getItem('lastWindow') || "0");
                    const sorted = leastBusy.sort((a, b) => a.num - b.num);
                    let nextIndex = sorted.findIndex(w => w.num === lastWindow) + 1;
                    if (nextIndex >= sorted.length) nextIndex = 0;
                    const selected = sorted[nextIndex];
                    localStorage.setItem('lastWindow', selected.num);
                    return selected.num;
                }
                return leastBusy[0].num;
            } else if (distributionMode === "priority") {
                freeWindows.sort((a, b) => a.priority - b.priority);
                return freeWindows[0].num;
            } else {
                return null;
            }
        }

        // ==================== ОЧЕРЕДЬ ====================
        async function addToQueue(order) {
            const id = Date.now();
            await database.ref(`queue/${id}`).set({ ...order, queueId: id, queuedAt: Date.now(), status: "waiting" });
        }
        async function getNextFromQueue() {
            const q = (await database.ref('queue').orderByChild('queuedAt').once('value')).val() || {};
            const sorted = Object.values(q).sort((a, b) => a.queuedAt - b.queuedAt);
            return sorted[0] || null;
        }
        async function getAllQueueItems() {
            const q = (await database.ref('queue').orderByChild('queuedAt').once('value')).val() || {};
            return Object.values(q).sort((a, b) => a.queuedAt - b.queuedAt);
        }
        async function removeFromQueue(qid) { await database.ref(`queue/${qid}`).remove(); }

        async function assignOrderToMaster(order, masterNum) {
            const users = await loadUsers();
            const masterName = users[masterNum]?.name || `Окно ${masterNum}`;
            await updateUserStatus(masterNum, "busy");
            const task = {
                id: order.id, code6: order.code6, items: order.items, total: order.total,
                time: order.time, appointmentTime: order.appointmentTime,
                status: "waiting", master: masterName, clientStatus: "waiting",
                createdAt: order.createdAt, windowNum: masterNum
            };
            await saveTask(task);
            showSuccess(`✅ Заказ №${order.id} автоматически назначен ${masterName}`);
            speak(`Заказ номер ${order.id} назначен ${masterName}`);
            if (currentRole === 'CASHBOX') {
                await loadWindowsStatus();
                await updateTimeSelect();
                await loadQueueDisplay();
            }
        }

        // ==================== ВТОРАЯ БАЗА (ЧЕКИ) ====================
        async function saveToCheckLog(checkData) {
            const logId = `${Date.now()}_${checkData.id}`;
            await chekiDatabase.ref(`checkLogs/${logId}`).set({
                ...checkData,
                logId: logId,
                timestamp: Date.now(),
                date: new Date().toLocaleDateString('ru-RU'),
                fullDateTime: new Date().toLocaleString('ru-RU')
            });
        }

        // ==================== МОНИТОР ОЖИДАНИЯ МАСТЕРОВ ====================
        async function updateWaitingMonitor() {
            const container = document.getElementById('waitingCards');
            if (!container) return;
            const users = await loadUsers();
            const now = Date.now();
            let html = '';
            for (const [num, user] of Object.entries(users)) {
                if (user.role !== "WORKER") continue;
                const status = user.workStatus || "free";
                let cardStyle = '', timeText = '';
                if (status === 'free') {
                    if (!waitingStartTimes[num]) waitingStartTimes[num] = now;
                    const elapsed = Math.floor((now - waitingStartTimes[num]) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    timeText = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                    cardStyle = 'border: 2px solid #00ff66; box-shadow: 0 0 15px rgba(0,255,102,0.2);';
                } else {
                    delete waitingStartTimes[num];
                    if (status === 'busy') {
                        timeText = '🔴 Занят';
                        cardStyle = 'border: 2px solid #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.2);';
                    } else if (status === 'break') {
                        timeText = '🟡 Перерыв';
                        cardStyle = 'border: 2px solid #ffcc00; box-shadow: 0 0 15px rgba(255,204,0,0.2);';
                    }
                }
                html += `<div class="waiting-card" style="${cardStyle}">
                    <div style="font-weight:bold; color:#05d9e8;">${user.name}</div>
                    <div style="font-size:1.8em; font-family:monospace; color:${status==='free'?'#00ff66':'#ff0000'}; margin:5px 0;">${timeText}</div>
                    <div style="font-size:12px; color:#888;">${status==='free'?'⏳ ждёт':(status==='busy'?'⚡ работает':'☕ перерыв')}</div>
                </div>`;
            }
            container.innerHTML = html;
        }

        // ==================== УВЕДОМЛЕНИЯ (ОШИБКИ / УСПЕХ) ====================
        function showError(msg) {
            const app = document.getElementById('app');
            const d = document.createElement('div');
            d.className = 'error'; d.innerText = msg;
            app.insertBefore(d, app.firstChild);
            setTimeout(() => d.remove(), 3000);
        }
        function showSuccess(msg) {
            const app = document.getElementById('app');
            const d = document.createElement('div');
            d.className = 'success'; d.innerText = msg;
            app.insertBefore(d, app.firstChild);
            setTimeout(() => d.remove(), 3000);
        }
        function showFloatingCode(code, ticketId) {
            const app = document.getElementById('app');
            const div = document.createElement('div');
            div.className = 'floating-code';
            div.innerHTML = `
                <div style="font-size:12px; color:#888;">НОВЫЙ ЗАКАЗ</div>
                <div style="font-size:28px; font-weight:bold; color:#00ff66; font-family:monospace; letter-spacing:5px;">${code}</div>
                <div style="font-size:14px; color:#05d9e8;">БИЛЕТ №${ticketId}</div>
                <div style="font-size:10px; color:#555;">Скажите код клиенту</div>`;
            app.appendChild(div);
            setTimeout(() => div.remove(), 10000);
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        async function login(winNum, pass) {
            const snap = await database.ref(`users/${winNum}`).once('value');
            if (!snap.exists()) { showError("Неверный номер окна!"); return false; }
            const user = snap.val();
            if (user.password !== pass) { showError("Неверный пароль!"); return false; }
            await database.ref(`users/${winNum}`).update({
                online: true,
                lastSeen: Date.now(),
                deviceModel: getDeviceInfo()
            });
            currentUser = winNum;
            currentRole = user.role;
            currentWindow = user.name;
            localStorage.setItem('user', JSON.stringify({
                windowNumber: winNum,
                role: user.role,
                name: user.name
            }));
            initTTS();
            return true;
        }
        async function logout() {
            if (currentUser) await database.ref(`users/${currentUser}`).update({ online: false });
            if (problemListenerStarted) {
                database.ref('problems').off();
                problemListenerStarted = false;
            }
            currentUser = null; currentRole = null; currentWindow = null;
            localStorage.removeItem('user');
            renderLoginScreen();
        }

        // ==================== ИНТЕРФЕЙС ВХОДА ====================
        function renderLoginScreen() {
            document.getElementById('app').innerHTML = `
                <div class="container" style="max-width:450px; margin:0 auto;">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <div class="tts-control">
                        <label>🔊 Озвучка</label>
                        <input type="checkbox" id="ttsToggle" checked>
                    </div>
                    <input type="number" id="windowNumber" placeholder="Номер окна (0-касса,1-4-мастера)" value="0">
                    <input type="password" id="password" placeholder="Пароль">
                    <div style="font-size:12px; color:#555; text-align:center; margin-bottom:15px;">
                        📋 Касса: 0 / admin123321 | Окна 1-4: okno1..okno4</div>
                    <button onclick="doLogin()">🔓 ВОЙТИ</button>
                </div>`;
            document.getElementById('ttsToggle').addEventListener('change', e => ttsEnabled = e.target.checked);
        }
        async function doLogin() {
            const num = document.getElementById('windowNumber').value;
            const pass = document.getElementById('password').value;
            ttsEnabled = document.getElementById('ttsToggle').checked;
            if (await login(num, pass)) {
                await loadDistributionSettings();
                if (currentRole === 'CASHBOX') {
                    startProblemListener();
                    startQueueListener();
                    renderCashierScreen();
                } else {
                    renderWorkerScreen();
                }
            }
        }

        // ==================== КАССИР ====================
        function renderCashierScreen() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                        <h1>🦁 КАССА</h1>
                        <div class="clock" id="clock"></div>
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                        <button class="btn-purple" onclick="showAdminPanel()">👑 АДМИН</button>
                        <button class="btn-danger" onclick="sendProblemFromCashier()">🔴 ПРОБЛЕМА</button>
                        <button class="btn-danger" onclick="logout()">🚪 ВЫХОД</button>
                    </div>
                    <div class="flex-row">
                        <div class="flex-col">
                            <div class="card"><div class="ticket-number" id="ticketNumber">БИЛЕТ №1</div></div>
                            <h2>➕ ДОБАВИТЬ</h2>
                            <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                                <button onclick="addToCart('ручка')" style="background:#05d9e8;">✍️ РУЧКА (4)</button>
                                <button onclick="addToCart('маркер')" style="background:#ff6600;">🖍️ МАРКЕР (6)</button>
                            </div>
                            <div class="card">
                                <h3>КОЛИЧЕСТВО</h3>
                                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                    ${[1,2,3,4,5].map(n => `<button onclick="setCount(${n})" class="btn-sm">x${n}</button>`).join('')}
                                </div>
                            </div>
                            <div class="card">
                                <h3>⚙️ РАСПРЕДЕЛЕНИЕ</h3>
                                <div class="mode-selector">
                                    <button class="mode-btn ${distributionMode==='auto'?'active':''}" onclick="saveDistributionMode('auto')">🔄 АВТО</button>
                                    <button class="mode-btn ${distributionMode==='manual'?'active':''}" onclick="saveDistributionMode('manual')">✋ РУЧНОЙ</button>

                            <div class="total" id="totalAmount">💰 0 коп</div>

                            <h2>📋 ОКНА</h2>

                                <div style="display:flex; flex-wrap:wrap; gap:10px;" id="waitingCards"></div>
                            </div>
                            <h2>⏳ ОЧЕРЕДЬ ЗАКАЗОВ</h2>

                </div>`;
            updateClock();
            setInterval(updateClock, 1000);
            loadCashierData();
            startRealtimeUpdates();
            updateTimeSelect();
            loadQueueDisplay();
            updateWaitingMonitor();
            setInterval(updateWaitingMonitor, 1000);

        async function loadCashierData() {
            currentTicketNumber = (await database.ref('counter').once('value')).val() || 1;
            document.getElementById('ticketNumber').innerText = `БИЛЕТ №${currentTicketNumber}`;
            updateCartDisplay();
            await loadWindowsStatus();
        }
        function setCount(n) { currentCount = n; }
        function addToCart(service) { cart.push({ service, count: currentCount, price: prices[service] }); updateCartDisplay(); }
        function updateCartDisplay() {
            const c = document.getElementById('cartContainer'); if (!c) return;
            let total = 0; c.innerHTML = '';
            cart.forEach((item, i) => {
                const sum = item.count * item.price; total += sum;
                c.innerHTML += `<div class="cart-item"><span>${item.service.toUpperCase()} x${item.count}</span><span>${sum} коп</span><button onclick="removeFromCart(${i})" class="btn-sm">🗑</button></div>`;
            });
            document.getElementById('totalAmount').innerHTML = `💰 ИТОГО: ${total} коп`;
        }
        function removeFromCart(i) { cart.splice(i, 1); updateCartDisplay(); }
        function clearCart() { cart = []; updateCartDisplay(); }

        async function confirmOrder() {
            if (cart.length === 0) { showError("Корзина пуста!"); return; }
            const total = cart.reduce((s, i) => s + i.count * i.price, 0);
            const ticketId = currentTicketNumber;
            const code6 = generate6DigitCode();
            const now = new Date();
            let targetWindow = null, appointmentTime = null;

            if (distributionMode === "manual") {
                const users = await loadUsers();
                const free = Object.entries(users).filter(([_, u]) => u.role === "WORKER" && u.workStatus === "free");
                if (free.length > 0) {
                    const list = free.map(([n, u]) => `${n}: ${u.name}`).join('\n');
                    const sel = prompt(`Выберите окно:\n${list}\nВведите номер:`);
                    if (sel && free.find(([n]) => n === sel)) targetWindow = sel;
                    else { showError("Неверный выбор окна!"); return; }
                }
            } else {
                targetWindow = await getBestWindow();
            }

            const timeSelect = document.getElementById('timeSelect');
            appointmentTime = timeSelect?.value || now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            if (targetWindow) {
                const users = await loadUsers();
                const masterName = users[targetWindow]?.name || `Окно ${targetWindow}`;
                await updateUserStatus(targetWindow, "busy");
                const task = {
                    id: ticketId, code6, items: [...cart], total,
                    time: now.toLocaleTimeString('ru-RU'),
                    appointmentTime, status: "waiting", master: masterName,
                    clientStatus: "waiting", createdAt: Date.now(), windowNum: targetWindow
                };
                await saveTask(task);
                await saveToCheckLog({ ...task, status: "created" });
                showFloatingCode(code6, ticketId);
                showSuccess(`✅ БИЛЕТ №${ticketId} → ${masterName}`);
                try { await navigator.clipboard.writeText(code6); } catch (e) {}
                await updateUserTodayOrders(targetWindow, true);
            } else {
                const future = new Date(now.getTime() + 5 * 60000);
                appointmentTime = `${future.getHours().toString().padStart(2, '0')}:${future.getMinutes().toString().padStart(2, '0')}`;
                const order = {
                    id: ticketId, code6, items: [...cart], total,
                    time: now.toLocaleTimeString('ru-RU'), appointmentTime,
                    createdAt: Date.now()
                };
                await addToQueue(order);
                await saveToCheckLog({ ...order, master: "Очередь", windowNum: null, status: "queued" });
                showFloatingCode(code6, ticketId);
                showSuccess(`⏰ БИЛЕТ №${ticketId} в очереди (~${appointmentTime})`);
                try { await navigator.clipboard.writeText(code6); } catch (e) {}
            }

            await database.ref('counter').set(ticketId + 1);
            currentTicketNumber = ticketId + 1;
            document.getElementById('ticketNumber').innerText = `БИЛЕТ №${currentTicketNumber}`;
            cart = []; updateCartDisplay();
            await loadWindowsStatus();
            await updateTimeSelect();
            await loadQueueDisplay();
        }

        async function loadWindowsStatus() {
            const container = document.getElementById('windowsContainer');
            if (!container) return;
            const users = await loadUsers();
            container.innerHTML = '';
            for (const [num, user] of Object.entries(users)) {
                if (user.role !== "WORKER") continue;
                const status = user.workStatus || "free";
                let stText = '', color = '';
                if (status === 'free') { stText = '🟢 СВОБОДЕН'; color = '#00ff66'; }
                else if (status === 'busy') { stText = '🔴 ЗАНЯТ'; color = '#ff0000'; }
                else if (status === 'break') { stText = '🟡 ПЕРЕРЫВ'; color = '#ffcc00'; }
                container.innerHTML += `
                    <div class="window-row">
                        <span><strong>${user.name}</strong> (пр: ${windowPriorities[num] || 1})</span>
                        <span style="color:${color}">${stText}</span>
                        <span>📊 ${user.todayOrders || 0}</span>
                        <div style="display:flex; gap:5px;">
                            ${status === 'busy' ? `<button onclick="freeWindow(${num})" class="btn-sm">🔓</button>` : ''}
                            ${status === 'free' ? `<button onclick="setBreakByCashier(${num})" class="btn-sm btn-warning">🟡</button>` : ''}
                            ${status === 'break' ? `<button onclick="removeBreakByCashier(${num})" class="btn-sm btn-success">✅</button>` : ''}
                            <button onclick="sendProblemFromCashierToWindow(${num})" class="btn-sm btn-danger">🔴</button>
                        </div>
                    </div>`;
            }
        }

        function updateClock() {
            const clock = document.getElementById('clock');
            if (clock) clock.innerText = new Date().toLocaleTimeString('ru-RU');
        }

        async function updateTimeSelect() {
            const select = document.getElementById('timeSelect');
            if (!select) return;
            const slots = await getAvailableSlots();
            select.innerHTML = slots.map(s => `<option value="${s}">${s}</option>`).join('');
            if (slots.length === 0) select.innerHTML = '<option value="">Нет свободных слотов</option>';
        }

        async function loadQueueDisplay() {
            const container = document.getElementById('queueContainer');
            if (!container) return;
            const allItems = await getAllQueueItems();
            const totalPages = Math.ceil(allItems.length / queueItemsPerPage);
            const start = (queueCurrentPage - 1) * queueItemsPerPage;
            const pageItems = allItems.slice(start, start + queueItemsPerPage);
            let html = '';
            if (allItems.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#555; padding:15px;">✨ ОЧЕРЕДЬ ПУСТА ✨</div>';
                return;
            }
            html += `<div class="queue-container-scroll">`;
            for (const order of pageItems) {
                const itemsText = order.items.map(i => `${i.service} x${i.count}`).join(', ');
                const waitMin = Math.ceil((order.queuedAt + 5 * 60000 - Date.now()) / 60000);
                html += `
                    <div class="queue-item" onclick="showQueueItemDetails('${order.queueId}')">
                        <div><strong>🎫 БИЛЕТ №${order.id}</strong> | ⏰ ${order.appointmentTime} | 💰 ${order.total} коп</div>
                        <div style="font-size:13px; color:#aaa;">📦 ${itemsText}</div>
                        <div style="font-size:12px; color:#05d9e8;">🔑 Код: ${order.code6}</div>
                        <div class="queue-wait">⏳ В очереди: ${waitMin > 0 ? waitMin : 0} мин</div>
                        <button onclick="event.stopPropagation(); removeQueueItem('${order.queueId}')" class="btn-sm btn-danger" style="margin-top:5px;">🗑 Удалить</button>
                    </div>`;
            }
            html += `</div>`;
            if (totalPages > 1) {
                html += `<div class="queue-nav">
                    <button onclick="changeQueuePage(-1)" class="btn-sm" ${queueCurrentPage === 1 ? 'disabled' : ''}>◀ Назад</button>
                    <span class="current-page">Стр ${queueCurrentPage} из ${totalPages}</span>
                    <button onclick="changeQueuePage(1)" class="btn-sm" ${queueCurrentPage === totalPages ? 'disabled' : ''}>Вперед ▶</button>
                </div>`;
            }
            container.innerHTML = html;
        }
        function changeQueuePage(delta) {
            queueCurrentPage += delta;
            if (queueCurrentPage < 1) queueCurrentPage = 1;
            loadQueueDisplay();
        }
        async function showQueueItemDetails(qid) {
            const snap = await database.ref(`queue/${qid}`).once('value');
            const order = snap.val();
            if (order) {
                const itemsText = order.items.map(i => `${i.service.toUpperCase()} x${i.count} = ${i.count * i.price} коп`).join('\n');
                alert(`🎫 БИЛЕТ №${order.id}\n━━━━━━━━━━\n📦 СОСТАВ:\n${itemsText}\n━━━━━━━━━━\n💰 ИТОГО: ${order.total} коп\n🔑 КОД: ${order.code6}\n⏰ ВРЕМЯ: ${order.appointmentTime}`);
            }
        }
        async function removeQueueItem(qid) {
            if (confirm("Удалить заказ из очереди?")) {
                await removeFromQueue(qid);
                await loadQueueDisplay();
                showSuccess("✅ Заказ удалён из очереди");
            }
        }

        function startQueueListener() {
            database.ref('users').on('child_changed', async (snap) => {
                const user = snap.val();
                if (user && user.role === "WORKER" && user.workStatus === "free") {
                    const nextOrder = await getNextFromQueue();
                    if (nextOrder) {
                        await removeFromQueue(nextOrder.queueId);
                        await assignOrderToMaster(nextOrder, snap.key);
                        await loadQueueDisplay();
                    }
                }
            });
            database.ref('queue').on('value', () => {
                if (currentRole === 'CASHBOX') loadQueueDisplay();
            });
        }

        // ==================== ПРОБЛЕМЫ ====================
        async function sendProblemFromWorker() {
            await database.ref('problems').push({
                id: Date.now(), window: currentWindow, windowNum: currentUser,
                ticket: currentActiveTask?.id || null, time: new Date().toLocaleTimeString(),
                timestamp: Date.now(), status: "new"
            });
            showSuccess("🔴 Сигнал отправлен кассиру");
        }
        async function sendProblemFromCashier() {
            const target = prompt("Введите номер окна (1-4):");
            if (target) await sendProblemFromCashierToWindow(target);
        }
        async function sendProblemFromCashierToWindow(windowNum) {
            const users = await loadUsers();
            if (!users[windowNum]) { showError(`Окно ${windowNum} не найдено!`); return; }
            await database.ref('problems').push({
                id: Date.now(), window: users[windowNum].name, windowNum: windowNum,
                ticket: null, time: new Date().toLocaleTimeString(),
                timestamp: Date.now(), status: "new"
            });
            showSuccess(`🔴 Сигнал отправлен на окно ${windowNum}`);
        }
        function startProblemListener() {
            if (problemListenerStarted) return;
            if (currentRole !== 'CASHBOX') return;
            problemListenerStarted = true;
            database.ref('problems').orderByChild('status').equalTo('new').on('child_added', snap => {
                const p = snap.val();
                if (p && p.status === 'new') {
                    speak(`ВНИМАНИЕ! ПРОБЛЕМА НА ОКНЕ ${p.windowNum}!`, true);
                    const div = document.createElement('div');
                    div.className = 'problem-notify';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
                            <div>
                                <div style="font-size:24px; font-weight:bold;">🔴 ПРОБЛЕМА!</div>
                                <div style="font-size:18px; margin-top:5px;">📌 Окно: ${p.window} (№${p.windowNum})</div>
                                ${p.ticket ? `<div style="font-size:16px;">🎫 Билет: №${p.ticket}</div>` : '<div style="font-size:16px;">⚠️ Общая проблема</div>'}
                                <div style="font-size:14px;">⏰ Время: ${p.time}</div>
                            </div>
                            <button onclick="resolveProblem('${snap.key}')" style="background:#00ff66; color:#0a0a0f; padding:15px 30px; font-size:18px; font-weight:bold; border:none; border-radius:50px;">
                                🚶‍♂️ ИДУ
                            </button>
                        </div>`;
                    document.getElementById('app').prepend(div);
                }
            });
        }
        async function resolveProblem(key) {
            await database.ref(`problems/${key}`).update({ status: "resolved" });
            document.querySelector('.problem-notify')?.remove();
            showSuccess("✅ Проблема решена");
        }

        // ==================== ЭКРАН МАСТЕРА ====================
        function renderWorkerScreen() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h1>🦁 ${currentWindow}</h1>
                        <div class="clock" id="clock"></div>
                    </div>
                    <div class="flex-row">
                        <div class="flex-col">
                            <h2>📋 ДОСТУПНЫЕ ЗАКАЗЫ</h2>
                            <div id="tasksContainer"></div>
                        </div>
                        <div class="flex-col">
                            <h2>🔍 ПОИСК ПО КОДУ</h2>
                            <input type="text" id="codeInput" placeholder="6-значный код" maxlength="6">
                            <button onclick="searchByCode()">🔍 НАЙТИ</button>
                            <h2>📌 ТЕКУЩИЙ ЗАКАЗ</h2>
                            <div class="card" id="currentOrderCard"><div style="text-align:center; color:#555;">Нет активного</div></div>
                            <div style="display:flex; gap:10px; margin-top:15px; flex-wrap:wrap;">
                                <button class="btn-warning" onclick="clientArrived()" style="flex:1;">👋 КЛИЕНТ ПРИШЁЛ</button>
                                <button class="btn-danger" onclick="sendProblemFromWorker()" style="flex:1;">🔴 ПРОБЛЕМА</button>
                            </div>
                            <button class="btn-success" onclick="completeOrder()">✅ ЗАВЕРШИТЬ</button>
                            <button class="btn-danger" onclick="deleteCurrentOrder()" style="margin-top:5px;">🗑️ УДАЛИТЬ ТЕКУЩИЙ</button>
                        </div>
                    </div>
                </div>`;
            updateClock();
            setInterval(updateClock, 1000);
            loadWorkerTasks();
            startRealtimeUpdates();
            document.getElementById('codeInput').addEventListener('keypress', e => e.key === 'Enter' && searchByCode());
        }

        async function loadWorkerTasks() {
            const container = document.getElementById('tasksContainer');
            if (!container) return;
            const tasks = Object.values(await loadTasks()).filter(t => t.status === 'waiting');
            if (tasks.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center; color:#555;">✨ НЕТ ЗАКАЗОВ ✨</div>';
                return;
            }
            container.innerHTML = '';
            for (const task of tasks) {
                const itemsText = task.items.map(i => `${i.service.toUpperCase()} x${i.count}`).join(', ');
                container.innerHTML += `
                    <div class="card ticket-card">
                        <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                            <span class="ticket-number">🎫 №${task.id}</span>
                            <span class="status-badge status-waiting">ОЖИДАЕТ</span>
                        </div>
                        <div>📦 ${itemsText}</div>
                        <div>💰 ${task.total} коп</div>
                        <div>🔑 ${task.code6}</div>
                        <div>⏰ ${task.appointmentTime || 'Сейчас'}</div>
                        <button onclick="event.stopPropagation(); deleteOrderById(${task.id})" class="btn-sm btn-danger" style="position:absolute; top:10px; right:10px;">🗑</button>
                        <div style="text-align:right; margin-top:5px;">
                            <button onclick="takeOrder(${task.id})" class="btn-sm btn-success">ВЗЯТЬ</button>
                        </div>
                    </div>`;
            }
        }

        async function takeOrder(taskId) {
            const tasks = await loadTasks();
            if (!tasks[taskId] || tasks[taskId].status !== 'waiting') { showError("Заказ уже взят!"); return; }
            await updateTaskStatus(taskId, "active", currentWindow);
            await updateUserStatus(currentUser, "busy");
            currentActiveTask = { ...tasks[taskId], status: "active", master: currentWindow };
            displayCurrentOrder(currentActiveTask);
            await loadWorkerTasks();
            showSuccess(`✅ Заказ №${taskId} взят`);
        }

        function displayCurrentOrder(task) {
            const container = document.getElementById('currentOrderCard');
            if (!container) return;
            const itemsText = task.items.map(i => `• ${i.service.toUpperCase()} x${i.count} = ${i.count * i.price} коп`).join('<br>');
            container.innerHTML = `
                <div class="ticket-number">🎫 №${task.id}</div>
                <div style="margin:10px 0;">${itemsText}</div>
                <div><strong>💰 ИТОГО: ${task.total} коп</strong></div>
                <div>🔑 ${task.code6}</div>
                <div>⏰ ${task.appointmentTime || 'Сейчас'}</div>
                <div><span class="status-badge status-session">🟣 ${task.clientStatus === 'session' ? 'НА СЕАНСЕ' : 'ОЖИДАЕТ'}</span></div>`;
        }

        async function clientArrived() {
            if (!currentActiveTask) { showError("Нет активного заказа!"); return; }
            await database.ref(`tasks/${currentActiveTask.id}`).update({ clientStatus: "session" });
            speak("Здравствуйте, присаживайтесь! Выберите татуировку");
            showSuccess(`👋 Клиент пришёл (билет №${currentActiveTask.id})`);
            currentActiveTask.clientStatus = "session";
            displayCurrentOrder(currentActiveTask);
        }

        async function completeOrder() {
            if (!currentActiveTask) { showError("Нет активного заказа!"); return; }
            await updateTaskStatus(currentActiveTask.id, "completed");
            await updateUserStatus(currentUser, "free");
            await deleteTask(currentActiveTask.id);
            speak("Хорошего дня, будем ждать вас снова");
            showSuccess(`✅ Заказ №${currentActiveTask.id} завершён`);
            currentActiveTask = null;
            document.getElementById('currentOrderCard').innerHTML = '<div style="text-align:center; color:#555;">Нет активного</div>';
            document.getElementById('codeInput').value = '';
            await loadWorkerTasks();
        }

        async function deleteCurrentOrder() {
            if (!currentActiveTask) { showError("Нет активного заказа!"); return; }
            if (confirm(`Удалить текущий заказ №${currentActiveTask.id}?`)) {
                await deleteTask(currentActiveTask.id);
                await updateUserStatus(currentUser, "free");
                currentActiveTask = null;
                document.getElementById('currentOrderCard').innerHTML = '<div style="text-align:center; color:#555;">Нет активного</div>';
                showSuccess("Заказ удалён");
                await loadWorkerTasks();
            }
        }

        async function searchByCode() {
            const code = document.getElementById('codeInput').value.trim();
            if (code.length !== 6) { showError("Введите 6-значный код!"); return; }
            const tasks = Object.values(await loadTasks()).find(t => t.code6 === code);
            if (!tasks) { showError("Заказ не найден!"); return; }
            if (tasks.status === "active" && tasks.master === currentWindow) {
                currentActiveTask = tasks;
                displayCurrentOrder(tasks);
                showSuccess(`Заказ найден! Билет №${tasks.id}`);
            } else if (tasks.status === "waiting") {
                await takeOrder(tasks.id);
            } else {
                showError("Этот заказ уже выполняет другой мастер или завершён");
            }
        }

        async function deleteOrderById(orderId) {
            if (!confirm(`Удалить заказ №${orderId} навсегда?`)) return;
            await database.ref(`tasks/${orderId}`).remove();
            const queue = await getAllQueueItems();
            for (const q of queue) {
                if (q.id == orderId) await removeFromQueue(q.queueId);
            }
            showSuccess(`🗑️ Заказ №${orderId} удалён`);
            if (currentRole === 'CASHBOX') {
                await loadCashierData();
                await loadQueueDisplay();
            } else {
                await loadWorkerTasks();
            }
        }

                <div class="container" style="max-width:1000px;">
                    <h1>👑 АДМИН-ПАНЕЛЬ</h1>
                    <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
                        <button onclick="addNewWindow()" class="btn-success">➕ ОКНО</button>
                        <button onclick="renderCashierScreen()" class="btn-purple">◀ НАЗАД</button>

                        <button onclick="clearAllTasks()" class="btn-warning">🗑 ВСЕ ЗАКАЗЫ</button>
                        <button onclick="showSchedulePanel()" class="btn-warning">⏰ РАСПИСАНИЕ</button>
                        <button onclick="showCheckLogs()" class="btn-success">📊 ЛОГ ЧЕКОВ</button>
                        <button onclick="exportData()" class="btn-purple">⬇️ ЭКСПОРТ</button>
                    </div>
                    <h2>🪟 ОКНА</h2>
                    <div class="card">${windowsHtml}</div>
                    <h2>⚙️ НАСТРОЙКИ РАСПРЕДЕЛЕНИЯ</h2>
                    <div class="mode-selector">
                        <button class="mode-btn ${distributionMode === 'auto' ? 'active' : ''}" onclick="saveDistributionMode('auto')">🔄 АВТО</button>
                        <button class="mode-btn ${distributionMode === 'manual' ? 'active' : ''}" onclick="saveDistributionMode('manual')">✋ РУЧНОЙ</button>
                        <button class="mode-btn ${distributionMode === 'priority' ? 'active' : ''}" onclick="saveDistributionMode('priority')">⭐ ПРИОР</button>
                    </div>
                    <div id="prioritySettings"></div>
                </div>`;
            if (distributionMode === 'priority') {
                let phtml = '<h3>Приоритеты (меньше = выше)</h3><div style="display:flex; flex-wrap:wrap; gap:10px;">';
                for (const [num, user] of Object.entries(users)) {
                    if (user.role !== "WORKER") continue;
                    phtml += `<div style="background:#252540; border-radius:20px; padding:10px; text-align:center;">
                        <div>${user.name}</div>
                        <input type="number" id="priority_${num}" value="${windowPriorities[num] || 1}" min="1" max="10" style="width:60px; text-align:center;">
                        <button onclick="setPriority(${num})" class="btn-sm btn-success">💾</button>
                    </div>`;
                }
                phtml += '</div>';
                document.getElementById('prioritySettings').innerHTML = phtml;
            }
        }

        async function setPriority(num) {
            const val = parseInt(document.getElementById(`priority_${num}`).value);
            windowPriorities[num] = val;
            await database.ref('settings/windowPriorities').set(windowPriorities);
            await database.ref(`users/${num}/priority`).set(val);
            showSuccess(`Приоритет окна ${num} установлен: ${val}`);
            showAdminPanel();
        }
        async function deleteWorker(num) {
            if (confirm(`Удалить окно ${num} навсегда?`)) {
                await database.ref(`users/${num}`).remove();
                showSuccess(`Окно ${num} удалено`);
                showAdminPanel();
            }
        }
        async function kickWorker(num) {
            await database.ref(`users/${num}`).update({ online: false, workStatus: "free" });
            await database.ref(`commands/${num}`).set({ action: "logout", timestamp: Date.now() });
            showSuccess("Мастер выгнан");
            showAdminPanel();
        }
        async function forceFreeWindow(num) {
            await updateUserStatus(num, "free");
            showSuccess(`Окно ${num} освобождено`);
            showAdminPanel();
        }
        async function forceLogoutAll() {
            const users = await loadUsers();
            for (const num of Object.keys(users)) {
                if (users[num].role === 'WORKER') {
                    await database.ref(`users/${num}`).update({ online: false, workStatus: "free" });
                    await database.ref(`commands/${num}`).set({ action: "logout", timestamp: Date.now() });
                }
            }
            showSuccess("Все мастера выгнаны");
            showAdminPanel();
        }
        async function clearAllTasks() {
            if (confirm("⚠️ Удалить ВСЕ заказы и очередь?")) {
                await database.ref('tasks').remove();
                await database.ref('queue').remove();
                showSuccess("Все заказы удалены");
                showAdminPanel();
            }
        }
        function addNewWindow() {
            const num = prompt("Номер окна (1-10):");
            if (!num) return;
            const pass = prompt("Пароль:");
            if (!pass) return;
            const name = prompt("Имя мастера:");
            if (!name) return;
            database.ref(`users/${num}`).set({
                password: pass, role: "WORKER", name: name,
                workStatus: "free", online: false, priority: 5, todayOrders: 0
            }).then(() => { showSuccess(`Окно ${name} добавлено`); showAdminPanel(); });
        }
        async function saveDistributionMode(mode) {
            distributionMode = mode;
            await database.ref('settings/distributionMode').set(mode);
            showSuccess(`Режим: ${mode}`);
            if (currentRole === 'CASHBOX') renderCashierScreen(); else showAdminPanel();
        }

        // ==================== РАСПИСАНИЕ ====================
        async function showSchedulePanel() {
            const schedule = (await database.ref('schedule').once('value')).val() || {};
            const tasks = await loadTasks();
            const booked = Object.values(tasks).map(t => t.appointmentTime).filter(Boolean);
            let html = `<div class="card"><h3>📅 РАСПИСАНИЕ</h3><div style="display:flex; flex-wrap:wrap; gap:10px;">`;
            for (const [time, data] of Object.entries(schedule).sort()) {
                const isBooked = booked.includes(time);
                html += `<div style="background:#252540; border-radius:20px; padding:10px; text-align:center; min-width:100px;">
                    <div style="font-size:1.2em; font-weight:bold; color:#05d9e8;">${time}</div>
                    <div style="color:${isBooked?'#ff0000':(data.available?'#00ff66':'#ff6600')};">${isBooked?'ЗАНЯТ':(data.available?'СВОБОДЕН':'БЛОК')}</div>
                    <button onclick="toggleSlot('${time}')" class="btn-sm">${data.available?'🔒':'🔓'}</button>
                    <button onclick="removeSlot('${time}')" class="btn-sm btn-danger">🗑</button>
                </div>`;
            }
            html += `</div></div>
                <div class="card"><h3>➕ ДОБАВИТЬ СЛОТ</h3>
                <select id="newHour">${Array.from({length:9},(_,i)=>i+12).map(h=>`<option>${h}</option>`).join('')}</select>
                <select id="newMinute"><option>00</option><option>15</option><option>30</option><option>45</option></select>
                <button onclick="addTimeSlot()" class="btn-success">➕ ДОБАВИТЬ</button></div>`;
            document.getElementById('app').innerHTML += `<div id="schedulePanel" style="margin-top:20px;">${html}</div>`;
        }
        async function toggleSlot(time) {
            const schedule = (await database.ref('schedule').once('value')).val() || {};
            if (schedule[time]) {
                schedule[time].available = !schedule[time].available;
                await database.ref('schedule').set(schedule);
                showSuccess(`Слот ${time} ${schedule[time].available ? 'открыт' : 'заблокирован'}`);
                showSchedulePanel();
            }
        }
        async function removeSlot(time) {
            const schedule = (await database.ref('schedule').once('value')).val() || {};
            delete schedule[time];
            await database.ref('schedule').set(schedule);
            showSuccess(`Слот ${time} удалён`);
            showSchedulePanel();
        }
        async function addTimeSlot() {
            const hour = document.getElementById('newHour').value;
            const minute = document.getElementById('newMinute').value;
            const time = `${hour}:${minute}`;
            const schedule = (await database.ref('schedule').once('value')).val() || {};
            if (!schedule[time]) {
                schedule[time] = { available: true, bookedBy: null };
                await database.ref('schedule').set(schedule);
                showSuccess(`Слот ${time} добавлен`);
                showSchedulePanel();
            } else {
                showError(`Слот ${time} уже существует`);
            }
        }

        // ==================== ЛОГ ЧЕКОВ (ВТОРАЯ БАЗА) ====================
        async function showCheckLogs() {
            const logs = (await chekiDatabase.ref('checkLogs').once('value')).val() || {};
            const sorted = Object.values(logs).sort((a, b) => b.timestamp - a.timestamp).slice(0, 100);
            let totalSum = 0;
            let html = '<div class="card"><h3>📊 ЛОГ ЧЕКОВ (последние 100)</h3><div style="max-height:400px; overflow-y:auto;">';
            for (const l of sorted) {
                totalSum += l.total;
                html += `<div style="border-bottom:1px solid #333; padding:10px;">
                    <strong>🎫 №${l.id}</strong> | ${l.date} | ${l.time}<br>
                    📦 ${l.items.map(i => `${i.service} x${i.count}`).join(', ')} = <span style="color:#00ff66;">${l.total} коп</span><br>
                    🎨 ${l.master} | ⏰ ${l.appointmentTime} | 🔑 ${l.code6}</div>`;
            }
            html += `</div></div>
                <div class="card" style="text-align:center;">💰 ОБЩАЯ ВЫРУЧКА: <strong>${totalSum} коп (${(totalSum/100).toFixed(2)} руб)</strong></div>
                <button onclick="showAdminPanel()" class="btn-purple">◀ НАЗАД</button>`;
            document.getElementById('app').innerHTML = `<div class="container">${html}</div>`;
        }

        // ==================== ЭКСПОРТ (CSV) ====================
        function exportData() {
            const rows = [["Билет","Код","Мастер","Время","Сумма (коп)"]];
            chekiDatabase.ref('checkLogs').once('value').then(snap => {
                const logs = snap.val() || {};
                for (const l of Object.values(logs)) {
                    rows.push([l.id, l.code6, l.master, l.appointmentTime, l.total]);
                }
                const csv = rows.map(r => r.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'checkLogs.csv'; a.click();
            });
        }

        // ==================== РЕАЛЬНОЕ ВРЕМЯ ====================
        function startRealtimeUpdates() {
            database.ref('tasks').on('value', () => {
                if (currentRole === 'CASHBOX') {
                    loadWindowsStatus();
                    loadQueueDisplay();
                } else {
                    loadWorkerTasks();
                }
            });
            database.ref('users').on('value', () => {
                if (currentRole === 'CASHBOX') loadWindowsStatus();
            });
            if (currentRole === 'WORKER') {
                database.ref(`commands/${currentUser}`).on('value', snap => {
                    if (snap.val()?.action === 'logout') {
                        showError("🔒 Администратор вышел из вашего аккаунта!");
                        setTimeout(logout, 2000);
                    }
                });
            }
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function initDefaults() {
            if (!(await database.ref('users').once('value')).exists()) {
                const defaultUsers = {
                    "0": { password: "admin123321", role: "CASHBOX", name: "Касса", workStatus: "free", online: false, priority: 0, todayOrders: 0 },
                    "1": { password: "okno1", role: "WORKER", name: "Александр", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                    "2": { password: "okno2", role: "WORKER", name: "Мария", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                    "3": { password: "okno3", role: "WORKER", name: "Иван", workStatus: "free", online: false, priority: 1, todayOrders: 0 },
                    "4": { password: "okno4", role: "WORKER", name: "Екатерина", workStatus: "free", online: false, priority: 1, todayOrders: 0 }
                };
                for (const [k, v] of Object.entries(defaultUsers)) await database.ref(`users/${k}`).set(v);
                await database.ref('settings').set({ distributionMode: "auto", windowPriorities: { "1": 1, "2": 1, "3": 1, "4": 1 } });
                await database.ref('counter').set(1);
                const sched = {};
                for (let h = 12; h <= 20; h++) for (const m of ['00', '15', '30', '45']) sched[`${h}:${m}`] = { available: true };
                await database.ref('schedule').set(sched);
            }
        }

        // ==================== СТАРТ ====================
        initTTS();
        initDefaults().then(() => {
            const saved = JSON.parse(localStorage.getItem('user'));
            if (saved) {
                currentUser = saved.windowNumber;
                currentRole = saved.role;
                currentWindow = saved.name;
                if (currentRole === 'CASHBOX') {
                    startProblemListener();
                    startQueueListener();
                    renderCashierScreen();
                } else {
                    renderWorkerScreen();
                }
            } else {
                renderLoginScreen();
            }
        });
    </script>
</body>
</html>
