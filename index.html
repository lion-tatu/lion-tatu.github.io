<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LION t.A.T.u. — Проверка заказа</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 45px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.3);
            border: 1px solid rgba(5, 217, 232, 0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            text-align: center;
            color: #ff2a6d;
            font-size: 2.2em;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85em;
            margin-bottom: 30px;
        }
        .code-input {
            width: 100%;
            padding: 18px;
            font-size: 1.8em;
            text-align: center;
            background: #252540;
            border: 2px solid #05d9e8;
            border-radius: 50px;
            color: white;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
        }
        .code-input:focus {
            border-color: #ff2a6d;
            box-shadow: 0 0 15px rgba(255, 42, 109, 0.5);
        }
        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2em;
            background: #05d9e8;
            border: none;
            border-radius: 50px;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        button:active { transform: scale(0.97); }
        .btn-secondary {
            background: #b300ff;
            color: white;
        }
        .status-card {
            background: #1a1a2e;
            border-radius: 35px;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(5, 217, 232, 0.2);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ticket-number {
            font-size: 3.5em;
            color: #ff2a6d;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }
        .status {
            font-size: 1.3em;
            margin: 15px 0;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
        }
        .status-waiting { background: rgba(255, 204, 0, 0.2); color: #ffcc00; }
        .status-call { background: rgba(0, 255, 102, 0.2); color: #00ff66; animation: pulse 1s infinite; }
        .status-session { background: rgba(179, 0, 255, 0.2); color: #b300ff; }
        .status-ready { background: rgba(255, 42, 109, 0.2); color: #ff2a6d; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
        .details {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #252540;
            border-radius: 25px;
        }
        .details-item {
            padding: 10px;
            border-bottom: 1px solid #3a3a55;
            display: flex;
            justify-content: space-between;
        }
        .details-item:last-child { border-bottom: none; }
        .details-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: #05d9e8;
            text-align: center;
        }
        .total-row {
            font-weight: bold;
            border-top: 2px solid #3a3a55;
            margin-top: 5px;
            padding-top: 10px;
            font-size: 1.2em;
        }
        .qr-container {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 20px;
        }
        .qr-container img {
            width: 180px;
            height: 180px;
        }
        .qr-caption {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
        }
        .error {
            color: #ff4444;
            text-align: center;
            padding: 12px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 25px;
            margin-top: 15px;
        }
        .saved-code {
            background: #252540;
            border-radius: 30px;
            padding: 12px 20px;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .saved-code:hover { background: #353550; }
        .saved-code span { color: #05d9e8; font-family: monospace; font-size: 1.2em; letter-spacing: 2px; }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.75em;
        }
        .price {
            color: #00ff66;
            font-weight: bold;
        }
        .code-display {
            font-size: 2em;
            font-family: monospace;
            color: #05d9e8;
            text-align: center;
            letter-spacing: 5px;
            margin: 10px 0;
        }
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .ticket-number { font-size: 2.5em; }
            .status { font-size: 1.1em; }
            .code-input { font-size: 1.3em; letter-spacing: 4px; }
            .code-display { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ============ FIREBASE КОНФИГ (ВТОРАЯ БАЗА ЧЕКОВ) ============
        const CHEKI_FIREBASE_CONFIG = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "https://cheki-tatu-save-default-rtdb.firebaseio.com/",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Инициализация ТОЛЬКО второй базы (чеков)
        firebase.initializeApp(CHEKI_FIREBASE_CONFIG);
        const chekiDatabase = firebase.database();
        
        // ============ ПЕРЕМЕННЫЕ ============
        let currentCode = null;
        let currentTask = null;
        let watchInterval = null;
        
        // ============ РАБОТА С LOCALSTORAGE ============
        function saveCode(code) {
            localStorage.setItem('lion_client_code', code);
        }
        
        function getSavedCode() {
            return localStorage.getItem('lion_client_code');
        }
        
        function clearSavedCode() {
            localStorage.removeItem('lion_client_code');
        }
        
        // ============ ПОЛУЧЕНИЕ ЗАКАЗА ИЗ ВТОРОЙ БАЗЫ (cheki-tatu-save) ============
        async function getOrderByCode(code) {
            // Ищем в базе чеков
            const snapshot = await chekiDatabase.ref('checkLogs').once('value');
            const logs = snapshot.val() || {};
            
            for (const [id, log] of Object.entries(logs)) {
                if (log.code6 === code) {
                    // Преобразуем данные из чека в формат заказа
                    const total = log.items.reduce((sum, item) => sum + (item.count * item.price), 0);
                    return {
                        id: log.id,
                        code6: log.code6,
                        items: log.items,
                        total: total,
                        time: log.time,
                        appointmentTime: log.appointmentTime,
                        master: log.master || 'Назначается',
                        status: "completed",
                        clientStatus: "completed"
                    };
                }
            }
            return null;
        }
        
        // ============ ОТОБРАЖЕНИЕ СТАТУСА ============
        function getStatusInfo(task) {
            // Для чеков из архива всегда показываем "ГОТОВО"
            return { text: '🔴 ГОТОВО', class: 'status-ready', message: 'Ваш заказ готов! Спасибо за визит!' };
        }
        
        function renderStatus(task) {
            const app = document.getElementById('app');
            const statusInfo = getStatusInfo(task);
            
            const total = task.items.reduce((sum, item) => sum + (item.count * item.price), 0);
            const itemsHtml = task.items.map(item => `
                <div class="details-item">
                    <span>✍️ ${item.service.toUpperCase()}</span>
                    <span>${item.count} шт × ${item.price} коп = <span class="price">${item.count * item.price} коп</span></span>
                </div>
            `).join('');
            
            // Данные для QR-кода
            const qrData = `🎫 БИЛЕТ №${task.id}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📋 СОСТАВ ЗАКАЗА:\n${task.items.map(item => `${item.service} x${item.count} = ${item.count * item.price} коп`).join('\n')}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n💰 ИТОГО: ${total} коп\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🔑 КОД: ${task.code6}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(qrData)}`;
            
            const html = `
                <div class="container">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <div class="subtitle">Статус заказа</div>
                    
                    <div class="status-card">
                        <div class="ticket-number">🎫 №${task.id}</div>
                        <div class="status ${statusInfo.class}">${statusInfo.text}</div>
                        
                        <div class="details">
                            <div class="details-header">📋 СОСТАВ ЗАКАЗА</div>
                            ${itemsHtml}
                            <div class="details-item total-row">
                                <span>💰 ИТОГО</span>
                                <span class="price">${total} коп</span>
                            </div>
                        </div>
                        
                        <div class="details">
                            <div class="details-header">ℹ️ ИНФОРМАЦИЯ</div>
                            <div class="details-item">
                                <span>🎨 Мастер</span>
                                <span>${task.master}</span>
                            </div>
                            <div class="details-item">
                                <span>⏰ Время заказа</span>
                                <span>${task.time}</span>
                            </div>
                            <div class="details-item">
                                <span>📅 Время записи</span>
                                <span style="color: #00ff66; font-weight: bold;">${task.appointmentTime || 'Сейчас'}</span>
                            </div>
                        </div>
                        
                        <div class="code-display">🔑 ${task.code6}</div>
                        
                        <div class="qr-container">
                            <img src="${qrUrl}" alt="QR-код">
                            <div class="qr-caption">Состав заказа + код</div>
                        </div>
                    </div>
                    
                    <button onclick="checkAnother()" class="btn-secondary">🔍 ПРОВЕРИТЬ ДРУГОЙ</button>
                    <div class="footer">Код указан на чеке. Данные из базы чеков</div>
                </div>
            `;
            
            app.innerHTML = html;
        }
        
        // ============ ПРОВЕРКА СТАТУСА ============
        async function checkOrderByCode(code) {
            const task = await getOrderByCode(code);
            
            if (!task) {
                showError("❌ Неверный код! Заказ не найден.");
                return false;
            }
            
            currentCode = code;
            currentTask = task;
            saveCode(code);
            renderStatus(task);
            
            return true;
        }
        
        async function checkSavedCode() {
            const savedCode = getSavedCode();
            if (savedCode) {
                const task = await getOrderByCode(savedCode);
                if (task) {
                    await checkOrderByCode(savedCode);
                    return true;
                } else {
                    clearSavedCode();
                }
            }
            return false;
        }
        
        function showError(msg) {
            const app = document.getElementById('app');
            const div = document.createElement('div');
            div.className = 'error';
            div.innerText = msg;
            app.insertBefore(div, app.firstChild);
            setTimeout(() => div.remove(), 3000);
        }
        
        function renderInputScreen() {
            const app = document.getElementById('app');
            const savedCode = getSavedCode();
            
            const savedHtml = savedCode ? `
                <div class="saved-code" onclick="useSavedCode()">
                    <span>📌 Сохранённый код</span>
                    <span>${savedCode}</span>
                    <span>▶</span>
                </div>
            ` : '';
            
            const html = `
                <div class="container">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <div class="subtitle">Введите код с чека</div>
                    
                    <input type="text" id="codeInput" class="code-input" placeholder="000000" maxlength="6" inputmode="numeric" autofocus>
                    <button onclick="submitCode()">🔍 ПРОВЕРИТЬ</button>
                    
                    ${savedHtml}
                    
                    <div class="footer">Код указан на чеке. Данные из базы чеков</div>
                </div>
            `;
            
            app.innerHTML = html;
            
            const input = document.getElementById('codeInput');
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
            });
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitCode();
            });
        }
        
        async function useSavedCode() {
            const savedCode = getSavedCode();
            if (savedCode) {
                document.getElementById('codeInput').value = savedCode;
                await submitCode();
            }
        }
        
        async function submitCode() {
            const input = document.getElementById('codeInput');
            const code = input.value.trim();
            
            if (code.length !== 6) {
                showError("Введите 6-значный код!");
                return;
            }
            
            if (!/^\d+$/.test(code)) {
                showError("Только цифры!");
                return;
            }
            
            await checkOrderByCode(code);
        }
        
        function checkAnother() {
            if (watchInterval) clearInterval(watchInterval);
            currentCode = null;
            currentTask = null;
            renderInputScreen();
        }
        
        // ============ ЗАПУСК ============
        (async function() {
            const hasSaved = await checkSavedCode();
            if (!hasSaved) {
                renderInputScreen();
            }
        })();
    </script>
</body>
</html>
