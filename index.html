<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LION t.A.T.u. — Проверка заказа</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 100%);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 45px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.3);
            border: 1px solid rgba(5, 217, 232, 0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            display: block;
            width: 90px;
            height: 90px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(255, 42, 109, 0.5);
            border: 2px solid #05d9e8;
        }
        h1 {
            text-align: center;
            color: #ff2a6d;
            font-size: 2em;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85em;
            margin-bottom: 25px;
        }
        .code-input {
            width: 100%;
            padding: 18px;
            font-size: 1.8em;
            text-align: center;
            background: #252540;
            border: 2px solid #05d9e8;
            border-radius: 50px;
            color: white;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
        }
        .code-input:focus {
            border-color: #ff2a6d;
            box-shadow: 0 0 15px rgba(255, 42, 109, 0.5);
        }
        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2em;
            background: #05d9e8;
            border: none;
            border-radius: 50px;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 15px;
        }
        button:active { transform: scale(0.97); }
        .btn-secondary {
            background: #b300ff;
            color: white;
        }
        .status-card {
            background: #1a1a2e;
            border-radius: 35px;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(5, 217, 232, 0.2);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ticket-number {
            font-size: 3em;
            color: #ff2a6d;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }
        .status {
            font-size: 1.3em;
            margin: 15px 0;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
            animation: statusPulse 2s ease-in-out infinite;
        }
        .status-waiting { background: rgba(255, 204, 0, 0.2); color: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .status-call { background: rgba(0, 255, 102, 0.2); color: #00ff66; animation: callPulse 0.8s ease-in-out infinite; box-shadow: 0 0 15px rgba(0,255,102,0.5); }
        .status-session { background: rgba(179, 0, 255, 0.2); color: #b300ff; box-shadow: 0 0 10px rgba(179,0,255,0.3); }
        .status-ready { background: rgba(255, 42, 109, 0.2); color: #ff2a6d; box-shadow: 0 0 10px rgba(255,42,109,0.3); }
        
        @keyframes callPulse {
            0% { transform: scale(1); text-shadow: 0 0 5px #00ff66; }
            50% { transform: scale(1.02); text-shadow: 0 0 20px #00ff66; }
            100% { transform: scale(1); text-shadow: 0 0 5px #00ff66; }
        }
        @keyframes statusPulse {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }
        .details {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #252540;
            border-radius: 25px;
        }
        .details-item {
            padding: 10px;
            border-bottom: 1px solid #3a3a55;
            display: flex;
            justify-content: space-between;
        }
        .details-item:last-child { border-bottom: none; }
        .details-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: #05d9e8;
            text-align: center;
        }
        .total-row {
            font-weight: bold;
            border-top: 2px solid #3a3a55;
            margin-top: 5px;
            padding-top: 10px;
            font-size: 1.1em;
        }
        .qr-container {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 20px;
        }
        .qr-container img {
            width: 160px;
            height: 160px;
        }
        .qr-caption {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
        }
        .error {
            color: #ff4444;
            text-align: center;
            padding: 12px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 25px;
            margin-top: 15px;
        }
        .saved-code {
            background: #252540;
            border-radius: 30px;
            padding: 12px 20px;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .saved-code:hover { background: #353550; }
        .saved-code span { color: #05d9e8; font-family: monospace; font-size: 1.2em; letter-spacing: 2px; }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.75em;
        }
        .refresh-info {
            text-align: center;
            font-size: 0.7em;
            color: #444;
            margin-top: 10px;
        }
        .price { color: #00ff66; font-weight: bold; }
        .code-display {
            font-size: 1.8em;
            font-family: monospace;
            color: #05d9e8;
            text-align: center;
            letter-spacing: 5px;
            margin: 10px 0;
        }
        .master-name {
            color: #ffcc00;
            font-weight: bold;
        }
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .ticket-number { font-size: 2.2em; }
            .code-input { font-size: 1.3em; letter-spacing: 4px; }
            .logo { width: 70px; height: 70px; }
            h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============ ЗАЩИЩЁННЫЕ URL (base64) ============
        // В открытом виде не хранятся, извлекаются при запуске
        const _ENC_MAIN = "aHR0cHM6Ly9wdnotZGF0YWJhc2UtZGVmYXVsdC1ydGRiLmZpcmViYXNlaW8uY29tLw==";
        const _ENC_CHEKI = "aHR0cHM6Ly9jaGVraS10YXR1LXNhdmUtZGVmYXVsdC1ydGRiLmZpcmViYXNlaW8uY29tLw==";
        
        const MAIN_DB_URL = atob(_ENC_MAIN);
        const CHEKI_DB_URL = atob(_ENC_CHEKI);
        
        // ============ ФУНКЦИЯ ОБЪЕДИНЕНИЯ ТОВАРОВ ============
        function mergeItems(items) {
            const merged = {};
            for (const item of items) {
                const service = item.service;
                if (merged[service]) {
                    merged[service].count += item.count;
                } else {
                    merged[service] = { ...item };
                }
            }
            const result = [];
            for (const service in merged) {
                result.push({
                    service: service,
                    count: merged[service].count,
                    price: merged[service].price
                });
            }
            return result;
        }
        
        // ============ КЭШ ============
        let ordersCache = {};
        let lastUpdate = 0;
        let currentCode = null;
        let currentTask = null;
        let watchInterval = null;
        
        // ============ ПОЛУЧЕНИЕ ЗАКАЗА ============
        async function getOrderByCode(code) {
            if (!MAIN_DB_URL || !CHEKI_DB_URL) return null;
            
            // 1. Сначала ищем в АКТИВНЫХ заказах
            try {
                const activeResponse = await fetch(`${MAIN_DB_URL}tasks.json`);
                if (!activeResponse.ok) throw new Error(`HTTP ${activeResponse.status}`);
                const activeData = await activeResponse.json();
                
                if (activeData) {
                    for (const [id, task] of Object.entries(activeData)) {
                        if (task.code6 === code) {
                            let status = "waiting";
                            let clientStatus = task.clientStatus || "waiting";
                            
                            if (task.status === "active") {
                                if (clientStatus === "session") status = "session";
                                else status = "active";
                            } else if (task.status === "waiting") {
                                status = "waiting";
                            }
                            
                            const mergedItems = mergeItems(task.items);
                            
                            return {
                                id: task.id,
                                code6: task.code6,
                                items: mergedItems,
                                total: task.total,
                                time: task.time,
                                appointmentTime: task.appointmentTime,
                                master: task.master,
                                status: status,
                                clientStatus: clientStatus,
                                source: "active"
                            };
                        }
                    }
                }
            } catch(e) {
                console.error("Ошибка загрузки активных заказов:", e);
                // Продолжаем искать в архиве
            }
            
            // 2. Если не нашли - ищем в АРХИВЕ
            try {
                const archiveResponse = await fetch(`${CHEKI_DB_URL}checkLogs.json`);
                if (!archiveResponse.ok) throw new Error(`HTTP ${archiveResponse.status}`);
                const archiveData = await archiveResponse.json();
                
                if (archiveData) {
                    for (const [id, log] of Object.entries(archiveData)) {
                        if (log.code6 === code) {
                            const mergedItems = mergeItems(log.items);
                            return {
                                id: log.id,
                                code6: log.code6,
                                items: mergedItems,
                                total: log.total,
                                time: log.time,
                                appointmentTime: log.appointmentTime,
                                master: log.master || 'Мастер',
                                status: "completed",
                                source: "archive"
                            };
                        }
                    }
                }
            } catch(e) {
                console.error("Ошибка загрузки архива:", e);
            }
            
            return null;
        }
        
        // ============ ПОЛУЧЕНИЕ СТАТУСА ============
        function getStatusInfo(status, clientStatus, source) {
            if (source === "archive" || status === "completed") {
                return { text: '🔴 ГОТОВО', class: 'status-ready', message: 'Ваш заказ готов! Спасибо за визит!', emoji: '✅' };
            }
            
            const statusMap = {
                'waiting': { text: '🟡 ОЖИДАНИЕ', class: 'status-waiting', message: 'Ваш заказ в очереди. Скоро мастер пригласит вас!', emoji: '⏳' },
                'active': { text: '🟢 ВАС ЗОВУТ!', class: 'status-call', message: 'Пройдите к мастеру! Вас уже ждут.', emoji: '🔔' },
                'session': { text: '🟣 НА СЕАНСЕ', class: 'status-session', message: 'Мастер уже работает над вашей татуировкой', emoji: '🎨' }
            };
            
            if (clientStatus === 'session') return statusMap['session'];
            if (status === 'active') return statusMap['active'];
            return statusMap['waiting'];
        }
        
        function generateQRData(task) {
            const total = task.items.reduce((sum, item) => sum + (item.count * item.price), 0);
            const itemsText = task.items.map(item => `${item.service} x${item.count} = ${item.count * item.price} коп`).join('\n');
            
            let data = `🎫 БИЛЕТ №${task.id}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📋 СОСТАВ ЗАКАЗА:\n${itemsText}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n💰 ИТОГО: ${total} коп (${(total/100).toFixed(2)} руб)\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n🔑 КОД: ${task.code6}`;
            return data;
        }
        
        function renderStatus(task) {
            const app = document.getElementById('app');
            const statusInfo = getStatusInfo(task.status, task.clientStatus, task.source);
            
            const total = task.items.reduce((sum, item) => sum + (item.count * item.price), 0);
            const itemsHtml = task.items.map(item => `
                <div class="details-item">
                    <span>✍️ ${item.service.toUpperCase()}</span>
                    <span>${item.count} шт × ${item.price} коп = <span class="price">${item.count * item.price} коп</span></span>
                </div>
            `).join('');
            
            const qrData = generateQRData(task);
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(qrData)}`;
            
            const statusNote = task.source === 'archive' ? '<div style="font-size: 10px; color: #555; margin-top: 10px;">📦 Заказ выполнен и сохранён в архиве</div>' : '';
            const masterDisplay = task.master ? `<span class="master-name">${task.master}</span>` : 'Назначается';
            
            const html = `
                <div class="container">
                    <img src="https://i.postimg.cc/mghWfVfT/LT-avatarka-tatu-salon.jpg" alt="LION t.A.T.u." class="logo">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <div class="subtitle">Статус заказа</div>
                    
                    <div class="status-card">
                        <div class="ticket-number">🎫 №${task.id}</div>
                        <div class="status ${statusInfo.class}">${statusInfo.text}</div>
                        
                        <div class="details">
                            <div class="details-header">📋 СОСТАВ ЗАКАЗА</div>
                            ${itemsHtml}
                            <div class="details-item total-row">
                                <span>💰 ИТОГО</span>
                                <span class="price">${total} коп (${(total/100).toFixed(2)} руб)</span>
                            </div>
                        </div>
                        
                        <div class="details">
                            <div class="details-header">ℹ️ ИНФОРМАЦИЯ</div>
                            <div class="details-item">
                                <span>🎨 Мастер</span>
                                <span>${masterDisplay}</span>
                            </div>
                            <div class="details-item">
                                <span>⏰ Время заказа</span>
                                <span>${task.time}</span>
                            </div>
                            <div class="details-item">
                                <span>📅 Время записи</span>
                                <span style="color: #00ff66; font-weight: bold;">${task.appointmentTime || 'Сейчас'}</span>
                            </div>
                        </div>
                        
                        <div class="code-display">🔑 ${task.code6}</div>
                        
                        <div class="qr-container">
                            <img src="${qrUrl}" alt="QR-код заказа">
                            <div class="qr-caption">QR-код с информацией о заказе</div>
                        </div>
                        
                        <div style="font-size: 13px; color: #888; margin-top: 15px; padding: 10px; background: #0a0a0f; border-radius: 20px;">
                            💡 ${statusInfo.message} ${statusInfo.emoji}
                        </div>
                        ${statusNote}
                    </div>
                    
                    <button onclick="checkAnother()" class="btn-secondary">🔍 ПРОВЕРИТЬ ДРУГОЙ БИЛЕТ</button>
                    <div class="refresh-info">🔄 Статус обновляется автоматически каждые 5 секунд</div>
                    <div class="footer">Сохраните код заказа. Он понадобится для отслеживания статуса.</div>
                </div>
            `;
            
            app.innerHTML = html;
        }
        
        async function checkOrderByCode(code) {
            const task = await getOrderByCode(code);
            if (!task) {
                showError("❌ Неверный код! Заказ не найден.");
                return false;
            }
            
            currentCode = code;
            currentTask = task;
            saveCode(code);
            renderStatus(task);
            
            if (watchInterval) clearInterval(watchInterval);
            watchInterval = setInterval(async () => {
                if (currentCode) {
                    const updatedTask = await getOrderByCode(currentCode);
                    if (updatedTask && (updatedTask.clientStatus || updatedTask.status) !== (currentTask?.clientStatus || currentTask?.status)) {
                        currentTask = updatedTask;
                        renderStatus(updatedTask);
                    }
                }
            }, 5000);
            
            return true;
        }
        
        // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
        function saveCode(code) { localStorage.setItem('lion_client_code', code); }
        function getSavedCode() { return localStorage.getItem('lion_client_code'); }
        function clearSavedCode() { localStorage.removeItem('lion_client_code'); }
        
        function showError(msg) {
            const app = document.getElementById('app');
            const div = document.createElement('div');
            div.className = 'error';
            div.innerText = msg;
            app.insertBefore(div, app.firstChild);
            setTimeout(() => div.remove(), 3000);
        }
        
        function renderInputScreen() {
            const app = document.getElementById('app');
            const savedCode = getSavedCode();
            const savedHtml = savedCode ? `<div class="saved-code" onclick="useSavedCode()"><span>📌 Сохранённый код</span><span>${savedCode}</span><span>▶</span></div>` : '';
            
            const html = `
                <div class="container">
                    <img src="https://i.postimg.cc/mghWfVfT/LT-avatarka-tatu-salon.jpg" alt="LION t.A.T.u." class="logo">
                    <h1>🦁 LION t.A.T.u.</h1>
                    <div class="subtitle">Введите код с чека</div>
                    <input type="text" id="codeInput" class="code-input" placeholder="000000" maxlength="6" inputmode="numeric" autofocus>
                    <button onclick="submitCode()">🔍 ПРОВЕРИТЬ</button>
                    ${savedHtml}
                    <div class="footer">Введите 6-значный код с чека для отслеживания статуса заказа</div>
                </div>
            `;
            app.innerHTML = html;
            
            const input = document.getElementById('codeInput');
            if (input) {
                input.addEventListener('input', (e) => { e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6); });
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitCode(); });
            }
        }
        
        async function useSavedCode() {
            const savedCode = getSavedCode();
            if (savedCode) {
                const input = document.getElementById('codeInput');
                if (input) input.value = savedCode;
                await submitCode();
            }
        }
        
        async function submitCode() {
            const input = document.getElementById('codeInput');
            if (!input) return;
            const code = input.value.trim();
            if (code.length !== 6) { showError("Введите 6-значный код!"); return; }
            if (!/^\d+$/.test(code)) { showError("Код должен содержать только цифры!"); return; }
            await checkOrderByCode(code);
        }
        
        function checkAnother() {
            if (watchInterval) clearInterval(watchInterval);
            currentCode = null;
            currentTask = null;
            renderInputScreen();
        }
        
        async function checkSavedCode() {
            const savedCode = getSavedCode();
            if (savedCode) {
                const task = await getOrderByCode(savedCode);
                if (task) {
                    await checkOrderByCode(savedCode);
                    return true;
                } else { clearSavedCode(); }
            }
            return false;
        }
        
        // ============ ЗАПУСК ============
        (async function() {
            // URL уже готовы (MAIN_DB_URL, CHEKI_DB_URL)
            const hasSaved = await checkSavedCode();
            if (!hasSaved) { renderInputScreen(); }
        })();
    </script>
</body>
</html>
